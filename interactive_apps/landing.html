<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Apps Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    animation: {
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 overflow-x-hidden relative min-h-screen flex flex-col">
    
    <!-- Ambient Background Blobs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-cyan-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-96 h-96 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-fuchsia-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-4000"></div>
    </div>

    <div id="root" class="relative z-10 w-full max-w-6xl mx-auto px-4 md:px-6 pt-6 pb-12 min-h-screen flex flex-col"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCEGrh2SIC20vJj_nLm4x34ok01srxip7I",
            authDomain: "paul-s-2026.firebaseapp.com",
            projectId: "paul-s-2026",
            storageBucket: "paul-s-2026.firebasestorage.app",
            messagingSenderId: "524167059781",
            appId: "1:524167059781:web:57347f46b29c9d4a49862c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const SUBJECTS = [
            { id: 'maths', label: 'Mathematics', icon: 'fa-calculator', color: 'text-rose-500', bg: 'bg-rose-50', hoverBg: 'hover:bg-rose-100', border: 'border-rose-200' },
            { id: 'english', label: 'English', icon: 'fa-book', color: 'text-sky-500', bg: 'bg-sky-50', hoverBg: 'hover:bg-sky-100', border: 'border-sky-200' },
            { id: 'science', label: 'Science', icon: 'fa-flask', color: 'text-emerald-500', bg: 'bg-emerald-50', hoverBg: 'hover:bg-emerald-100', border: 'border-emerald-200' },
            { id: 'history', label: 'History', icon: 'fa-landmark', color: 'text-amber-500', bg: 'bg-amber-50', hoverBg: 'hover:bg-amber-100', border: 'border-amber-200' },
            { id: 'geography', label: 'Geography', icon: 'fa-earth-americas', color: 'text-green-600', bg: 'bg-green-50', hoverBg: 'hover:bg-green-100', border: 'border-green-200' },
            { id: 'pdhpe', label: 'PDHPE', icon: 'fa-basketball', color: 'text-orange-500', bg: 'bg-orange-50', hoverBg: 'hover:bg-orange-100', border: 'border-orange-200' },
            { id: 'creativearts', label: 'Creative Arts', icon: 'fa-palette', color: 'text-pink-500', bg: 'bg-pink-50', hoverBg: 'hover:bg-pink-100', border: 'border-pink-200' },
            { id: 'other', label: 'Other Tools', icon: 'fa-shapes', color: 'text-indigo-500', bg: 'bg-indigo-50', hoverBg: 'hover:bg-indigo-100', border: 'border-indigo-200' }
        ];

        const AppsHub = () => {
            const [activeSubject, setActiveSubject] = useState(null);
            const [appsData, setAppsData] = useState({});
            const [isAdding, setIsAdding] = useState(false);
            const [appToDelete, setAppToDelete] = useState(null); // Custom modal state for deletion
            const [newTitle, setNewTitle] = useState('');
            const [newUrl, setNewUrl] = useState('');
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                signInAnonymously(auth).then(() => {
                    const docRef = doc(db, 'webapps', 'directory');
                    const unsubscribe = onSnapshot(docRef, (docSnap) => {
                        if (docSnap.exists()) {
                            setAppsData(docSnap.data() || {});
                        } else {
                            setDoc(docRef, {}); // Init empty doc if doesn't exist
                        }
                        setIsLoading(false);
                    });
                    return () => unsubscribe();
                });
            }, []);

            const handleSaveApp = async (e) => {
                e.preventDefault();
                if (!newTitle.trim() || !newUrl.trim()) return;

                const currentSubjectApps = appsData[activeSubject.id] || [];
                const updatedApps = {
                    ...appsData,
                    [activeSubject.id]: [...currentSubjectApps, { title: newTitle.trim(), url: newUrl.trim(), id: Date.now().toString() }]
                };

                await setDoc(doc(db, 'webapps', 'directory'), updatedApps);
                setIsAdding(false);
                setNewTitle('');
                setNewUrl('');
            };

            const confirmDeleteApp = (appId) => {
                setAppToDelete(appId);
            };

            const executeDeleteApp = async () => {
                if (!appToDelete) return;
                const currentSubjectApps = appsData[activeSubject.id] || [];
                const updatedApps = {
                    ...appsData,
                    [activeSubject.id]: currentSubjectApps.filter(app => app.id !== appToDelete)
                };

                await setDoc(doc(db, 'webapps', 'directory'), updatedApps);
                setAppToDelete(null);
            };

            if (isLoading) {
                return <div className="flex-1 flex items-center justify-center text-cyan-600 font-bold text-xl animate-pulse"><i className="fa-solid fa-circle-notch fa-spin mr-3"></i> Loading Directory...</div>;
            }

            return (
                <div className="flex flex-col h-full w-full relative">
                    
                    {/* Header */}
                    <header className="flex justify-between items-center mb-8 md:mb-12 bg-white/80 backdrop-blur-md px-6 py-4 rounded-[2rem] shadow-sm border border-slate-200">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 shadow-inner">
                                <i className="fa-solid fa-layer-group text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl md:text-3xl font-black text-slate-800 leading-none">Interactive Apps Hub</h1>
                                <p className="text-slate-500 font-medium text-sm mt-1">Manage and launch your classroom webapps</p>
                            </div>
                        </div>
                        <a href="https://paulpbou.github.io/timetable-hub/index.html" className="hidden md:flex items-center justify-center px-5 py-2.5 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors gap-2">
                            <i className="fa-solid fa-house"></i> Back to Main Hub
                        </a>
                        <a href="https://paulpbou.github.io/timetable-hub/index.html" className="flex md:hidden items-center justify-center w-10 h-10 bg-slate-100 text-slate-600 font-bold rounded-full hover:bg-slate-200 transition-colors">
                            <i className="fa-solid fa-house"></i>
                        </a>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 w-full flex flex-col">
                        
                        {!activeSubject ? (
                            // Home View: Subject Grid
                            <div className="animate-fade-in">
                                <h2 className="text-xl font-bold text-slate-500 uppercase tracking-widest mb-6 px-2">Select a Subject</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                                    {SUBJECTS.map(sub => {
                                        const count = (appsData[sub.id] || []).length;
                                        return (
                                            <button 
                                                key={sub.id}
                                                onClick={() => setActiveSubject(sub)}
                                                className={`flex flex-col items-center justify-center p-8 rounded-[2rem] border-2 transition-all duration-300 hover:-translate-y-1 shadow-sm hover:shadow-xl bg-white ${sub.border} hover:border-slate-300 group`}
                                            >
                                                <div className={`w-20 h-20 rounded-2xl ${sub.bg} ${sub.hoverBg} flex items-center justify-center ${sub.color} mb-4 transition-colors group-hover:scale-110 duration-300`}>
                                                    <i className={`fa-solid ${sub.icon} text-4xl drop-shadow-sm`}></i>
                                                </div>
                                                <h3 className="text-xl font-black text-slate-800 mb-1">{sub.label}</h3>
                                                <span className="text-sm font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">{count} App{count !== 1 ? 's' : ''}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            // Subject Details View
                            <div className="animate-fade-in bg-white/90 backdrop-blur-xl border border-slate-200 rounded-[2.5rem] shadow-xl p-6 md:p-10 flex-1 flex flex-col min-h-[600px]">
                                
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-100 pb-6">
                                    <div className="flex items-center gap-4">
                                        <button onClick={() => setActiveSubject(null)} className="w-10 h-10 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center hover:bg-slate-200 hover:text-slate-800 transition-colors">
                                            <i className="fa-solid fa-arrow-left"></i>
                                        </button>
                                        <div className={`w-12 h-12 rounded-xl ${activeSubject.bg} flex items-center justify-center ${activeSubject.color}`}>
                                            <i className={`fa-solid ${activeSubject.icon} text-2xl`}></i>
                                        </div>
                                        <div>
                                            <h2 className="text-3xl font-black text-slate-800">{activeSubject.label} Apps</h2>
                                            <p className="text-slate-500 font-medium">Click an app to launch it</p>
                                        </div>
                                    </div>
                                    
                                    <button onClick={() => setIsAdding(true)} className="w-full md:w-auto px-6 py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-xl shadow-lg shadow-cyan-900/20 transition-all hover:-translate-y-0.5 flex items-center justify-center gap-2">
                                        <i className="fa-solid fa-plus"></i> Add New App
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-6 flex-1 content-start">
                                    {(!appsData[activeSubject.id] || appsData[activeSubject.id].length === 0) ? (
                                        <div className="col-span-full flex flex-col items-center justify-center py-20 text-center opacity-60">
                                            <i className="fa-solid fa-ghost text-6xl text-slate-300 mb-4"></i>
                                            <h3 className="text-2xl font-black text-slate-400">No apps yet</h3>
                                            <p className="text-slate-500">Click "Add New App" to link a tool here.</p>
                                        </div>
                                    ) : (
                                        appsData[activeSubject.id].map(app => (
                                            /* Entire card wrapped in an anchor tag to make it launchable anywhere */
                                            <a href={app.url} target="_blank" key={app.id} className="group flex flex-col bg-slate-50 rounded-2xl border border-slate-200 hover:border-cyan-300 hover:shadow-lg transition-all overflow-hidden relative cursor-pointer">
                                                
                                                {/* Delete button absolutely positioned with higher z-index to catch click events */}
                                                <div className="absolute top-3 right-3 z-20">
                                                    <button onClick={(e) => { e.preventDefault(); e.stopPropagation(); confirmDeleteApp(app.id); }} className="w-8 h-8 bg-white text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg shadow-sm border border-slate-200 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center" title="Delete App">
                                                        <i className="fa-solid fa-trash-can text-sm"></i>
                                                    </button>
                                                </div>
                                                
                                                <div className="p-6 flex-1 flex flex-col relative z-10">
                                                    <div className={`w-12 h-12 rounded-full ${activeSubject.bg} flex items-center justify-center ${activeSubject.color} mb-4`}>
                                                        <i className={`fa-solid ${activeSubject.icon} text-xl`}></i>
                                                    </div>
                                                    <h3 className="text-xl font-bold text-slate-800 mb-2 leading-tight pr-8">{app.title}</h3>
                                                    <div className="mt-auto pt-4 flex items-center text-cyan-600 font-bold group-hover:text-cyan-500 transition-colors">
                                                        Launch App <i className="fa-solid fa-arrow-up-right-from-square ml-2 text-sm"></i>
                                                    </div>
                                                </div>
                                            </a>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {}
                    {/* Add App Modal */}
                    {isAdding && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col border border-slate-200">
                                <div className={`p-6 border-b border-slate-100 flex items-center gap-3 ${activeSubject?.bg}`}>
                                    <div className={`w-10 h-10 rounded-full bg-white flex items-center justify-center ${activeSubject?.color} shadow-sm`}>
                                        <i className={`fa-solid ${activeSubject?.icon}`}></i>
                                    </div>
                                    <h3 className={`text-xl font-black ${activeSubject?.color}`}>Add App to {activeSubject?.label}</h3>
                                </div>
                                
                                <form onSubmit={handleSaveApp} className="p-6 md:p-8 space-y-5">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-600 mb-2">App Title / Topic</label>
                                        <input 
                                            type="text" 
                                            required
                                            value={newTitle}
                                            onChange={e => setNewTitle(e.target.value)}
                                            placeholder="e.g., Types of Triangle Lesson" 
                                            className="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-800 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all font-medium"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-600 mb-2">Hyperlink URL</label>
                                        <div className="relative">
                                            <i className="fa-solid fa-link absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                            <input 
                                                type="text" 
                                                required
                                                value={newUrl}
                                                onChange={e => setNewUrl(e.target.value)}
                                                placeholder="triangle_lesson.html or https://..." 
                                                className="w-full bg-slate-50 border border-slate-300 rounded-xl pl-10 pr-4 py-3 text-slate-800 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all font-medium font-mono text-sm"
                                            />
                                        </div>
                                    </div>
                                    
                                    <div className="flex gap-3 pt-4">
                                        <button type="button" onClick={() => setIsAdding(false)} className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl transition-colors">
                                            Cancel
                                        </button>
                                        <button type="submit" className="flex-1 py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-xl shadow-md transition-colors flex items-center justify-center gap-2">
                                            <i className="fa-solid fa-cloud-arrow-up"></i> Save App
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Custom Confirm Delete Modal (Replaces window.confirm) */}
                    {appToDelete && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-3xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col border border-slate-200 p-6 text-center">
                                <div className="w-16 h-16 bg-rose-100 rounded-full flex items-center justify-center text-rose-500 mx-auto mb-4">
                                    <i className="fa-solid fa-triangle-exclamation text-3xl"></i>
                                </div>
                                <h3 className="text-xl font-black text-slate-800 mb-2">Delete App?</h3>
                                <p className="text-slate-500 font-medium mb-6">Are you sure you want to remove this app link? This action cannot be undone.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setAppToDelete(null)} className="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">
                                        Cancel
                                    </button>
                                    <button onClick={executeDeleteApp} className="flex-1 py-2.5 bg-rose-600 hover:bg-rose-500 text-white font-bold rounded-xl shadow-md transition-colors">
                                        Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppsHub />);
    </script>
</body>
</html>
