<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Types of Triangle | Interactive Lesson</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Triangle drawing animation */
        .path-draw {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 2s ease forwards;
        }
        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        /* Grid Background for Sandbox */
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(148, 163, 184, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(148, 163, 184, 0.1) 1px, transparent 1px);
        }
    </style>
</head>
<body class="text-slate-800 overflow-x-hidden relative min-h-screen flex flex-col">
    
    <!-- Ambient Background Blobs -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-cyan-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
        <div class="absolute top-[20%] right-[-10%] w-96 h-96 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-emerald-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-4000"></div>
    </div>

    <!-- Back to Hub Button -->
    <a href="https://paulpbou.github.io/timetable-hub/interactive_apps/landing.html" class="fixed top-3 left-3 z-50 bg-white/80 backdrop-blur-md px-3 py-1.5 rounded-full font-bold text-slate-600 shadow-sm border border-slate-200 hover:bg-slate-50 hover:text-cyan-600 hover:shadow-md hover:-translate-y-0.5 transition-all flex items-center gap-2 text-xs md:text-sm">
        <i class="fa-solid fa-arrow-left"></i> Hub
    </a>

    <div id="root" class="relative z-10 w-full max-w-6xl mx-auto px-4 md:px-6 pt-14 pb-6 min-h-screen flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- DATA ---
        const triangleData = {
            equilateral: {
                name: 'Equilateral Triangle',
                color: 'text-emerald-600',
                bg: 'bg-emerald-50 border-emerald-200',
                fill: 'fill-emerald-100 stroke-emerald-500',
                svgPath: 'M 100 20 L 180 160 L 20 160 Z',
                markers: [
                    {type: 'tick', x: 50, y: 90, angle: -60},
                    {type: 'tick', x: 150, y: 90, angle: 60},
                    {type: 'tick', x: 100, y: 160, angle: 0},
                    {type: 'angle', x: 100, y: 35, text: '60°'},
                    {type: 'angle', x: 40, y: 145, text: '60°'},
                    {type: 'angle', x: 160, y: 145, text: '60°'}
                ],
                properties: [
                    "Has 3 equal sides.",
                    "All its interior angles are the same.",
                    "Each interior angle is always exactly 60°.",
                    "Total interior angles = 180°."
                ]
            },
            isosceles: {
                name: 'Isosceles Triangle',
                color: 'text-amber-600',
                bg: 'bg-amber-50 border-amber-200',
                fill: 'fill-amber-100 stroke-amber-500',
                svgPath: 'M 100 20 L 140 160 L 60 160 Z',
                markers: [
                    {type: 'tick', x: 75, y: 90, angle: -74},
                    {type: 'tick', x: 125, y: 90, angle: 74},
                    {type: 'angle', x: 80, y: 140, text: 'base'},
                    {type: 'angle', x: 120, y: 140, text: 'base'}
                ],
                properties: [
                    "Has exactly 2 equal sides.",
                    "Has 2 interior angles that are the same.",
                    "These equal angles are called the base angles.",
                    "Total interior angles = 180°."
                ]
            },
            scalene: {
                name: 'Scalene Triangle',
                color: 'text-indigo-600',
                bg: 'bg-indigo-50 border-indigo-200',
                fill: 'fill-indigo-100 stroke-indigo-500',
                svgPath: 'M 40 40 L 180 160 L 20 160 Z',
                markers: [
                    {type: 'angle', x: 60, y: 60, text: 'A'},
                    {type: 'angle', x: 45, y: 145, text: 'B'},
                    {type: 'angle', x: 150, y: 145, text: 'C'}
                ],
                properties: [
                    "All of its sides are different lengths.",
                    "All of its interior angles are different.",
                    "Total interior angles still add up to 180°."
                ]
            },
            right: {
                name: 'Right-Angled Triangle',
                color: 'text-rose-600',
                bg: 'bg-rose-50 border-rose-200',
                fill: 'fill-rose-100 stroke-rose-500',
                svgPath: 'M 40 20 L 40 160 L 160 160 Z',
                markers: [
                    {type: 'square', x: 40, y: 160},
                    {type: 'label', x: 110, y: 80, text: 'Hypotenuse', angle: 45}
                ],
                properties: [
                    "One of the angles is a right angle (90°).",
                    "The other two angles will add up to 90°.",
                    "The longest side is opposite the right angle.",
                    "The longest side is called the hypotenuse."
                ]
            }
        };

        const riddles = [
            { q: "Each of my interior angles measure 60°. What am I?", a: "Equilateral", opts: ["Scalene", "Equilateral", "Isosceles"] },
            { q: "I am the longest side of a right-angled triangle. What am I?", a: "Hypotenuse", opts: ["Hypotenuse", "Base", "Vertex"] },
            { q: "The lengths of all my three sides are different. What am I?", a: "Scalene", opts: ["Isosceles", "Right-Angled", "Scalene"] },
            { q: "My interior angles measure 43°, 65° and 72°. What am I?", a: "Scalene", opts: ["Scalene", "Equilateral", "Isosceles"] },
            { q: "I have 2 equal sides and 2 equal angles. What am I?", a: "Isosceles", opts: ["Right-Angled", "Equilateral", "Isosceles"] },
            { q: "One of my angles is exactly 90°. What am I?", a: "Right-Angled", opts: ["Right-Angled", "Scalene", "Equilateral"] }
        ];

        // --- COMPONENTS ---

        const TriangleVisualiser = ({ type }) => {
            const data = triangleData[type];
            return (
                <div className="relative w-full max-w-sm mx-auto aspect-square bg-white rounded-2xl shadow-inner border border-slate-100 flex items-center justify-center p-4">
                    <svg viewBox="0 0 200 200" className="w-full h-full overflow-visible drop-shadow-md">
                        <path d={data.svgPath} className={`${data.fill} stroke-[4] path-draw stroke-linejoin-round`} />
                        
                        {data.markers.map((m, i) => {
                            if (m.type === 'tick') {
                                return (
                                    <g key={i} transform={`translate(${m.x}, ${m.y}) rotate(${m.angle})`}>
                                        <line x1="-8" y1="0" x2="8" y2="0" stroke="#1e293b" strokeWidth="3" strokeLinecap="round" />
                                        {type === 'equilateral' && <line x1="-8" y1="-5" x2="8" y2="-5" stroke="#1e293b" strokeWidth="3" strokeLinecap="round" />}
                                    </g>
                                );
                            }
                            if (m.type === 'angle') {
                                return <text key={i} x={m.x} y={m.y} fill="#475569" fontSize="14" fontWeight="bold" textAnchor="middle" alignmentBaseline="middle">{m.text}</text>;
                            }
                            if (m.type === 'square') {
                                return (
                                    <path key={i} d={`M ${m.x} ${m.y - 20} L ${m.x + 20} ${m.y - 20} L ${m.x + 20} ${m.y}`} fill="none" stroke="#1e293b" strokeWidth="3" />
                                );
                            }
                            if (m.type === 'label') {
                                return <text key={i} x={m.x} y={m.y} transform={`rotate(${m.angle}, ${m.x}, ${m.y})`} fill="#475569" fontSize="16" fontWeight="bold" textAnchor="middle">{m.text}</text>;
                            }
                            return null;
                        })}
                    </svg>
                </div>
            );
        };

        const LearnSection = () => {
            const [activeType, setActiveType] = useState('equilateral');

            return (
                <div className="flex flex-col md:flex-row gap-4 md:gap-8 animate-fade-in mt-2 w-full">
                    <div className="flex-1 space-y-3">
                        <h2 className="text-2xl md:text-3xl font-black text-slate-800 flex items-center gap-3">
                            <i className="fa-solid fa-shapes text-cyan-500"></i> Explore
                        </h2>
                        <p className="text-slate-600 font-medium text-sm md:text-base">Click on a triangle type to learn its unique properties. Remember: <strong>All interior angles of any triangle always add up to 180°!</strong></p>
                        
                        <div className="grid grid-cols-2 gap-2.5 mt-4">
                            {Object.entries(triangleData).map(([key, data]) => (
                                <button 
                                    key={key}
                                    onClick={() => setActiveType(key)}
                                    className={`p-3 md:p-4 rounded-xl md:rounded-2xl border-2 text-left transition-all ${activeType === key ? `${data.bg} shadow-md scale-[1.02]` : 'bg-white border-slate-200 hover:border-slate-300 hover:bg-slate-50'}`}
                                >
                                    <h3 className={`font-bold text-base md:text-lg leading-tight ${activeType === key ? data.color : 'text-slate-700'}`}>{data.name}</h3>
                                </button>
                            ))}
                        </div>

                        <div className={`mt-4 p-5 rounded-2xl border ${triangleData[activeType].bg} bg-white shadow-sm transition-all`}>
                            <h3 className={`text-xl font-black mb-3 ${triangleData[activeType].color}`}>Properties</h3>
                            <ul className="space-y-2">
                                {triangleData[activeType].properties.map((prop, i) => (
                                    <li key={i} className="flex items-start gap-2.5">
                                        <i className={`fa-solid fa-check mt-1 text-xs md:text-sm ${triangleData[activeType].color}`}></i>
                                        <span className="text-slate-700 font-medium text-sm md:text-base">{prop}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col justify-center">
                        <TriangleVisualiser type={activeType} />
                    </div>
                </div>
            );
        };

        const QuizSection = () => {
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [feedback, setFeedback] = useState(null);

            const handleAnswer = (ans) => {
                if (ans === riddles[currentQ].a) {
                    setFeedback({ correct: true, msg: "Correct! Brilliant job!" });
                    setScore(score + 1);
                } else {
                    setFeedback({ correct: false, msg: `Oops! The correct answer was ${riddles[currentQ].a}.` });
                }

                setTimeout(() => {
                    setFeedback(null);
                    if (currentQ < riddles.length - 1) {
                        setCurrentQ(currentQ + 1);
                    } else {
                        setShowResult(true);
                    }
                }, 2000);
            };

            const resetQuiz = () => {
                setCurrentQ(0);
                setScore(0);
                setShowResult(false);
            };

            if (showResult) {
                return (
                    <div className="flex flex-col items-center justify-center p-8 bg-white rounded-3xl shadow-xl border border-slate-200 mt-4 text-center animate-fade-in">
                        <i className="fa-solid fa-trophy text-5xl md:text-6xl text-amber-400 mb-4 drop-shadow-md"></i>
                        <h2 className="text-3xl md:text-4xl font-black text-slate-800 mb-2">Quiz Complete!</h2>
                        <p className="text-xl md:text-2xl font-bold text-cyan-600 mb-6">You scored {score} out of {riddles.length}</p>
                        <button onClick={resetQuiz} className="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-3 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transition-all hover:-translate-y-1">
                            Play Again
                        </button>
                    </div>
                );
            }

            return (
                <div className="max-w-2xl mx-auto mt-4 relative w-full">
                    <div className="flex justify-between items-center mb-4 text-slate-500 font-bold text-sm md:text-base">
                        <span>Question {currentQ + 1} of {riddles.length}</span>
                        <span>Score: {score}</span>
                    </div>

                    <div className="bg-white rounded-3xl shadow-xl border border-slate-200 p-6 md:p-10 text-center relative overflow-hidden">
                        <h2 className="text-xl md:text-3xl font-black text-slate-800 mb-8 leading-tight">"{riddles[currentQ].q}"</h2>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-4 relative z-10">
                            {riddles[currentQ].opts.map((opt, i) => (
                                <button 
                                    key={i}
                                    onClick={() => !feedback && handleAnswer(opt)}
                                    disabled={!!feedback}
                                    className={`py-3 md:py-4 px-4 md:px-6 rounded-xl font-bold text-base md:text-lg transition-all border-2 
                                        ${feedback ? 'opacity-50 cursor-not-allowed border-slate-200 bg-slate-50' : 'bg-white border-cyan-200 text-cyan-700 hover:bg-cyan-50 hover:border-cyan-400 hover:shadow-md'}`}
                                >
                                    {opt}
                                </button>
                            ))}
                        </div>

                        {feedback && (
                            <div className={`absolute inset-0 z-20 flex items-center justify-center backdrop-blur-sm ${feedback.correct ? 'bg-emerald-500/90' : 'bg-rose-500/90'} text-white animate-fade-in`}>
                                <div className="text-center">
                                    <i className={`fa-solid ${feedback.correct ? 'fa-circle-check' : 'fa-circle-xmark'} text-5xl md:text-6xl mb-3 drop-shadow-md`}></i>
                                    <h3 className="text-2xl md:text-3xl font-black">{feedback.msg}</h3>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AngleCalculator = () => {
            const [problem, setProblem] = useState(null);
            const [userAns, setUserAns] = useState('');
            const [feedback, setFeedback] = useState(null);
            const [streak, setStreak] = useState(0);

            const generateProblem = () => {
                const types = ['isosceles', 'scalene', 'right'];
                const type = types[Math.floor(Math.random() * types.length)];
                let p = { desc: '', type, path: '', lines: [], labels: [] };

                if (type === 'right') {
                    p.path = "M 40 40 L 40 160 L 160 160 Z";
                    p.lines = ["M 40 140 L 60 140 L 60 160"]; 
                    p.a1 = 90;
                    const known = Math.floor(Math.random() * 50) + 20;
                    p.a2 = known;
                    p.ans = 90 - known;
                    p.desc = "This is a right-angled scalene triangle.";

                    let top = { x: 52, y: 75 };
                    let botLeft = { x: 75, y: 145 }; 
                    let botRight = { x: 142, y: 145 };

                    p.labels.push({ ...botLeft, text: '90°', color: '#0ea5e9' });

                    if (Math.random() > 0.5) {
                        p.labels.push({ ...botRight, text: `${known}°`, color: '#10b981' });
                        p.labels.push({ ...top, text: '?', color: '#f43f5e', isUnknown: true });
                    } else {
                        p.labels.push({ ...top, text: `${known}°`, color: '#10b981' });
                        p.labels.push({ ...botRight, text: '?', color: '#f43f5e', isUnknown: true });
                    }
                } else if (type === 'isosceles') {
                    p.path = "M 100 40 L 160 160 L 40 160 Z";
                    p.lines = ["M 65 105 L 75 95", "M 135 105 L 125 95"]; 
                    const findBase = Math.random() > 0.5;
                    let topPos = { x: 100, y: 75 };
                    let leftPos = { x: 65, y: 145 };
                    let rightPos = { x: 135, y: 145 };

                    if (findBase) {
                        let top = Math.floor(Math.random() * 80) + 20;
                        if (top % 2 !== 0) top += 1;
                        let base = (180 - top) / 2;
                        p.a1 = top;
                        p.a2 = base;
                        p.ans = base;
                        p.desc = "This is an isosceles triangle.";

                        p.labels.push({ ...topPos, text: `${top}°`, color: '#0ea5e9' });
                        
                        if (Math.random() > 0.5) {
                            p.labels.push({ ...leftPos, text: `${base}°`, color: '#10b981' });
                            p.labels.push({ ...rightPos, text: '?', color: '#f43f5e', isUnknown: true });
                        } else {
                            p.labels.push({ ...rightPos, text: `${base}°`, color: '#10b981' });
                            p.labels.push({ ...leftPos, text: '?', color: '#f43f5e', isUnknown: true });
                        }
                    } else {
                        let base = Math.floor(Math.random() * 50) + 20;
                        let top = 180 - (base * 2);
                        p.a1 = base;
                        p.a2 = base;
                        p.ans = top;
                        p.desc = "This is an isosceles triangle.";

                        p.labels.push({ ...leftPos, text: `${base}°`, color: '#0ea5e9' });
                        p.labels.push({ ...rightPos, text: `${base}°`, color: '#10b981' });
                        p.labels.push({ ...topPos, text: '?', color: '#f43f5e', isUnknown: true });
                    }
                } else {
                    p.path = "M 60 40 L 180 160 L 20 160 Z";
                    p.lines = [];
                    let ang1 = Math.floor(Math.random() * 60) + 30;
                    let ang2 = Math.floor(Math.random() * 60) + 30;
                    let ang3 = 180 - ang1 - ang2;
                    p.a1 = ang1;
                    p.a2 = ang2;
                    p.ans = ang3;
                    p.desc = "This is a scalene triangle. All angles are different.";

                    let positions = [
                        { x: 75, y: 75 },
                        { x: 45, y: 145 },
                        { x: 150, y: 145 }
                    ];
                    positions.sort(() => Math.random() - 0.5);

                    p.labels.push({ ...positions[0], text: `${ang1}°`, color: '#0ea5e9' });
                    p.labels.push({ ...positions[1], text: `${ang2}°`, color: '#10b981' });
                    p.labels.push({ ...positions[2], text: '?', color: '#f43f5e', isUnknown: true });
                }

                setProblem(p);
                setUserAns('');
                setFeedback(null);
            };

            useEffect(() => {
                generateProblem();
            }, []);

            const checkAnswer = (e) => {
                e.preventDefault();
                const numAns = parseInt(userAns);
                if (isNaN(numAns)) return;

                if (numAns === problem.ans) {
                    setFeedback({ success: true, msg: `Excellent! 180° - (${problem.a1}° + ${problem.a2}°) = ${problem.ans}°` });
                    setStreak(streak + 1);
                    setTimeout(generateProblem, 3000);
                } else {
                    setFeedback({ success: false, msg: "Not quite. Remember, angles in a triangle add up to 180°. Try again!" });
                    setStreak(0);
                }
            };

            if (!problem) return <div>Loading...</div>;

            return (
                <div className="flex flex-col md:flex-row gap-6 mt-4 animate-fade-in w-full">
                    <div className="flex-1 bg-white rounded-3xl shadow-lg border border-slate-200 p-6 flex flex-col items-center justify-center relative overflow-hidden">
                        <div className="absolute top-4 right-4 bg-amber-100 text-amber-700 font-bold px-3 py-1 rounded-full text-xs md:text-sm flex items-center">
                            <i className="fa-solid fa-fire mr-1.5"></i> Streak: {streak}
                        </div>
                        <p className="text-base md:text-lg font-bold text-slate-500 mb-4 text-center">{problem.desc}</p>
                        
                        <div className="relative w-56 h-56 md:w-64 md:h-64 mb-2">
                            <svg viewBox="0 0 200 200" className="w-full h-full drop-shadow-md">
                                <path 
                                    d={problem.path} 
                                    className="fill-slate-100 stroke-slate-600 stroke-[4] stroke-linejoin-round"
                                />
                                {problem.lines.map((line, i) => (
                                    <path key={i} d={line} fill="none" stroke="#475569" strokeWidth="3" />
                                ))}
                                {problem.labels.map((lbl, i) => (
                                    <text key={i} x={lbl.x} y={lbl.y} fill={lbl.color} fontSize={lbl.isUnknown ? "24" : "18"} fontWeight={lbl.isUnknown ? "black" : "bold"} textAnchor="middle" dominantBaseline="middle">
                                        {lbl.text}
                                    </text>
                                ))}
                            </svg>
                        </div>
                    </div>

                    <div className="flex-1 bg-gradient-to-br from-cyan-600 to-indigo-600 rounded-3xl shadow-xl p-6 md:p-8 text-white flex flex-col justify-center">
                        <h2 className="text-2xl md:text-3xl font-black mb-2">Find the Missing Angle</h2>
                        <p className="text-cyan-100 font-medium text-base md:text-lg mb-6">Angles in a triangle always add to <strong>180°</strong>.</p>
                        
                        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 md:p-6 mb-6 font-mono text-xl md:text-3xl font-bold flex justify-center items-center gap-2 md:gap-4 border border-white/20">
                            <span className="text-cyan-300">{problem.a1}°</span>
                            <span className="text-white/50">+</span>
                            <span className="text-emerald-300">{problem.a2}°</span>
                            <span className="text-white/50">+</span>
                            <span className="text-rose-400">?</span>
                            <span className="text-white/50">=</span>
                            <span className="text-white">180°</span>
                        </div>

                        <form onSubmit={checkAnswer} className="flex gap-3 md:gap-4">
                            <input 
                                type="number" 
                                value={userAns} 
                                onChange={e => setUserAns(e.target.value)}
                                placeholder="Enter angle..."
                                className="flex-1 bg-white text-slate-800 text-xl md:text-2xl font-bold rounded-xl px-4 md:px-6 py-3 focus:outline-none focus:ring-4 focus:ring-cyan-300 placeholder-slate-300 w-full min-w-0"
                                required
                            />
                            <button type="submit" className="bg-amber-400 hover:bg-amber-300 text-amber-900 font-black text-lg md:text-xl px-6 md:px-8 py-3 rounded-xl transition-all shadow-lg hover:shadow-xl hover:-translate-y-1 shrink-0">
                                Check
                            </button>
                        </form>

                        {feedback && (
                            <div className={`mt-5 p-3.5 rounded-xl font-bold text-sm md:text-lg flex items-center gap-3 ${feedback.success ? 'bg-emerald-500/20 text-emerald-100 border border-emerald-400/50' : 'bg-rose-500/20 text-rose-100 border border-rose-400/50'}`}>
                                <i className={`fa-solid ${feedback.success ? 'fa-check-circle text-emerald-300' : 'fa-xmark-circle text-rose-300'} text-xl md:text-2xl`}></i>
                                {feedback.msg}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const TriangleSandbox = () => {
            const svgRef = useRef(null);
            
            // Shifted points to avoid the top-left badges overlapping the triangle
            const [points, setPoints] = useState({
                A: { x: 250, y: 150 },
                B: { x: 150, y: 300 },
                C: { x: 380, y: 250 }
            });
            const [dragging, setDragging] = useState(null);
            const [hoveredPoint, setHoveredPoint] = useState(null);
            const [stats, setStats] = useState({ type: '', angleType: '', angles: {}, lengths: {} });

            // Math calculations
            useEffect(() => {
                const dist = (p1, p2) => Math.sqrt((p1.x - p2.x)**2 + (p1.y - p2.y)**2);
                const a = dist(points.B, points.C);
                const b = dist(points.A, points.C);
                const c = dist(points.A, points.B);

                // Law of Cosines
                const angleARad = Math.acos((b**2 + c**2 - a**2) / (2 * b * c));
                const angleBRad = Math.acos((a**2 + c**2 - b**2) / (2 * a * c));
                const angleCRad = Math.PI - angleARad - angleBRad;

                let degA = Math.round((angleARad * 180) / Math.PI);
                let degB = Math.round((angleBRad * 180) / Math.PI);
                let degC = Math.round((angleCRad * 180) / Math.PI); 
                
                // Snap right angles first (within 1 degree)
                if (Math.abs(degA - 90) <= 1) { degA = 90; }
                else if (Math.abs(degB - 90) <= 1) { degB = 90; }
                else if (Math.abs(degC - 90) <= 1) { degC = 90; }

                // Snap isosceles sides (3 pixels tolerance)
                const eps = 3;
                if (Math.abs(a - b) < eps && Math.abs(b - c) < eps) {
                    degA = 60; degB = 60; degC = 60;
                } else if (Math.abs(a - b) < eps) { 
                    let avg = Math.round((degA + degB) / 2);
                    degA = avg; degB = avg; degC = 180 - degA - degB;
                } else if (Math.abs(b - c) < eps) { 
                    let avg = Math.round((degB + degC) / 2);
                    degB = avg; degC = avg; degA = 180 - degB - degC;
                } else if (Math.abs(a - c) < eps) { 
                    let avg = Math.round((degA + degC) / 2);
                    degA = avg; degC = avg; degB = 180 - degA - degC;
                } else {
                    // Handling rounding quirks to ensure exactly 180 display for scalene
                    degC = 180 - degA - degB;
                }

                // Strict evaluation based on displayed angles guarantees UI consistency
                let sideType = "Scalene";
                if (degA === 60 && degB === 60 && degC === 60) sideType = "Equilateral"; 
                else if (degA === degB || degB === degC || degA === degC) sideType = "Isosceles";

                let angleType = "Acute";
                if (degA === 90 || degB === 90 || degC === 90) angleType = "Right-Angled";
                else if (degA > 90 || degB > 90 || degC > 90) angleType = "Obtuse";

                setStats({
                    type: sideType,
                    angleType: angleType,
                    angles: { A: degA, B: degB, C: degC },
                    lengths: { a: Math.round(a), b: Math.round(b), c: Math.round(c) }
                });

            }, [points]);

            const getRelativeCoords = (e) => {
                const rect = svgRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            };

            const handlePointerDown = (pointId, e) => {
                e.preventDefault(); 
                setDragging(pointId);
            };

            const handlePointerMove = (e) => {
                if (!dragging) return;
                e.preventDefault();
                const coords = getRelativeCoords(e);
                
                const width = svgRef.current.clientWidth;
                const height = svgRef.current.clientHeight;
                coords.x = Math.max(10, Math.min(width - 10, coords.x));
                coords.y = Math.max(10, Math.min(height - 10, coords.y));

                setPoints(prev => ({ ...prev, [dragging]: coords }));
            };

            const handlePointerUp = () => setDragging(null);

            // Shifted generation points to ensure they form off-center and don't overlap with labels
            const makeShape = (shape) => {
                if (shape === 'right') {
                    setPoints({ A: { x: 180, y: 150 }, B: { x: 180, y: 300 }, C: { x: 380, y: 300 } });
                } else if (shape === 'isosceles') {
                    setPoints({ A: { x: 280, y: 120 }, B: { x: 180, y: 320 }, C: { x: 380, y: 320 } });
                } else if (shape === 'equilateral') {
                    setPoints({ A: { x: 280, y: 146.8 }, B: { x: 180, y: 320 }, C: { x: 380, y: 320 } });
                } else if (shape === 'random-scalene') {
                    setPoints({ 
                        A: { x: Math.floor(Math.random() * 150) + 200, y: Math.floor(Math.random() * 100) + 80 }, 
                        B: { x: Math.floor(Math.random() * 100) + 100, y: Math.floor(Math.random() * 100) + 250 }, 
                        C: { x: Math.floor(Math.random() * 150) + 300, y: Math.floor(Math.random() * 100) + 200 } 
                    });
                }
            };

            // Dynamic badges
            const getBadgeColor = (type) => {
                if (type === 'Equilateral') return 'bg-emerald-100 text-emerald-800 border-emerald-300';
                if (type === 'Isosceles') return 'bg-amber-100 text-amber-800 border-amber-300';
                if (type === 'Scalene') return 'bg-indigo-100 text-indigo-800 border-indigo-300';
                if (type === 'Right-Angled') return 'bg-rose-100 text-rose-800 border-rose-300';
                if (type === 'Obtuse') return 'bg-orange-100 text-orange-800 border-orange-300';
                if (type === 'Acute') return 'bg-sky-100 text-sky-800 border-sky-300';
                return 'bg-slate-100 text-slate-800 border-slate-300';
            };

            const getAngleDescription = (type) => {
                if (type === 'Right-Angled') return 'Has a 90° angle';
                if (type === 'Obtuse') return 'Has an angle > 90°';
                if (type === 'Acute') return 'All angles < 90°';
                return '';
            };

            const getSideDescription = (type) => {
                if (type === 'Equilateral') return '3 equal sides';
                if (type === 'Isosceles') return '2 equal sides';
                if (type === 'Scalene') return 'No equal sides';
                return '';
            }

            // Calculate label offsets (Push label slightly away from centroid)
            const getLabelPos = (vertex) => {
                const centroidX = (points.A.x + points.B.x + points.C.x) / 3;
                const centroidY = (points.A.y + points.B.y + points.C.y) / 3;
                const dx = centroidX - vertex.x;
                const dy = centroidY - vertex.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                return {
                    x: vertex.x + (dx/dist) * 35,
                    y: vertex.y + (dy/dist) * 35
                };
            };

            const labelA = getLabelPos(points.A);
            const labelB = getLabelPos(points.B);
            const labelC = getLabelPos(points.C);

            // Helper to draw a square marker at a 90 degree vertex
            const getRightAnglePath = (vertex, p1, p2) => {
                const size = 20;
                const dx1 = p1.x - vertex.x; const dy1 = p1.y - vertex.y;
                const len1 = Math.sqrt(dx1*dx1 + dy1*dy1);
                const u1x = dx1 / len1; const u1y = dy1 / len1;

                const dx2 = p2.x - vertex.x; const dy2 = p2.y - vertex.y;
                const len2 = Math.sqrt(dx2*dx2 + dy2*dy2);
                const u2x = dx2 / len2; const u2y = dy2 / len2;

                const pt1 = { x: vertex.x + u1x * size, y: vertex.y + u1y * size };
                const pt2 = { x: pt1.x + u2x * size, y: pt1.y + u2y * size };
                const pt3 = { x: vertex.x + u2x * size, y: vertex.y + u2y * size };

                return `M ${pt1.x},${pt1.y} L ${pt2.x},${pt2.y} L ${pt3.x},${pt3.y}`;
            };

            return (
                <div className="flex flex-col lg:flex-row gap-4 md:gap-6 mt-2 animate-fade-in w-full items-stretch">
                    
                    {/* Left Column: Title + Controls */}
                    <div className="flex flex-col gap-4 w-full lg:w-56 shrink-0 z-10">
                        <div className="bg-white rounded-2xl md:rounded-3xl shadow-sm border border-slate-200 p-4 md:p-5 flex flex-col gap-1">
                            <h2 className="text-xl md:text-2xl font-black text-slate-800 flex items-center gap-2"><i className="fa-solid fa-gamepad text-indigo-500"></i> Sandbox</h2>
                            <p className="text-slate-500 font-medium text-xs md:text-sm">Drag the circles to change the triangle!</p>
                        </div>
                        
                        <div className="flex lg:flex-col gap-2 overflow-x-auto no-scrollbar pb-1 lg:pb-0">
                            <button onClick={() => makeShape('right')} className="flex-1 lg:flex-none flex items-center justify-center lg:justify-start px-4 py-3 bg-white text-rose-600 font-bold rounded-xl md:rounded-2xl border-2 border-rose-100 hover:bg-rose-50 hover:border-rose-300 transition-colors whitespace-nowrap text-xs md:text-sm shadow-sm"><i className="fa-solid fa-square mr-2 w-4 text-center"></i> Make Right</button>
                            <button onClick={() => makeShape('isosceles')} className="flex-1 lg:flex-none flex items-center justify-center lg:justify-start px-4 py-3 bg-white text-amber-600 font-bold rounded-xl md:rounded-2xl border-2 border-amber-100 hover:bg-amber-50 hover:border-amber-300 transition-colors whitespace-nowrap text-xs md:text-sm shadow-sm"><i className="fa-solid fa-caret-up mr-2 w-4 text-center text-lg"></i> Make Isosceles</button>
                            <button onClick={() => makeShape('equilateral')} className="flex-1 lg:flex-none flex items-center justify-center lg:justify-start px-4 py-3 bg-white text-emerald-600 font-bold rounded-xl md:rounded-2xl border-2 border-emerald-100 hover:bg-emerald-50 hover:border-emerald-300 transition-colors whitespace-nowrap text-xs md:text-sm shadow-sm"><i className="fa-solid fa-play -rotate-90 mr-2 w-4 text-center"></i> Make Equilateral</button>
                            <button onClick={() => makeShape('random-scalene')} className="flex-1 lg:flex-none flex items-center justify-center lg:justify-start px-4 py-3 bg-white text-indigo-600 font-bold rounded-xl md:rounded-2xl border-2 border-indigo-100 hover:bg-indigo-50 hover:border-indigo-300 transition-colors whitespace-nowrap text-xs md:text-sm shadow-sm"><i className="fa-solid fa-shuffle mr-2 w-4 text-center"></i> Random Scalene</button>
                        </div>
                    </div>

                    {/* Center Canvas Area */}
                    <div className="flex-1 bg-white rounded-2xl md:rounded-3xl shadow-md border border-slate-200 overflow-hidden relative min-h-[350px] md:min-h-[450px]" style={{ touchAction: 'none' }}>
                        <div className="absolute inset-0 bg-grid-pattern opacity-50"></div>
                        
                        {/* Live Badge Overlay with Explanations */}
                        <div className="absolute top-3 left-3 md:top-4 md:left-4 z-10 flex flex-col gap-2 pointer-events-none">
                            <div className={`px-3 md:px-4 py-1.5 md:py-2 rounded-xl border-2 shadow-sm flex flex-col ${getBadgeColor(stats.type)}`}>
                                <span className="font-black text-sm md:text-base leading-tight">{stats.type} Triangle</span>
                                <span className="text-[10px] md:text-xs font-bold opacity-80">{getSideDescription(stats.type)}</span>
                            </div>
                            <div className={`px-3 md:px-4 py-1.5 md:py-2 rounded-xl border-2 shadow-sm flex flex-col ${getBadgeColor(stats.angleType)}`}>
                                <span className="font-black text-sm md:text-base leading-tight">{stats.angleType} Angles</span>
                                <span className="text-[10px] md:text-xs font-bold opacity-80">{getAngleDescription(stats.angleType)}</span>
                            </div>
                        </div>

                        <svg 
                            ref={svgRef}
                            className="w-full h-[350px] md:h-full lg:h-full relative z-0 touch-none"
                            onPointerMove={handlePointerMove}
                            onPointerUp={handlePointerUp}
                            onPointerLeave={handlePointerUp}
                            onTouchMove={(e) => { if(dragging) e.preventDefault() }}
                        >
                            {/* Triangle Path */}
                            <polygon 
                                points={`${points.A.x},${points.A.y} ${points.B.x},${points.B.y} ${points.C.x},${points.C.y}`} 
                                className={`fill-indigo-100/50 stroke-indigo-600 stroke-[4] stroke-linejoin-round transition-colors duration-300
                                    ${stats.type === 'Equilateral' ? 'fill-emerald-100/50 stroke-emerald-600' : ''}
                                    ${stats.type === 'Isosceles' ? 'fill-amber-100/50 stroke-amber-600' : ''}
                                    ${stats.angleType === 'Right-Angled' ? 'fill-rose-100/50 stroke-rose-600' : ''}
                                `}
                            />

                            {/* Angle Text */}
                            <text x={labelA.x} y={labelA.y} fill="#1e293b" fontSize="16" fontWeight="bold" textAnchor="middle" alignmentBaseline="middle">{stats.angles.A}°</text>
                            <text x={labelB.x} y={labelB.y} fill="#1e293b" fontSize="16" fontWeight="bold" textAnchor="middle" alignmentBaseline="middle">{stats.angles.B}°</text>
                            <text x={labelC.x} y={labelC.y} fill="#1e293b" fontSize="16" fontWeight="bold" textAnchor="middle" alignmentBaseline="middle">{stats.angles.C}°</text>

                            {/* Right Angle Square Indicator if exactly 90 */}
                            {stats.angles.A === 90 ? <path d={getRightAnglePath(points.A, points.B, points.C)} fill="none" stroke="#f43f5e" strokeWidth="3" strokeLinejoin="round" /> : null}
                            {stats.angles.B === 90 ? <path d={getRightAnglePath(points.B, points.A, points.C)} fill="none" stroke="#f43f5e" strokeWidth="3" strokeLinejoin="round" /> : null}
                            {stats.angles.C === 90 ? <path d={getRightAnglePath(points.C, points.A, points.B)} fill="none" stroke="#f43f5e" strokeWidth="3" strokeLinejoin="round" /> : null}

                            {/* Draggable Points */}
                            {Object.keys(points).map(key => (
                                <g key={key} 
                                    onPointerDown={(e) => handlePointerDown(key, e)}
                                    onMouseEnter={() => setHoveredPoint(key)}
                                    onMouseLeave={() => setHoveredPoint(null)}
                                    className="cursor-grab active:cursor-grabbing"
                                >
                                    <circle cx={points[key].x} cy={points[key].y} r="35" fill="transparent" /> {/* Invisible larger hit area to stop hover dropping */}
                                    <circle 
                                        cx={points[key].x} 
                                        cy={points[key].y} 
                                        r={dragging === key || hoveredPoint === key ? 14 : 10} 
                                        className={`fill-white stroke-[4] transition-all duration-200 ease-out
                                            ${dragging === key ? 'stroke-cyan-500' : hoveredPoint === key ? 'stroke-indigo-400' : 'stroke-slate-800'}
                                        `}
                                    />
                                    {/* Point Label floating outside */}
                                    <text x={points[key].x} y={points[key].y - 22} fill="#64748b" fontSize="14" fontWeight="bold" textAnchor="middle">{key}</text>
                                </g>
                            ))}
                        </svg>
                    </div>

                    {/* Right Stats Panel */}
                    <div className="w-full lg:w-64 xl:w-72 bg-slate-800 text-white rounded-2xl md:rounded-3xl shadow-lg p-5 md:p-6 flex flex-col gap-4 md:gap-6 shrink-0">
                        <div>
                            <h3 className="text-slate-400 font-bold text-xs uppercase tracking-widest mb-3">Live Angles</h3>
                            <div className="space-y-2 md:space-y-3">
                                <div className="flex justify-between items-center bg-slate-700/50 p-2.5 md:p-3 rounded-xl border border-slate-600/50">
                                    <span className="font-bold text-slate-300 text-sm md:text-base">Angle A</span>
                                    <span className="font-mono text-lg md:text-xl font-black text-cyan-400">{stats.angles.A}°</span>
                                </div>
                                <div className="flex justify-between items-center bg-slate-700/50 p-2.5 md:p-3 rounded-xl border border-slate-600/50">
                                    <span className="font-bold text-slate-300 text-sm md:text-base">Angle B</span>
                                    <span className="font-mono text-lg md:text-xl font-black text-emerald-400">{stats.angles.B}°</span>
                                </div>
                                <div className="flex justify-between items-center bg-slate-700/50 p-2.5 md:p-3 rounded-xl border border-slate-600/50">
                                    <span className="font-bold text-slate-300 text-sm md:text-base">Angle C</span>
                                    <span className="font-mono text-lg md:text-xl font-black text-rose-400">{stats.angles.C}°</span>
                                </div>
                            </div>
                        </div>
                        
                        <div className="mt-auto border-t border-slate-600 pt-5 md:pt-6">
                            <div className="flex justify-between items-center">
                                <span className="font-bold text-slate-400 text-sm md:text-base">Sum of Angles:</span>
                                <span className="font-mono text-xl md:text-2xl font-black text-white bg-slate-700 px-3 py-1 rounded-lg">180°</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const TriangleApp = () => {
            const [activeTab, setActiveTab] = useState('sandbox'); // Defaulting to the new sandbox tab

            const tabs = [
                { id: 'learn', label: 'Explore', icon: 'fa-shapes' },
                { id: 'sandbox', label: 'Sandbox', icon: 'fa-gamepad' },
                { id: 'quiz', label: 'What Am I?', icon: 'fa-clipboard-question' },
                { id: 'angles', label: 'Missing Angles', icon: 'fa-calculator' }
            ];

            return (
                <div className="flex flex-col h-full w-full">
                    
                    {/* Compact Header Layout */}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-4 md:mb-6 gap-4">
                        <div className="flex items-center gap-3 md:gap-4 w-full md:w-auto">
                            <div className="inline-flex items-center justify-center w-10 h-10 md:w-12 md:h-12 bg-cyan-100 rounded-full shrink-0 shadow-inner">
                                <i className="fa-solid fa-ruler-combined text-lg md:text-xl text-cyan-600"></i>
                            </div>
                            <div className="text-left flex-1 min-w-0">
                                <h1 className="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 to-indigo-600 tracking-tight leading-none mb-0.5 truncate">Types of Triangle</h1>
                                <p className="text-xs md:text-sm text-slate-500 font-medium truncate">Stage 3 Mathematics Lesson</p>
                            </div>
                        </div>

                        {/* Navigation Tabs (Moved up to save vertical space) */}
                        <div className="bg-white rounded-full shadow-sm border border-slate-200 p-1 flex w-full md:w-auto overflow-x-auto no-scrollbar shrink-0">
                            {tabs.map(tab => (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex-1 md:flex-none px-3 md:px-5 py-2 md:py-2.5 rounded-full font-bold text-xs md:text-sm flex items-center justify-center gap-2 transition-all whitespace-nowrap
                                        ${activeTab === tab.id ? 'bg-slate-800 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-800'}`}
                                >
                                    <i className={`fa-solid ${tab.icon}`}></i> <span className="hidden sm:inline">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="flex-1 w-full flex flex-col">
                        {activeTab === 'learn' && <LearnSection />}
                        {activeTab === 'sandbox' && <TriangleSandbox />}
                        {activeTab === 'quiz' && <QuizSection />}
                        {activeTab === 'angles' && <AngleCalculator />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TriangleApp />);
    </script>
</body>
</html>
