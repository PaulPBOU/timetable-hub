<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #000; color: #f8fafc; overflow: hidden; margin: 0; }
        .meter-fill { transition: height 0.1s ease-out, background-color 0.3s; }
        .hidden { display: none !important; }
        
        /* YouTube iframe hack to act as a full-bleed background */
        #video-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none; overflow: hidden;
        }
        #yt-iframe {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vw; height: 56.25vw; /* 16:9 aspect ratio */
            min-height: 100vh; min-w-[177.77vh];
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col relative">
    
    <!-- YOUTUBE BACKGROUND -->
    <div id="video-bg">
        <iframe id="yt-iframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        <!-- Overlay to darken video slightly so UI pops -->
        <div class="absolute inset-0 bg-slate-900/60 z-10"></div>
    </div>

    <!-- UI LAYER ON TOP OF VIDEO -->
    <div class="absolute inset-0 z-10 flex flex-col p-4 md:p-6 pointer-events-none">
        
        <!-- HEADER ROW -->
        <div class="flex justify-between items-center mb-6 shrink-0 pointer-events-auto">
            <div>
                <h1 class="text-3xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 flex items-center drop-shadow-[0_0_10px_rgba(0,0,0,0.8)]">
                    <i class="fa-solid fa-headphones mr-4 text-emerald-400"></i> Learning Zone
                </h1>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="promptTimer()" class="bg-indigo-600/90 hover:bg-indigo-500 backdrop-blur-md text-white font-bold px-4 py-2 rounded-lg flex items-center transition-all shadow-[0_0_15px_rgba(79,70,229,0.5)] border border-indigo-400">
                    <i class="fa-solid fa-hourglass-start mr-2"></i> Set Timer
                </button>
                <button onclick="toggleStopwatch()" id="stopwatch-btn" class="bg-rose-600/90 hover:bg-rose-500 backdrop-blur-md text-white font-bold px-4 py-2 rounded-lg flex items-center transition-all shadow-[0_0_15px_rgba(225,29,72,0.5)] border border-rose-400">
                    <i class="fa-solid fa-stopwatch mr-2"></i> Stopwatch
                </button>
                <button onclick="window.history.back()" class="bg-slate-800/90 hover:bg-slate-700 backdrop-blur-md text-slate-200 px-4 py-2 rounded-lg flex items-center transition-colors border border-slate-500 shadow-xl ml-4">
                    <i class="fa-solid fa-xmark mr-2"></i> Exit Zone
                </button>
            </div>
        </div>

        <!-- MAIN LAYOUT -->
        <div class="flex-1 flex justify-between overflow-hidden">
            
            <!-- LEFT COLUMN: Playlist Manager (Glassmorphism) -->
            <div class="w-[350px] bg-slate-900/60 border border-slate-600/50 rounded-2xl p-5 shadow-2xl flex flex-col pointer-events-auto backdrop-blur-xl h-full">
                <h2 class="text-xl font-bold text-white mb-4 drop-shadow-md"><i class="fa-brands fa-youtube mr-2 text-red-500"></i> Focus Playlist</h2>
                
                <div class="flex gap-2 mb-4 shrink-0">
                    <input type="text" id="new-yt-url" placeholder="Paste YouTube URL..." class="flex-1 bg-slate-800/80 border border-slate-500 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500 placeholder-slate-400">
                    <button onclick="addVideo()" class="bg-cyan-600 hover:bg-cyan-500 px-3 py-2 rounded-lg text-white font-bold shadow-lg"><i class="fa-solid fa-plus"></i></button>
                </div>

                <div id="playlist" class="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-1">
                    <p class="text-slate-400 text-center text-sm mt-4">Loading playlist...</p>
                </div>
            </div>

            <!-- RIGHT COLUMN: Giant Vertical Noise Meter -->
            <div class="w-[140px] bg-slate-900/60 border border-slate-600/50 rounded-2xl p-4 shadow-2xl flex flex-col items-center pointer-events-auto backdrop-blur-xl h-full">
                <h2 class="text-lg font-bold text-white mb-4 text-center leading-tight drop-shadow-md"><i class="fa-solid fa-volume-high text-cyan-400 block text-2xl mb-1"></i> Noise</h2>
                
                <button id="start-mic-btn" onclick="startMic()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg shadow-lg mb-4 text-xs flex flex-col items-center">
                    <i class="fa-solid fa-microphone text-xl mb-1"></i> Enable Mic
                </button>

                <div id="meter-container" class="flex-1 w-full bg-slate-800/80 rounded-full border border-slate-500 overflow-hidden relative hidden flex flex-col-reverse shadow-inner">
                    <!-- The Bar grows from bottom to top -->
                    <div id="meter-bar" class="w-full h-[0%] bg-emerald-500 meter-fill rounded-full shadow-[0_0_15px_rgba(16,185,129,0.8)]"></div>
                    
                    <!-- Horizontal Markers -->
                    <div class="absolute bottom-[60%] left-0 right-0 border-b-4 border-yellow-500/80 z-10 w-full drop-shadow-md"></div>
                    <div class="absolute bottom-[85%] left-0 right-0 border-b-4 border-red-500/80 z-10 w-full drop-shadow-md"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- MASSIVE TIME DISPLAY OVERLAY -->
    <div id="time-display-container" class="absolute inset-0 z-20 flex flex-col items-center justify-center pointer-events-none hidden">
        <h1 id="huge-time-text" class="text-[18vw] font-black text-white drop-shadow-[0_10px_30px_rgba(0,0,0,0.9)] tracking-tighter leading-none">00:00</h1>
        <button id="dismiss-timer-btn" onclick="dismissTime()" class="pointer-events-auto mt-4 bg-white/20 hover:bg-white/40 backdrop-blur-md border border-white/50 text-white px-8 py-3 rounded-full text-xl font-bold transition-all shadow-2xl">
            Dismiss Timer
        </button>
    </div>

    <!-- FULLSCREEN NOISE ALARM OVERLAY -->
    <div id="alarm-overlay" class="hidden fixed inset-0 z-[999] bg-red-600/95 backdrop-blur-xl flex flex-col items-center justify-center animate-pulse">
        <i class="fa-solid fa-triangle-exclamation text-white text-9xl mb-8 drop-shadow-2xl"></i>
        <h1 class="text-6xl md:text-8xl font-black text-white text-center tracking-tight mb-8 drop-shadow-2xl">TOO LOUD</h1>
        <p class="text-3xl text-white font-bold mb-12 drop-shadow-lg">We need to be silent now.</p>
        <button onclick="dismissAlarm()" class="bg-white text-red-600 hover:bg-slate-200 font-extrabold text-2xl px-12 py-6 rounded-full shadow-2xl border-4 border-red-800 transition-transform hover:scale-105">
            Dismiss Alarm
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEGrh2SIC20vJj_nLm4x34ok01srxip7I",
            authDomain: "paul-s-2026.firebaseapp.com",
            projectId: "paul-s-2026",
            storageBucket: "paul-s-2026.firebasestorage.app",
            messagingSenderId: "524167059781",
            appId: "1:524167059781:web:57347f46b29c9d4a49862c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let playlistData = [];

        signInAnonymously(auth).then(() => {
            const docRef = doc(db, "settings", "learning_zone");
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    playlistData = docSnap.data().videos || [];
                } else {
                    playlistData = [{ url: "https://www.youtube.com/watch?v=lTRiuFIWV54", title: "Lofi Focus Music" }];
                    setDoc(docRef, { videos: playlistData }, { merge: true });
                }
                renderPlaylist();
            });
        });

        // --- YOUTUBE LOGIC ---
        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        window.addVideo = () => {
            const input = document.getElementById('new-yt-url');
            const url = input.value;
            if (extractVideoID(url)) {
                playlistData.push({ url: url, title: `Video ${playlistData.length + 1}` });
                setDoc(doc(db, "settings", "learning_zone"), { videos: playlistData }, { merge: true });
                input.value = '';
            } else {
                alert("Please enter a valid YouTube link.");
            }
        }

        window.playVideo = (url) => {
            const vidId = extractVideoID(url);
            if(vidId) {
                // To auto-loop, playlist needs to be the same ID
                document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${vidId}?autoplay=1&mute=0&controls=0&loop=1&playlist=${vidId}`;
            }
        }

        window.deleteVideo = (index) => {
            playlistData.splice(index, 1);
            setDoc(doc(db, "settings", "learning_zone"), { videos: playlistData }, { merge: true });
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            if(playlistData.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-center text-sm mt-4">Add a YouTube link above.</p>';
            }
            playlistData.forEach((vid, idx) => {
                container.innerHTML += `
                <div class="flex items-center justify-between bg-slate-800/80 p-3 rounded-lg border border-slate-600 hover:border-cyan-500 group transition-all mb-2">
                    <button onclick="playVideo('${vid.url}')" class="flex-1 text-left flex items-center text-slate-200 hover:text-white transition-colors">
                        <i class="fa-brands fa-youtube text-red-500 mr-3 text-xl drop-shadow"></i>
                        <span class="text-sm font-bold truncate w-40">${vid.title}</span>
                    </button>
                    <button onclick="deleteVideo(${idx})" class="text-slate-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity p-2"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            });
        }

        // --- TIME CONTROLS ---
        let timeInterval = null;
        let timeMode = null; // 'timer' or 'stopwatch'
        let timeRemaining = 0; // for timer
        let timeElapsed = 0; // for stopwatch

        // Generate Beep Sound for Timer Zero
        let audioCtx;
        function playBeep() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1); // beep for 1 sec
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateTimeUI(text) {
            document.getElementById('time-display-container').classList.remove('hidden');
            document.getElementById('huge-time-text').innerText = text;
        }

        window.promptTimer = () => {
            const mins = prompt("Enter minutes for Countdown Timer:", "5");
            if (!mins || isNaN(mins)) return;
            
            clearInterval(timeInterval);
            timeMode = 'timer';
            timeRemaining = parseInt(mins) * 60;
            updateTimeUI(formatTime(timeRemaining));

            timeInterval = setInterval(() => {
                timeRemaining--;
                updateTimeUI(formatTime(timeRemaining));
                if(timeRemaining <= 0) {
                    clearInterval(timeInterval);
                    playBeep();
                    document.getElementById('huge-time-text').innerText = "TIME'S UP!";
                }
            }, 1000);
        }

        window.toggleStopwatch = () => {
            const btn = document.getElementById('stopwatch-btn');
            if(timeMode === 'stopwatch') {
                // Pause it
                clearInterval(timeInterval);
                timeMode = null;
                btn.innerHTML = '<i class="fa-solid fa-stopwatch mr-2"></i> Stopwatch';
                btn.classList.replace('bg-slate-600', 'bg-rose-600/90');
            } else {
                // Start it
                clearInterval(timeInterval);
                timeMode = 'stopwatch';
                timeElapsed = 0;
                btn.innerHTML = '<i class="fa-solid fa-pause mr-2"></i> Pause';
                btn.classList.replace('bg-rose-600/90', 'bg-slate-600');
                updateTimeUI(formatTime(timeElapsed));
                
                timeInterval = setInterval(() => {
                    timeElapsed++;
                    updateTimeUI(formatTime(timeElapsed));
                }, 1000);
            }
        }

        window.dismissTime = () => {
            clearInterval(timeInterval);
            timeMode = null;
            document.getElementById('time-display-container').classList.add('hidden');
            const btn = document.getElementById('stopwatch-btn');
            btn.innerHTML = '<i class="fa-solid fa-stopwatch mr-2"></i> Stopwatch';
            btn.classList.replace('bg-slate-600', 'bg-rose-600/90');
        }

        // --- AUDIO METER & ALARM LOGIC ---
        let analyser, microphone, scriptNode;
        let redStartTime = null;
        let alarmOscillator = null;

        window.startMic = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('start-mic-btn').classList.add('hidden');
                document.getElementById('meter-container').classList.remove('hidden');

                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 1024;

                microphone = audioCtx.createMediaStreamSource(stream);
                scriptNode = audioCtx.createScriptProcessor(2048, 1, 1);

                microphone.connect(analyser);
                analyser.connect(scriptNode);
                scriptNode.connect(audioCtx.destination);

                scriptNode.onaudioprocess = function() {
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) { values += array[i]; }
                    const average = values / array.length;
                    
                    // Convert raw audio to a percentage (0 to 100)
                    let volumePercent = Math.min(Math.round(average * 1.5), 100);
                    updateMeter(volumePercent);
                }
            } catch (err) {
                alert("Microphone access denied or not available.");
                console.error(err);
            }
        }

        function updateMeter(vol) {
            const bar = document.getElementById('meter-bar');
            bar.style.height = vol + '%'; // Updated to vertical height

            if (vol < 60) {
                bar.style.backgroundColor = '#10b981'; // Green
                bar.style.boxShadow = '0 0 15px rgba(16,185,129,0.8)';
                redStartTime = null;
            } else if (vol >= 60 && vol < 85) {
                bar.style.backgroundColor = '#eab308'; // Yellow
                bar.style.boxShadow = '0 0 15px rgba(234,179,8,0.8)';
                redStartTime = null;
            } else {
                bar.style.backgroundColor = '#ef4444'; // Red
                bar.style.boxShadow = '0 0 25px rgba(239,68,68,1)';
                
                // Track how long it stays red
                if (!redStartTime) {
                    redStartTime = Date.now();
                } else if (Date.now() - redStartTime > 5000) { // 5 SECONDS
                    triggerAlarm();
                }
            }
        }

        function triggerAlarm() {
            if (alarmOscillator) return; // Already alarming
            
            document.getElementById('alarm-overlay').classList.remove('hidden');
            
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            alarmOscillator = audioCtx.createOscillator();
            alarmOscillator.type = 'sawtooth';
            alarmOscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // A4 note
            alarmOscillator.connect(audioCtx.destination);
            alarmOscillator.start();
        }

        window.dismissAlarm = () => {
            if (alarmOscillator) {
                alarmOscillator.stop();
                alarmOscillator.disconnect();
                alarmOscillator = null;
            }
            redStartTime = null;
            document.getElementById('alarm-overlay').classList.add('hidden');
        }
    </script>
</body>
</html>
