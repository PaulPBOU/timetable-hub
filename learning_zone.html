<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #000; color: #f8fafc; overflow: hidden; margin: 0; }
        .meter-fill { transition: height 0.1s ease-out, background-color 0.3s; }
        .hidden { display: none !important; }
        
        /* YouTube iframe hack to act as a full-bleed background */
        #video-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none; overflow: hidden;
            background: transparent;
        }
        #yt-iframe {
            position: absolute;
            top: 50%; left: 50%;
            width: 100vw; height: 56.25vw; /* 16:9 aspect ratio */
            min-height: 100vh; min-w-[177.77vh];
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col relative bg-transparent">
    
    <div id="start-overlay" class="fixed inset-0 z-50 bg-black/90 backdrop-blur-xl flex flex-col items-center justify-center pointer-events-auto transition-opacity duration-500">
        <button id="enter-zone-btn" onclick="startZone()" disabled class="bg-slate-500/20 text-slate-400 font-extrabold text-2xl md:text-4xl py-6 px-12 rounded-3xl transition-all border border-slate-400/30 flex items-center backdrop-blur-md cursor-not-allowed">
            <i class="fa-solid fa-spinner fa-spin mr-4"></i> Loading...
        </button>
    </div>

    <canvas id="pattern-canvas" class="hidden fixed top-0 left-0 w-screen h-screen z-0 pointer-events-none"></canvas>

    <div id="video-bg">
        <iframe id="yt-iframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <div class="absolute inset-0 z-10 flex flex-col p-4 md:p-6 pointer-events-none">
        
        <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
            <div class="absolute w-[30vw] h-[30vw] bg-emerald-500/10 blur-[100px] rounded-full top-1/4 left-1/4 animate-[pulse_8s_ease-in-out_infinite]"></div>
            <div class="absolute w-[40vw] h-[40vw] bg-cyan-500/10 blur-[120px] rounded-full bottom-1/4 right-1/4 animate-[pulse_12s_ease-in-out_infinite_alternate]"></div>
        </div>

        <div class="relative z-10 flex justify-between items-center mb-6 shrink-0 pointer-events-auto">
            <div>
                <h1 class="text-3xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 flex items-center drop-shadow-[0_0_10px_rgba(0,0,0,0.8)]">
                    <i class="fa-solid fa-headphones mr-4 text-emerald-400"></i> Learning Zone
                </h1>
            </div>
            
            <div class="flex items-center gap-2 md:gap-3">
                <button onclick="promptTimer()" class="bg-white/10 hover:bg-white/20 backdrop-blur-md text-white/70 w-11 h-11 md:w-12 md:h-12 rounded-xl flex justify-center items-center transition-all shadow-lg border border-white/10">
                    <i class="fa-solid fa-hourglass-start text-lg md:text-xl"></i>
                </button>
                
                <button onclick="toggleStopwatch()" id="stopwatch-btn" class="bg-white/10 hover:bg-white/20 backdrop-blur-md text-white/70 w-11 h-11 md:w-12 md:h-12 rounded-xl flex justify-center items-center transition-all shadow-lg border border-white/10">
                    <i class="fa-solid fa-stopwatch text-lg md:text-xl"></i>
                </button>

                <button onclick="window.history.back()" class="bg-rose-500/20 hover:bg-rose-500/40 backdrop-blur-md text-rose-200 hover:text-white w-11 h-11 md:w-12 md:h-12 rounded-xl flex justify-center items-center transition-all border border-rose-500/30 shadow-lg ml-2">
                    <i class="fa-solid fa-xmark text-xl md:text-2xl"></i>
                </button>
            </div>
        </div>

        <div class="relative z-10 flex-1 flex justify-between overflow-hidden">
            
            <div class="w-[180px] md:w-[220px] bg-slate-900/10 border border-white/10 rounded-2xl p-3 shadow-2xl flex flex-col pointer-events-auto backdrop-blur-md h-full">
                <h2 class="text-sm md:text-base font-bold text-white/60 mb-3 drop-shadow-md flex items-center"><i class="fa-brands fa-youtube mr-2 text-white/50"></i> Focus Playlist</h2>
                
                <div class="flex gap-1.5 mb-3 shrink-0 w-full">
                    <input type="text" id="new-yt-url" placeholder="Paste URL..." class="flex-1 w-0 bg-white/5 border border-white/10 rounded-lg px-2 py-1.5 text-[10px] md:text-xs text-white/70 focus:outline-none focus:border-white/30 placeholder-white/30 transition-colors">
                    <button onclick="addVideo()" class="bg-white/10 hover:bg-white/20 px-2.5 py-1.5 rounded-lg text-white/60 font-bold shadow-md transition-colors shrink-0"><i class="fa-solid fa-plus text-[10px] md:text-xs"></i></button>
                </div>

                <div id="playlist" class="flex-1 overflow-y-auto custom-scrollbar space-y-1.5 pr-1">
                    <p class="text-white/30 text-center text-xs mt-4">Loading...</p>
                </div>
            </div>

            <div class="w-[120px] md:w-[140px] bg-slate-900/10 border border-white/10 rounded-2xl p-4 shadow-2xl flex flex-col items-center pointer-events-auto backdrop-blur-md h-full">
                <h2 class="text-base md:text-lg font-bold text-white/70 mb-4 text-center leading-tight drop-shadow-md"><i class="fa-solid fa-volume-high text-cyan-400/80 block text-xl md:text-2xl mb-1"></i> Noise</h2>
                
                <button id="start-mic-btn" onclick="startMic()" class="w-full bg-cyan-600/40 hover:bg-cyan-500/60 text-white/80 font-bold py-3 rounded-xl shadow-lg mb-4 text-[10px] md:text-xs flex flex-col items-center border border-cyan-400/30 transition-colors">
                    <i class="fa-solid fa-microphone text-lg md:text-xl mb-1"></i> Enable Mic
                </button>

                <div id="meter-container" class="flex-1 w-full bg-black/20 rounded-full border border-white/10 overflow-hidden relative hidden flex flex-col-reverse shadow-inner backdrop-blur-sm">
                    <div id="meter-bar" class="w-full h-[0%] bg-emerald-500/70 meter-fill rounded-full shadow-[0_0_15px_rgba(16,185,129,0.5)]"></div>
                    
                    <div class="absolute bottom-[60%] left-0 right-0 border-b-2 md:border-b-4 border-yellow-500/50 z-10 w-full drop-shadow-md"></div>
                    <div class="absolute bottom-[85%] left-0 right-0 border-b-2 md:border-b-4 border-red-500/50 z-10 w-full drop-shadow-md"></div>
                </div>
            </div>

        </div>
    </div>

    <div id="time-display-container" class="absolute inset-0 z-20 flex flex-col items-center justify-center pointer-events-none hidden bg-transparent">
        <div class="bg-black/20 backdrop-blur-md rounded-[3rem] p-8 md:p-12 flex flex-col items-center border border-white/10 pointer-events-auto shadow-2xl">
            <h1 id="huge-time-text" class="text-[12vw] md:text-[14vw] font-black text-white/90 drop-shadow-[0_10px_30px_rgba(0,0,0,0.5)] tracking-tighter leading-none">00:00</h1>
            <button id="dismiss-timer-btn" onclick="dismissTime()" class="mt-6 md:mt-8 bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20 text-white/80 px-8 py-3 rounded-full text-lg md:text-xl font-bold transition-all shadow-xl">
                Dismiss Timer
            </button>
        </div>
    </div>

    <div id="alarm-overlay" class="hidden fixed inset-0 z-[999] bg-red-600/95 backdrop-blur-xl flex flex-col items-center justify-center animate-pulse">
        <i class="fa-solid fa-triangle-exclamation text-white text-9xl mb-8 drop-shadow-2xl"></i>
        <h1 class="text-6xl md:text-8xl font-black text-white text-center tracking-tight mb-8 drop-shadow-2xl">TOO LOUD</h1>
        <p class="text-3xl text-white font-bold mb-12 drop-shadow-lg">We need to be silent now.</p>
        <button onclick="dismissAlarm()" class="bg-white text-red-600 hover:bg-slate-200 font-extrabold text-2xl px-12 py-6 rounded-full shadow-2xl border-4 border-red-800 transition-transform hover:scale-105 pointer-events-auto">
            Dismiss Alarm
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEGrh2SIC20vJj_nLm4x34ok01srxip7I",
            authDomain: "paul-s-2026.firebaseapp.com",
            projectId: "paul-s-2026",
            storageBucket: "paul-s-2026.firebasestorage.app",
            messagingSenderId: "524167059781",
            appId: "1:524167059781:web:57347f46b29c9d4a49862c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let playlistData = [];
        let zoneStarted = false; 

        // --- NEW AUDIO VARIABLES ---
        let currentAudio = null;
        const patternMusic = {
            'ps3': 'https://firebasestorage.googleapis.com/v0/b/paul-s-2026.firebasestorage.app/o/Enchanted%20Fern%20Hollow.mp3?alt=media&token=3f23becf-85e0-450a-a9bf-ae6fc1970262', 
            'tendrils': 'https://firebasestorage.googleapis.com/v0/b/paul-s-2026.firebasestorage.app/o/Magical%20Mossy%20Glade.mp3?alt=media&token=2521aae3-74c0-4d21-a43c-2f9782211bf1',
            'nebula': 'https://firebasestorage.googleapis.com/v0/b/paul-s-2026.firebasestorage.app/o/Steady%20Glade%20Meditation.mp3?alt=media&token=088385a4-363f-4bc4-8088-d6216db9a046'
        };

        // --- CODE PATTERN ANIMATION LOGIC ---
        let currentPattern = null; 
        let animationId = null;
        let patternTime = 0;
        let tendrils = [];
        let particles = [];

        window.animatePattern = () => {
            if (!currentPattern) {
                cancelAnimationFrame(animationId);
                animationId = null;
                return;
            }
            
            const canvas = document.getElementById('pattern-canvas');
            const ctx = canvas.getContext('2d');
            
            if(canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                tendrils = [];
                particles = [];
            }

            if (currentPattern === 'ps3') {
                let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                bgGrad.addColorStop(0, '#000000');
                bgGrad.addColorStop(1, '#0f172a'); 
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                patternTime += 0.015;
                
                for(let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    for(let x = 0; x <= canvas.width + 20; x += 20) {
                        let y = canvas.height / 2 
                              + Math.sin(x * 0.002 + patternTime + i * 1.5) * (150 + i * 30) 
                              + Math.sin(x * 0.005 - patternTime * 0.8) * 80;
                        if(x === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    for(let x = canvas.width + 20; x >= 0; x -= 20) {
                        let y = canvas.height / 2 
                              + Math.sin(x * 0.002 + patternTime + i * 1.5) * (150 + i * 30) 
                              + Math.sin(x * 0.005 - patternTime * 0.8) * 80;
                        ctx.lineTo(x, y + 60 + i * 20); 
                    }
                    ctx.closePath();
                    
                    let grad = ctx.createLinearGradient(0, 0, canvas.width, 0);
                    grad.addColorStop(0, `hsla(${patternTime*30 + i*80}, 80%, 60%, 0.3)`);
                    grad.addColorStop(0.5, `hsla(${patternTime*30 + i*80 + 40}, 80%, 60%, 0.5)`);
                    grad.addColorStop(1, `hsla(${patternTime*30 + i*80 + 80}, 80%, 60%, 0.1)`);
                    
                    ctx.fillStyle = grad;
                    ctx.fill();
                    
                    ctx.strokeStyle = `hsla(${patternTime*30 + i*80 + 20}, 100%, 70%, 0.6)`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

            } else if (currentPattern === 'tendrils') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.35)'; 
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                if(tendrils.length === 0) {
                    for(let i=0; i<150; i++) {
                        tendrils.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            speed: 2 + Math.random() * 6,
                            length: 20 + Math.random() * 80,
                            hue: 130 + Math.random() * 60,
                            width: Math.random() * 1.5 + 0.5
                        });
                    }
                }
                
                tendrils.forEach(t => {
                    ctx.beginPath();
                    let glow = ctx.createLinearGradient(t.x, t.y, t.x, t.y - t.length);
                    glow.addColorStop(0, `hsla(${t.hue}, 100%, 60%, 1)`);
                    glow.addColorStop(1, `hsla(${t.hue}, 100%, 60%, 0)`);
                    
                    ctx.moveTo(t.x, t.y);
                    ctx.lineTo(t.x, t.y - t.length);
                    ctx.strokeStyle = glow;
                    ctx.lineWidth = t.width;
                    ctx.stroke();
                    
                    t.y += t.speed;
                    if (t.y - t.length > canvas.height) {
                        t.y = -Math.random() * 100;
                        t.x = Math.random() * canvas.width;
                    }
                });

            } else if (currentPattern === 'nebula') {
                ctx.fillStyle = 'rgba(8, 5, 20, 0.35)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                if(particles.length === 0) {
                    for(let i=0; i<600; i++) {
                        particles.push({
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            vx: (Math.random() - 0.5) * 0.3,
                            vy: (Math.random() - 0.5) * 0.3,
                            radius: Math.random() * 2 + 0.5, 
                            pulseSpeed: 0.01 + Math.random() * 0.02,
                            pulseTime: Math.random() * Math.PI * 2,
                            hue: 240 + Math.random() * 100,
                            isLarge: Math.random() > 0.95 
                        });
                    }
                }

                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.y -= 0.15;

                    if (p.x < -20) p.x = canvas.width + 20;
                    if (p.x > canvas.width + 20) p.x = -20;
                    if (p.y < -20) p.y = canvas.height + 20;
                    if (p.y > canvas.height + 20) p.y = -20;

                    p.pulseTime += p.pulseSpeed;
                    let currentRadius = p.radius + Math.sin(p.pulseTime) * (p.radius * 0.4);

                    ctx.beginPath();
                    if (p.isLarge) {
                        ctx.arc(p.x, p.y, currentRadius * 5, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${p.hue}, 80%, 60%, 0.08)`;
                        ctx.shadowBlur = 30;
                        ctx.shadowColor = `hsla(${p.hue}, 100%, 70%, 0.5)`;
                    } else {
                        ctx.arc(p.x, p.y, currentRadius, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${p.hue}, 80%, 70%, 0.6)`;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = `hsla(${p.hue}, 100%, 70%, 0.4)`;
                    }
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });
            }
            
            animationId = requestAnimationFrame(window.animatePattern);
        }

        window.playPattern = (type = 'ps3') => {
            document.getElementById('video-bg').classList.add('hidden');
            document.getElementById('pattern-canvas').classList.remove('hidden');
            document.getElementById('yt-iframe').src = ""; 
            
            if (currentPattern !== type) {
                currentPattern = type;
                tendrils = [];
                particles = [];
                
                const canvas = document.getElementById('pattern-canvas');
                if(canvas) {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }

                // Stop current audio before switching
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                }

                // Start new audio
                if (patternMusic[type] && patternMusic[type] !== 'YOUR_PS3_MP3_URL_HERE') {
                    currentAudio = new Audio(patternMusic[type]);
                    currentAudio.loop = true;
                    currentAudio.play().catch(e => console.log("Audio autoplay blocked until user interacts:", e));
                }
            }

            if (!animationId) window.animatePattern();
        };

        // --- END PATTERN LOGIC ---

        signInAnonymously(auth).then(() => {
            const docRef = doc(db, "settings", "learning_zone");
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    playlistData = docSnap.data().videos || [];
                } else {
                    playlistData = [{ url: "https://www.youtube.com/watch?v=lTRiuFIWV54", title: "Lofi Focus Music" }];
                    setDoc(docRef, { videos: playlistData }, { merge: true });
                }
                renderPlaylist();
                
                const btn = document.getElementById('enter-zone-btn');
                if (btn && !zoneStarted) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-play mr-4"></i> Enter Learning Zone';
                    btn.className = 'bg-emerald-500/20 hover:bg-emerald-500/40 text-emerald-300 hover:text-white font-extrabold text-2xl md:text-4xl py-6 px-12 rounded-3xl shadow-[0_0_30px_rgba(16,185,129,0.2)] hover:shadow-[0_0_50px_rgba(16,185,129,0.5)] transition-all hover:scale-105 border border-emerald-400/30 flex items-center backdrop-blur-md cursor-pointer';
                }
                
                if (zoneStarted && document.getElementById('yt-iframe').src === "" && !currentPattern) {
                    playPattern('ps3');
                }
            });
        });

        window.startZone = () => {
            const overlay = document.getElementById('start-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.classList.add('hidden'), 500);
            zoneStarted = true;
            playPattern('ps3');
        };

        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        window.addVideo = () => {
            const input = document.getElementById('new-yt-url');
            const url = input.value;
            if (extractVideoID(url)) {
                playlistData.push({ url: url, title: `Video ${playlistData.length + 1}` });
                setDoc(doc(db, "settings", "learning_zone"), { videos: playlistData }, { merge: true });
                input.value = '';
            } else {
                alert("Please enter a valid YouTube link.");
            }
        }

        window.playVideo = (url) => {
            currentPattern = null;
            if(animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            // Stop pattern music when youtube plays
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            document.getElementById('pattern-canvas').classList.add('hidden');
            document.getElementById('video-bg').classList.remove('hidden');

            const vidId = extractVideoID(url);
            if(vidId) {
                document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${vidId}?autoplay=1&mute=0&controls=0&modestbranding=1&showinfo=0&rel=0&iv_load_policy=3`;
            }
        }

        window.deleteVideo = (index) => {
            playlistData.splice(index, 1);
            setDoc(doc(db, "settings", "learning_zone"), { videos: playlistData }, { merge: true });
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = '';

            container.innerHTML += `
            <div class="flex flex-col gap-1.5 mb-2">
                <div onclick="playPattern('ps3')" class="flex items-center justify-between bg-emerald-500/10 hover:bg-emerald-500/30 p-2 rounded-lg border border-emerald-500/20 group transition-all backdrop-blur-sm shadow-sm cursor-pointer">
                    <div class="flex-1 text-left flex items-center text-emerald-400 group-hover:text-emerald-200 transition-colors overflow-hidden pr-2 pointer-events-none">
                        <i class="fa-solid fa-wave-square text-emerald-500 mr-2 text-[10px] md:text-xs drop-shadow shrink-0"></i>
                        <span class="text-[10px] md:text-xs font-bold truncate">PS3 Wave</span>
                    </div>
                </div>
                <div onclick="playPattern('tendrils')" class="flex items-center justify-between bg-cyan-500/10 hover:bg-cyan-500/30 p-2 rounded-lg border border-cyan-500/20 group transition-all backdrop-blur-sm shadow-sm cursor-pointer">
                    <div class="flex-1 text-left flex items-center text-cyan-400 group-hover:text-cyan-200 transition-colors overflow-hidden pr-2 pointer-events-none">
                        <i class="fa-solid fa-cloud-showers-heavy text-cyan-500 mr-2 text-[10px] md:text-xs drop-shadow shrink-0"></i>
                        <span class="text-[10px] md:text-xs font-bold truncate">Raining Tendrils</span>
                    </div>
                </div>
                <div onclick="playPattern('nebula')" class="flex items-center justify-between bg-purple-500/10 hover:bg-purple-500/30 p-2 rounded-lg border border-purple-500/20 group transition-all backdrop-blur-sm shadow-sm cursor-pointer">
                    <div class="flex-1 text-left flex items-center text-purple-400 group-hover:text-purple-200 transition-colors overflow-hidden pr-2 pointer-events-none">
                        <i class="fa-solid fa-certificate text-purple-500 mr-2 text-[10px] md:text-xs drop-shadow shrink-0"></i>
                        <span class="text-[10px] md:text-xs font-bold truncate">Cosmic Drift</span>
                    </div>
                </div>
            </div>`;

            if(playlistData.length === 0) {
                container.innerHTML += '<p class="text-white/30 text-center text-[10px] md:text-xs mt-4">Add a YouTube link above.</p>';
            }
            playlistData.forEach((vid, idx) => {
                container.innerHTML += `
                <div onclick="playVideo('${vid.url}')" class="flex items-center justify-between bg-white/5 p-2 rounded-lg border border-white/5 hover:border-white/20 hover:bg-white/10 group transition-all mb-1.5 backdrop-blur-sm shadow-sm cursor-pointer">
                    <div class="flex-1 text-left flex items-center text-white/60 group-hover:text-white transition-colors overflow-hidden pr-2 pointer-events-none">
                        <i class="fa-brands fa-youtube text-white/40 mr-2 text-[10px] md:text-xs drop-shadow shrink-0"></i>
                        <span class="text-[10px] md:text-xs font-medium truncate">${vid.title}</span>
                    </div>
                    <button onclick="event.stopPropagation(); deleteVideo(${idx})" class="text-white/20 hover:text-red-400/80 opacity-0 group-hover:opacity-100 transition-opacity p-1 shrink-0 z-10"><i class="fa-solid fa-trash text-[10px]"></i></button>
                </div>`;
            });
        }

        // --- TIME CONTROLS ---
        let timeInterval = null;
        let timeMode = null; 
        let timeRemaining = 0; 
        let timeElapsed = 0; 

        let audioCtx;
        function playBeep() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1); 
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updateTimeUI(text) {
            document.getElementById('time-display-container').classList.remove('hidden');
            document.getElementById('huge-time-text').innerText = text;
        }

        window.promptTimer = () => {
            const mins = prompt("Enter minutes for Countdown Timer:", "5");
            if (!mins || isNaN(mins)) return;
            
            clearInterval(timeInterval);
            timeMode = 'timer';
            timeRemaining = parseInt(mins) * 60;
            updateTimeUI(formatTime(timeRemaining));

            timeInterval = setInterval(() => {
                timeRemaining--;
                updateTimeUI(formatTime(timeRemaining));
                if(timeRemaining <= 0) {
                    clearInterval(timeInterval);
                    playBeep();
                    document.getElementById('huge-time-text').innerText = "TIME'S UP!";
                }
            }, 1000);
        }

        window.toggleStopwatch = () => {
            const btn = document.getElementById('stopwatch-btn');
            if(timeMode === 'stopwatch') {
                clearInterval(timeInterval);
                timeMode = null;
                btn.innerHTML = '<i class="fa-solid fa-stopwatch text-lg md:text-xl"></i>';
                btn.classList.remove('bg-emerald-500/30', 'border-emerald-500/40', 'text-emerald-300');
                btn.classList.add('bg-white/10', 'border-white/10', 'text-white/70');
            } else {
                clearInterval(timeInterval);
                timeMode = 'stopwatch';
                timeElapsed = 0;
                btn.innerHTML = '<i class="fa-solid fa-pause text-lg md:text-xl"></i>';
                btn.classList.remove('bg-white/10', 'border-white/10', 'text-white/70');
                btn.classList.add('bg-emerald-500/30', 'border-emerald-500/40', 'text-emerald-300');
                
                updateTimeUI(formatTime(timeElapsed));
                
                timeInterval = setInterval(() => {
                    timeElapsed++;
                    updateTimeUI(formatTime(timeElapsed));
                }, 1000);
            }
        }

        window.dismissTime = () => {
            clearInterval(timeInterval);
            timeMode = null;
            document.getElementById('time-display-container').classList.add('hidden');
            const btn = document.getElementById('stopwatch-btn');
            btn.innerHTML = '<i class="fa-solid fa-stopwatch text-lg md:text-xl"></i>';
            btn.classList.remove('bg-emerald-500/30', 'border-emerald-500/40', 'text-emerald-300');
            btn.classList.add('bg-white/10', 'border-white/10', 'text-white/70');
        }

        // --- AUDIO METER & ALARM LOGIC ---
        let analyser, microphone, scriptNode;
        let redStartTime = null;
        let alarmOscillator = null;

        window.startMic = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('start-mic-btn').classList.add('hidden');
                document.getElementById('meter-container').classList.remove('hidden');

                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 1024;

                microphone = audioCtx.createMediaStreamSource(stream);
                scriptNode = audioCtx.createScriptProcessor(2048, 1, 1);

                microphone.connect(analyser);
                analyser.connect(scriptNode);
                scriptNode.connect(audioCtx.destination);

                scriptNode.onaudioprocess = function() {
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) { values += array[i]; }
                    const average = values / array.length;
                    
                    let volumePercent = Math.min(Math.round(average * 1.5), 100);
                    updateMeter(volumePercent);
                }
            } catch (err) {
                alert("Microphone access denied or not available.");
                console.error(err);
            }
        }

        function updateMeter(vol) {
            const bar = document.getElementById('meter-bar');
            bar.style.height = vol + '%'; 

            if (vol < 60) {
                bar.style.backgroundColor = 'rgba(16, 185, 129, 0.7)'; 
                bar.style.boxShadow = '0 0 15px rgba(16,185,129,0.5)';
                redStartTime = null;
            } else if (vol >= 60 && vol < 85) {
                bar.style.backgroundColor = 'rgba(234, 179, 8, 0.7)'; 
                bar.style.boxShadow = '0 0 15px rgba(234,179,8,0.5)';
                redStartTime = null;
            } else {
                bar.style.backgroundColor = 'rgba(239, 68, 68, 0.8)'; 
                bar.style.boxShadow = '0 0 25px rgba(239,68,68,0.7)';
                
                if (!redStartTime) {
                    redStartTime = Date.now();
                } else if (Date.now() - redStartTime > 5000) { 
                    triggerAlarm();
                }
            }
        }

        function triggerAlarm() {
            if (alarmOscillator) return; 
            
            document.getElementById('alarm-overlay').classList.remove('hidden');
            
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            alarmOscillator = audioCtx.createOscillator();
            alarmOscillator.type = 'sawtooth';
            alarmOscillator.frequency.setValueAtTime(440, audioCtx.currentTime); 
            alarmOscillator.connect(audioCtx.destination);
            alarmOscillator.start();
        }

        window.dismissAlarm = () => {
            if (alarmOscillator) {
                alarmOscillator.stop();
                alarmOscillator.disconnect();
                alarmOscillator = null;
            }
            redStartTime = null;
            document.getElementById('alarm-overlay').classList.add('hidden');
        }
    </script>
</body>
</html>
