<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Zone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        .meter-fill { transition: width 0.1s ease-out, background-color 0.3s; }
        .hidden { display: none !important; }
        
        /* YouTube wrapper to make it fill space */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 1rem;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="w-screen h-screen flex flex-col p-4 md:p-6">
    
    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6 z-10 shrink-0">
        <div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 flex items-center">
                <i class="fa-solid fa-headphones mr-3 text-emerald-400"></i> Learning Zone
            </h1>
        </div>
        <a href="index.html" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 rounded-lg flex items-center transition-colors border border-slate-600 shadow-xl">
            <i class="fa-solid fa-xmark mr-2"></i> Exit Zone
        </a>
    </div>

    <!-- MAIN GRID -->
    <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 overflow-hidden">
        
        <!-- LEFT COLUMN: YouTube Video & Controls -->
        <div class="lg:col-span-2 flex flex-col bg-slate-900/80 border border-slate-700/50 rounded-2xl p-4 shadow-2xl relative">
            <div id="video-display" class="flex-1 video-container bg-black shadow-inner hidden">
                <iframe id="yt-iframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            
            <div id="empty-video-state" class="flex-1 flex flex-col items-center justify-center text-slate-500 border-2 border-dashed border-slate-700 rounded-xl">
                <i class="fa-brands fa-youtube text-6xl mb-4 text-slate-600"></i>
                <p class="text-xl font-bold">Select a video from your playlist</p>
            </div>
        </div>

        <!-- RIGHT COLUMN: Noise Meter & Playlist -->
        <div class="flex flex-col gap-6 overflow-hidden">
            
            <!-- NOISE METER -->
            <div class="bg-slate-900/80 border border-slate-700/50 rounded-2xl p-6 shadow-2xl shrink-0 flex flex-col items-center relative">
                <h2 class="text-xl font-bold text-white mb-4"><i class="fa-solid fa-volume-high mr-2 text-cyan-400"></i> Noise Level</h2>
                
                <button id="start-mic-btn" onclick="startMic()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg shadow-lg mb-4">
                    <i class="fa-solid fa-microphone mr-2"></i> Enable Microphone
                </button>

                <div id="meter-container" class="w-full h-12 bg-slate-800 rounded-full border border-slate-600 overflow-hidden relative hidden">
                    <div id="meter-bar" class="h-full w-[0%] bg-emerald-500 meter-fill"></div>
                    <!-- Markers -->
                    <div class="absolute top-0 bottom-0 left-[60%] border-l-2 border-yellow-500/50 z-10"></div>
                    <div class="absolute top-0 bottom-0 left-[85%] border-l-2 border-red-500/50 z-10"></div>
                </div>
                <p id="meter-status" class="text-slate-400 text-sm mt-3 font-semibold hidden">Monitoring classroom volume...</p>
            </div>

            <!-- PLAYLIST MANAGER -->
            <div class="bg-slate-900/80 border border-slate-700/50 rounded-2xl p-6 shadow-2xl flex-1 flex flex-col overflow-hidden">
                <h2 class="text-xl font-bold text-white mb-4"><i class="fa-solid fa-list mr-2 text-indigo-400"></i> Focus Playlist</h2>
                
                <div class="flex gap-2 mb-4 shrink-0">
                    <input type="text" id="new-yt-url" placeholder="Paste YouTube URL..." class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">
                    <button onclick="addVideo()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded-lg text-white font-bold"><i class="fa-solid fa-plus"></i></button>
                </div>

                <div id="playlist" class="flex-1 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                    <!-- Playlist generated by Firebase -->
                    <p class="text-slate-500 text-center text-sm mt-4">Loading playlist...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- FULLSCREEN ALARM OVERLAY -->
    <div id="alarm-overlay" class="hidden fixed inset-0 z-[999] bg-red-600/95 backdrop-blur-md flex flex-col items-center justify-center animate-pulse">
        <i class="fa-solid fa-triangle-exclamation text-white text-9xl mb-8"></i>
        <h1 class="text-6xl md:text-8xl font-black text-white text-center tracking-tight mb-8">TOO LOUD</h1>
        <p class="text-3xl text-white font-bold mb-12">We need to be silent now.</p>
        <button onclick="dismissAlarm()" class="bg-white text-red-600 hover:bg-slate-200 font-extrabold text-2xl px-12 py-6 rounded-full shadow-2xl">
            Dismiss Alarm
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEGrh2SIC20vJj_nLm4x34ok01srxip7I",
            authDomain: "paul-s-2026.firebaseapp.com",
            projectId: "paul-s-2026",
            storageBucket: "paul-s-2026.firebasestorage.app",
            messagingSenderId: "524167059781",
            appId: "1:524167059781:web:57347f46b29c9d4a49862c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let playlistData = [];

        signInAnonymously(auth).then(() => {
            const docRef = doc(db, "settings", "learning_zone");
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    playlistData = docSnap.data().videos || [];
                } else {
                    playlistData = [{ url: "https://www.youtube.com/watch?v=lTRiuFIWV54", title: "Lofi Focus Music" }];
                    setDoc(docRef, { videos: playlistData }, { merge: true });
                }
                renderPlaylist();
            });
        });

        // --- YOUTUBE LOGIC ---
        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        window.addVideo = () => {
            const input = document.getElementById('new-yt-url');
            const url = input.value;
            if (extractVideoID(url)) {
                playlistData.push({ url: url, title: `Video ${playlistData.length + 1}` });
                setDoc(doc(db, "settings", "learning_zone"), { videos: playlistData }, { merge: true });
                input.value = '';
            } else {
                alert("Please enter a valid YouTube link.");
            }
        }

        window.playVideo = (url) => {
            const vidId = extractVideoID(url);
            if(vidId) {
                document.getElementById('empty-video-state').classList.add('hidden');
                document.getElementById('video-display').classList.remove('hidden');
                document.getElementById('yt-iframe').src = `https://www.youtube.com/embed/${vidId}?autoplay=1`;
            }
        }

        window.deleteVideo = (index) => {
            playlistData.splice(index, 1);
            setDoc(doc(db, "settings", "learning_zone"), { videos: playlistData }, { merge: true });
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            playlistData.forEach((vid, idx) => {
                container.innerHTML += `
                <div class="flex items-center justify-between bg-slate-800 p-3 rounded-lg border border-slate-700 group">
                    <button onclick="playVideo('${vid.url}')" class="flex-1 text-left flex items-center hover:text-cyan-400 transition-colors">
                        <i class="fa-brands fa-youtube text-red-500 mr-3 text-lg"></i>
                        <span class="text-sm font-semibold truncate w-48">${vid.title}</span>
                    </button>
                    <button onclick="deleteVideo(${idx})" class="text-slate-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            });
        }

        // --- AUDIO METER & ALARM LOGIC ---
        let audioContext, analyser, microphone, scriptNode;
        let redStartTime = null;
        let alarmOscillator = null;

        window.startMic = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('start-mic-btn').classList.add('hidden');
                document.getElementById('meter-container').classList.remove('hidden');
                document.getElementById('meter-status').classList.remove('hidden');

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 1024;

                microphone = audioContext.createMediaStreamSource(stream);
                scriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                microphone.connect(analyser);
                analyser.connect(scriptNode);
                scriptNode.connect(audioContext.destination);

                scriptNode.onaudioprocess = function() {
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) { values += array[i]; }
                    const average = values / array.length;
                    
                    // Convert raw audio to a percentage (0 to 100)
                    // You may need to tweak the multiplier (e.g., 1.5) depending on your laptop mic sensitivity
                    let volumePercent = Math.min(Math.round(average * 1.5), 100);
                    updateMeter(volumePercent);
                }
            } catch (err) {
                alert("Microphone access denied or not available.");
                console.error(err);
            }
        }

        function updateMeter(vol) {
            const bar = document.getElementById('meter-bar');
            bar.style.width = vol + '%';

            if (vol < 60) {
                bar.style.backgroundColor = '#10b981'; // Green
                redStartTime = null;
                document.getElementById('meter-status').innerText = "Good quiet noise.";
            } else if (vol >= 60 && vol < 85) {
                bar.style.backgroundColor = '#eab308'; // Yellow
                redStartTime = null;
                document.getElementById('meter-status').innerText = "Collaborative learning volume.";
            } else {
                bar.style.backgroundColor = '#ef4444'; // Red
                document.getElementById('meter-status').innerText = "TOO LOUD!";
                
                // Track how long it stays red
                if (!redStartTime) {
                    redStartTime = Date.now();
                } else if (Date.now() - redStartTime > 5000) { // 5 SECONDS
                    triggerAlarm();
                }
            }
        }

        function triggerAlarm() {
            if (alarmOscillator) return; // Already alarming
            
            // Show massive red overlay
            document.getElementById('alarm-overlay').classList.remove('hidden');
            
            // Create a jarring continuous beep using the Audio API
            alarmOscillator = audioContext.createOscillator();
            alarmOscillator.type = 'sawtooth';
            alarmOscillator.frequency.setValueAtTime(440, audioContext.currentTime); // A4 note
            alarmOscillator.connect(audioContext.destination);
            alarmOscillator.start();
        }

        window.dismissAlarm = () => {
            if (alarmOscillator) {
                alarmOscillator.stop();
                alarmOscillator.disconnect();
                alarmOscillator = null;
            }
            redStartTime = null;
            document.getElementById('alarm-overlay').classList.add('hidden');
        }
    </script>
</body>
</html>
