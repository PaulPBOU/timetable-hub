        }
    </style>
</head>

    <a href="learning_zone.html" class="fixed bottom-4 right-4 md:bottom-6 md:right-6 w-14 h-14 bg-emerald-600 hover:bg-emerald-500 text-white rounded-full flex items-center justify-center transition-all shadow-[0_0_15px_rgba(16,185,129,0.4)] hover:shadow-[0_0_25px_rgba(16,185,129,0.6)] z-50 border border-emerald-400 group">

                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.theme = 'dark';
            }
        };
        
        if (localStorage.theme === 'light' || (!('theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {

            document.querySelectorAll('.print-dropdown').forEach(d => {
                d.classList.add('hidden');
                d.classList.remove('flex');

                d.classList.add('hidden');

        // URL ROUTER LOGIC
        window.addEventListener('hashchange', handleHashRouting);
        
        function handleHashRouting() {
            const hash = decodeURIComponent(window.location.hash.replace('#', ''));
            if (!hash || hash === 'landing') {
                renderView('landing');
            } else if (hash === 'terms') {
                renderView('term-select');
            } else {
                const parts = hash.split('/');
                if (parts.length === 1) { 
                    window.appState.term = parts[0];
                    renderView('week-select');
                } else if (parts.length >= 2) {
                    const term = parts[0];
                    const week = parts[1];
                    window.appState.term = term;
                    window.appState.week = week;
                    loadWeekData(term, week);
                    
                    if (parts.length === 3) {
                        window.appState.day = parts[2];
                        renderView('day');
                    } else {
                        renderView('week');
                    }
                }
            }
        }

        window.navigate = (path) => { window.location.hash = path; };

        const getPrintLinks = (linkData) => {
            if (Array.isArray(linkData)) return linkData.filter(l => l.trim() !== '');
            if (typeof linkData === 'string' && linkData.trim() !== '') return [linkData.trim()];
            return [];
        };

        window.navigateWeek = (dir) => {
            let termNum = parseInt(window.appState.term.replace('Term ', ''));
            let weekNum = parseInt(window.appState.week.replace('Week ', ''));
            weekNum += dir;
            if (weekNum < 1) {
                termNum -= 1;
                if (termNum < 1) return; 
                weekNum = 12; 
            } else if (weekNum > 12) {
                termNum += 1;
                if (termNum > 4) return; 
                weekNum = 1;
            }
            navigate(`Term ${termNum}/Week ${weekNum}`);
        };

        window.navigateDay = (dir) => {
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday'];
            let curIdx = days.indexOf(window.appState.day);

            if (curIdx < 0) {
                let termNum = parseInt(window.appState.term.replace('Term ', ''));
                let weekNum = parseInt(window.appState.week.replace('Week ', ''));
                weekNum -= 1;
                if (weekNum < 1) {
                    termNum -= 1;
                    if(termNum < 1) return;
                    weekNum = 12;
                }
                navigate(`Term ${termNum}/Week ${weekNum}/Thursday`);
            } else if (curIdx >= days.length) {
                let termNum = parseInt(window.appState.term.replace('Term ', ''));
                let weekNum = parseInt(window.appState.week.replace('Week ', ''));
                weekNum += 1;
                if (weekNum > 12) {

                    if(termNum > 4) return;
                    weekNum = 1;
                }
                navigate(`Term ${termNum}/Week ${weekNum}/Monday`);

        // Date Logic
        window.getCurrentSchoolTime = () => {

            const terms = [
                { name: 'Term 1', start: new Date('2026-01-28') }, { name: 'Term 2', start: new Date('2026-04-20') },
                { name: 'Term 3', start: new Date('2026-07-20') }, { name: 'Term 4', start: new Date('2026-10-12') }
            ];
            let curTerm = 'Term 2', weekNum = 1;
            for(let i = terms.length - 1; i >= 0; i--) {
                if(now >= terms[i].start) {
                    curTerm = terms[i].name;
                    weekNum = Math.floor((now - terms[i].start) / (7 * 24 * 60 * 60 * 1000)) + 1;
                    break;
                }
            }
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            let curDay = days[now.getDay()];
            if (curDay === 'Saturday' || curDay === 'Sunday' || curDay === 'Friday') {
                curDay = 'Monday'; weekNum += 1;
            }
            return { term: curTerm, week: `Week ${Math.min(Math.max(weekNum, 1), 12)}`, day: curDay };
        };

                return { term: term, week: `Week ${weekNum - 1}` };

        window.moveLessonToNextDay = async (day, idx, btn) => {

            if (curIdx === days.length - 1) {
                showToast("Cannot move Thursday lesson past the end of the current view.");
                return;
            }
            
            if (btn.dataset.confirmed === "true") {
                const nextDay = days[curIdx + 1];
                let updatedWeekData = { ...window.appState.weekData };
                
                if (!updatedWeekData[nextDay] || updatedWeekData[nextDay].length === 0 || updatedWeekData[nextDay][0].type === 'cancelled') {
                    updatedWeekData[nextDay] = getSkeleton();

                const blockToMove = { ...updatedWeekData[day][idx] };

                updatedWeekData[day][idx] = { ...skeletonBlock }; 
                
                setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: updatedWeekData }, { merge: true });

                btn.classList.add('bg-amber-200', 'dark:bg-amber-700', 'text-amber-700', 'dark:text-amber-200');

                const prevTime = getPreviousSchoolWeek(window.appState.term, window.appState.week);
                if (prevTime) {
                    try {
                        const docRef = doc(db, "timetables", `2026_${prevTime.term.replace(' ', '')}_${prevTime.week.replace(' ', '')}`);

                        if (docSnap.exists() && docSnap.data().days && docSnap.data().days['Thursday']) {

                        }

                if (lowerSub === 'rff' || lowerSub === 'science rff' || lowerSub === 'pdh rff') {
                    return {
                        bar: 'bg-stripes-rff',
                        iconColor: 'text-slate-600 dark:text-slate-400',

                        icon: lowerSub === 'science rff' ? 'fa-flask' : (lowerSub === 'pdh rff' ? 'fa-heart-pulse' : 'fa-person-chalkboard')
                    };
                }
                // English specific subsets
                if (lowerSub.includes('shared reading')) {
                    return { bar: 'bg-cyan-500', iconColor: 'text-cyan-500', badgeBg: 'bg-cyan-50 dark:bg-cyan-900/30', badgeText: 'text-cyan-700 dark:text-cyan-300', badgeBorder: 'border-cyan-200 dark:border-cyan-800', icon: 'fa-book-open-reader' };

                if (lowerSub.includes('writing')) {

                if (lowerSub.startsWith('english')) {
                     return { bar: 'bg-sky-500', iconColor: 'text-sky-500', badgeBg: 'bg-sky-50 dark:bg-sky-900/30', badgeText: 'text-sky-700 dark:text-sky-300', badgeBorder: 'border-sky-200 dark:border-sky-800', icon: 'fa-book' };

                // Standard subjects
                if (lowerSub.startsWith('maths') || lowerSub.startsWith('math')) {

            html += '</div>';

            document.getElementById('edit-subject').value = window.appState.editingBlock.subject || '';
            document.getElementById('edit-topic').value = window.appState.editingBlock.topic || '';
            document.getElementById('edit-outline').value = window.appState.editingBlock.unitOutlineLink || '';
            document.getElementById('edit-plan').value = window.appState.editingBlock.lessonPlanLink || '';
            document.getElementById('edit-slides').value = window.appState.editingBlock.slidesLink || '';

            const printLinks = getPrintLinks(window.appState.editingBlock.printLink);

                    ${i > 0 ? `<button onclick="this.parentElement.remove()" class="absolute right-2 text-slate-400 hover:text-red-500 p-1"><i class="fa-solid fa-xmark"></i></button>` : ''}

            container.insertAdjacentHTML('beforeend', `
            <div class="relative flex items-center mt-1.5 print-input-group">
                <i class="fa-solid fa-print absolute left-3 text-pink-500"></i>
                <input type="url" placeholder="https://..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg pl-9 pr-8 py-2.5 text-slate-900 dark:text-white focus:outline-none focus:border-pink-500 edit-print-input" />
                <button onclick="this.parentElement.remove()" class="absolute right-2 text-slate-400 hover:text-red-500 p-1"><i class="fa-solid fa-xmark"></i></button>
            </div>`);
        };

        window.saveEdit = () => {
            const updated = [...window.appState.weekData[window.appState.day]];
            const idx = window.appState.editingBlock.index;
            
            const printInputs = Array.from(document.querySelectorAll('.edit-print-input')).map(inp => inp.value.trim()).filter(val => val !== '');

            updated[idx].subject = document.getElementById('edit-subject').value;
            updated[idx].topic = document.getElementById('edit-topic').value;
            updated[idx].unitOutlineLink = document.getElementById('edit-outline').value;
            updated[idx].lessonPlanLink = document.getElementById('edit-plan').value;
            updated[idx].slidesLink = document.getElementById('edit-slides').value;
            updated[idx].printLink = printInputs;
            
            setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: { ...window.appState.weekData, [window.appState.day]: updated } }, { merge: true });
            closeModals();
        };

        window.initAddDay = (day) => {
            window.appState.addingDay = day; window.appState.newDayForm = getSkeleton();
            document.getElementById('add-day-title').innerText = day;
            const form = document.getElementById('add-day-form'); form.innerHTML = '';
            window.appState.newDayForm.forEach((block, idx) => {
                if(block.type === 'break') form.innerHTML += `<div class="py-1 text-center text-amber-600 dark:text-amber-400 font-medium tracking-widest uppercase text-[10px] bg-amber-50 dark:bg-amber-900/20 border border-dashed border-amber-300 dark:border-amber-700/50 rounded">${block.topic} (${block.time})</div>`;
                else form.innerHTML += `
                    <div class="bg-white dark:bg-slate-900/50 p-2.5 rounded border border-slate-200 dark:border-slate-700 space-y-2">
                        <div class="flex justify-between items-center border-b border-slate-200 dark:border-slate-700 pb-1.5 mb-1.5">
                            <span class="text-cyan-600 dark:text-cyan-400 font-bold text-[11px]">${block.time}</span>
                            <input type="text" id="add-sub-${idx}" value="${block.subject}" class="bg-transparent text-slate-800 dark:text-slate-200 font-bold text-xs text-right focus:outline-none border-b border-transparent focus:border-cyan-500" />
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                            <div>
                                <label class="block text-[9px] uppercase text-slate-500 dark:text-slate-400 mb-0.5">Topic</label>
                                <input type="text" id="add-top-${idx}" value="${block.topic}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded px-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-cyan-500" />
                            </div>
                            <div>
                                <label class="block text-[9px] uppercase text-amber-600 dark:text-amber-400 mb-0.5">Personal Outline</label>
                                <div class="relative flex items-center">
                                    <i class="fa-solid fa-folder-open absolute left-2 text-amber-500 text-[10px]"></i>
                                    <input type="url" id="add-outline-${idx}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-amber-500" />
                                </div>
                            </div>
                            <div>
                                <label class="block text-[9px] uppercase text-emerald-600 dark:text-emerald-400 mb-0.5">Plan Link</label>
                                <div class="relative flex items-center">
                                    <i class="fa-solid fa-file-lines absolute left-2 text-emerald-500 text-[10px]"></i>
                                    <input type="url" id="add-plan-${idx}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500" />
                                </div>
                            </div>
                            <div>
                                <label class="block text-[9px] uppercase text-indigo-600 dark:text-indigo-400 mb-0.5">Slides</label>
                                <div class="relative flex items-center">
                                    <i class="fa-solid fa-desktop absolute left-2 text-indigo-500 text-[10px]"></i>
                                    <input type="url" id="add-slide-${idx}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-indigo-500" />
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between items-center mb-0.5">
                                    <label class="block text-[9px] uppercase text-pink-600 dark:text-pink-400">Print Link(s)</label>
                                    <button onclick="addPopulatePrintInput(${idx})" class="text-[9px] bg-pink-100 dark:bg-pink-500/20 text-pink-600 dark:text-pink-400 px-1.5 rounded hover:bg-pink-200 dark:hover:bg-pink-500/40 transition-colors shadow-sm"><i class="fa-solid fa-plus"></i></button>
                                </div>
                                <div id="add-print-container-${idx}" class="space-y-1">
                                    <div class="relative flex items-center">
                                        <i class="fa-solid fa-print absolute left-2 text-pink-500 text-[10px]"></i>
                                        <input type="url" class="add-print-${idx} w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-pink-500" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('modal-add').classList.remove('hidden'); document.getElementById('modal-add').classList.add('flex');
        };

        window.initCancelDay = (day) => {
            window.appState.cancellingDay = day;
            document.getElementById('cancel-day-title').innerText = day;
            document.getElementById('cancel-day-note').value = '';
            document.getElementById('modal-cancel').classList.remove('hidden');
            document.getElementById('modal-cancel').classList.add('flex');
        };

        window.saveCancelDay = () => {
            const note = document.getElementById('cancel-day-note').value.trim();
            const cancelledData = [{ type: 'cancelled', note: note }];
            setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: { ...window.appState.weekData, [window.appState.cancellingDay]: cancelledData } }, { merge: true });
            closeModals();
        };

        window.addPopulatePrintInput = (idx) => {
            const container = document.getElementById(`add-print-container-${idx}`);
            container.insertAdjacentHTML('beforeend', `
            <div class="relative flex items-center mt-1">
                <i class="fa-solid fa-print absolute left-2 text-pink-500 text-[10px]"></i>
                <input type="url" class="add-print-${idx} w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-6 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-pink-500" />
                <button onclick="this.parentElement.remove()" class="absolute right-1 text-slate-400 hover:text-red-500 p-0.5"><i class="fa-solid fa-xmark text-[10px]"></i></button>
            </div>`);
        };

        window.saveFullDay = () => {
            const updated = window.appState.newDayForm.map((b, idx) => {
                if (b.type === 'break') return b;
                
                const printLinks = Array.from(document.querySelectorAll(`.add-print-${idx}`)).map(inp => inp.value.trim()).filter(val => val !== '');

                return {
                    ...b, 
                    subject: document.getElementById(`add-sub-${idx}`).value, 
                    topic: document.getElementById(`add-top-${idx}`).value, 
                    unitOutlineLink: document.getElementById(`add-outline-${idx}`).value, 
                    lessonPlanLink: document.getElementById(`add-plan-${idx}`).value, 
                    slidesLink: document.getElementById(`add-slide-${idx}`).value, 
                    printLink: printLinks 
                };
            });
            
            setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: { ...window.appState.weekData, [window.appState.addingDay]: updated } }, { merge: true });
            closeModals();
        };
    </script>
</body>
</html>
