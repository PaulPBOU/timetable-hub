<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul's School Day</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            padding: 0;
            width: 100vw; 
            height: 100vh;
            position: fixed;
            inset: 0;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.6); border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 0.9); }
        .hidden { display: none !important; }
        
        .bg-stripes-red {
            background-color: rgba(254, 226, 226, 0.4);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(244, 63, 94, 0.05) 10px, rgba(244, 63, 94, 0.05) 20px);
        }
        .dark .bg-stripes-red {
            background-color: rgba(159, 18, 57, 0.15);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(244, 63, 94, 0.05) 10px, rgba(244, 63, 94, 0.05) 20px);
        }
        
        /* New RFF Stripe Class */
        .bg-stripes-rff {
            background-color: #475569; /* slate-600 */
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255, 255, 255, 0.1) 10px, rgba(255, 255, 255, 0.1) 20px);
        }
        .dark .bg-stripes-rff {
            background-color: #334155; /* slate-700 */
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255, 255, 255, 0.05) 10px, rgba(255, 255, 255, 0.05) 20px);
        }

        /* Cover Class Purple Stripes */
        .bg-stripes-purple {
            background-color: rgba(168, 85, 247, 0.03);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(168, 85, 247, 0.05) 10px, rgba(168, 85, 247, 0.05) 20px);
        }
        .dark .bg-stripes-purple {
            background-color: rgba(168, 85, 247, 0.05);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(168, 85, 247, 0.05) 10px, rgba(168, 85, 247, 0.05) 20px);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-2 md:p-4 bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
    <!-- Ambient Background Glows -->
    <div class="absolute filter blur-[100px] md:blur-[120px] z-0 opacity-40 dark:opacity-30 rounded-full w-[300px] md:w-[500px] h-[300px] md:h-[500px] bg-indigo-200 dark:bg-indigo-600 top-[-10%] left-[-10%] pointer-events-none transition-colors duration-300"></div>
    <div class="absolute filter blur-[100px] md:blur-[120px] z-0 opacity-40 dark:opacity-30 rounded-full w-[250px] md:w-[400px] h-[250px] md:h-[400px] bg-cyan-200 dark:bg-cyan-600 bottom-[-10%] right-[-5%] pointer-events-none transition-colors duration-300"></div>

    <a href="learning_zone.html" class="fixed bottom-4 right-4 md:bottom-6 md:right-6 w-14 h-14 bg-emerald-600 hover:bg-emerald-500 text-white rounded-full flex items-center justify-center transition-all shadow-[0_0_15px_rgba(16,185,129,0.4)] hover:shadow-[0_0_25px_rgba(16,185,129,0.6)] z-50 border border-emerald-400 group">
        <i class="fa-solid fa-headphones text-xl"></i>
        <!-- Hover Tooltip -->
        <span class="absolute right-16 top-1/2 -translate-y-1/2 bg-white dark:bg-slate-800 text-emerald-600 dark:text-emerald-400 text-xs font-bold px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none border border-emerald-200 dark:border-emerald-500/30 shadow-lg">Enter Learning Zone</span>
    </a>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Main App Container -->
    <div class="relative w-full max-w-7xl h-full z-10 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-slate-200 dark:border-slate-700/50 rounded-2xl md:rounded-[2rem] shadow-2xl p-4 md:p-6 flex flex-col overflow-hidden min-h-0 transition-colors duration-300">

        <!-- UNIFIED APP HEADER -->
        <header id="app-header" class="hidden flex-col sm:flex-row justify-between items-center shrink-0 mb-4 pb-3 md:pb-4 border-b border-slate-200 dark:border-slate-700/70 w-full gap-3 sm:gap-4 transition-all duration-300">
            
            <!-- Left: Dynamic Context Titles -->
            <div class="flex flex-col items-center sm:items-start w-full sm:w-1/3 order-2 sm:order-1 shrink-0">
                <div class="flex items-center gap-2 mb-0.5">
                    <h1 id="header-title" class="text-2xl md:text-3xl font-black text-slate-800 dark:text-white tracking-tight leading-none">Title</h1>
                </div>
                <div class="flex items-center gap-2">
                    <span id="header-live-dot" class="relative flex h-2 w-2 hidden">
                    </span>
                    <p id="header-subtitle" class="text-slate-500 dark:text-slate-400 text-[10px] md:text-xs font-bold uppercase tracking-widest">Subtitle</p>
                </div>
            </div>

            <!-- Center: Subtle Nav Arrows -->
            <div id="header-nav" class="hidden flex items-center bg-slate-100/50 dark:bg-slate-800/40 rounded-xl p-0.5 border border-slate-200/50 dark:border-slate-700/50 w-auto justify-center order-3 sm:order-2 shrink-0 shadow-inner">
                <button onclick="handleNavArrow(-1)" class="w-8 h-8 md:w-9 md:h-9 rounded-lg hover:bg-white dark:hover:bg-slate-700 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 flex items-center justify-center transition-all"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                <div class="w-px h-4 bg-slate-200 dark:bg-slate-700 mx-1"></div>
                <button onclick="handleNavArrow(1)" class="w-8 h-8 md:w-9 md:h-9 rounded-lg hover:bg-white dark:hover:bg-slate-700 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 flex items-center justify-center transition-all"><i class="fa-solid fa-chevron-right text-xs"></i></button>
            </div>

            <!-- Right: The Glass Pill (Controls) -->
            <div class="flex items-center justify-center sm:justify-end w-full sm:w-1/3 order-1 sm:order-3 shrink-0 gap-2 md:gap-3">
                
                <!-- Cover Class Toggle Button (Only visible on Day View) -->
                <button id="header-toggle-cover-btn" onclick="toggleCoverDay(window.appState.day)" class="hidden items-center justify-center h-8 w-8 md:h-9 md:w-9 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-400 dark:text-slate-500 hover:text-purple-500 hover:bg-purple-50 dark:hover:bg-purple-900/20 transition-all shadow-sm" title="Toggle Class Cover">
                    <i class="fa-solid fa-chalkboard-user text-xs md:text-sm"></i>
                </button>

                <div class="flex items-center bg-slate-100 dark:bg-slate-800 border border-slate-200/80 dark:border-slate-700/80 shadow-sm rounded-full p-1 transition-all duration-300">
                    <!-- Back Button -->
                    <button id="global-back-btn" class="hidden items-center group pl-2 pr-3 h-8 md:h-9 hover:bg-white dark:hover:bg-slate-700/50 rounded-full transition-all duration-300" onclick="handleGlobalBack()">
                        <div class="w-6 h-6 md:w-7 md:h-7 rounded-full bg-white dark:bg-slate-600 shadow-sm flex items-center justify-center group-hover:-translate-x-0.5 transition-transform duration-300 border border-slate-100 dark:border-slate-500 text-slate-500 dark:text-slate-300">
                            <i class="fa-solid fa-chevron-left text-[10px] md:text-xs"></i>
                        </div>
                        <span id="global-back-text" class="ml-1.5 font-bold text-[10px] md:text-xs text-slate-600 dark:text-slate-300">Back</span>
                    </button>
                    
                    <!-- Dynamic Divider -->
                    <div id="global-divider" class="hidden w-px h-5 bg-slate-200 dark:bg-slate-600 mx-1"></div>

                    <!-- Home Button -->
                    <button onclick="navigate('landing')" class="w-8 h-8 md:w-9 md:h-9 rounded-full flex items-center justify-center hover:bg-white dark:hover:bg-slate-700/50 text-slate-500 dark:text-slate-400 hover:text-cyan-600 dark:hover:text-cyan-400 transition-colors" title="Home">
                        <i class="fa-solid fa-house text-xs md:text-sm"></i>
                    </button>
                    
                    <!-- Theme Button -->
                    <button onclick="toggleTheme()" class="w-8 h-8 md:w-9 md:h-9 rounded-full flex items-center justify-center hover:bg-white dark:hover:bg-slate-700/50 text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors" title="Toggle Theme">
                        <i id="theme-icon" class="fa-solid fa-moon text-xs md:text-sm transition-transform hover:rotate-12"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- LANDING PAGE -->
        <div id="view-landing" class="flex flex-col items-center justify-center h-full space-y-10 animate-in fade-in zoom-in duration-500">
            <div class="text-center">
                <i class="fa-solid fa-graduation-cap text-6xl text-cyan-500 dark:text-cyan-400 mb-6 drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]"></i>
                <h1 class="text-4xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 to-indigo-600 dark:from-cyan-400 dark:to-indigo-400 mb-4">Paul 2026</h1>
                <p class="text-slate-500 dark:text-slate-400 text-base md:text-xl font-medium tracking-wide">Classroom Management Hub</p>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 w-full max-w-2xl px-4">
                <button onclick="jumpToCurrentWeek()" class="flex-1 bg-gradient-to-br from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-5 md:py-6 rounded-2xl shadow-lg border border-cyan-400/30 hover:border-cyan-300 transition-all text-xl md:text-2xl flex flex-col items-center justify-center group">
                    <i class="fa-regular fa-calendar-check text-3xl mb-2 group-hover:scale-110 transition-transform"></i>
                    Current Week
                </button>
                <button onclick="navigate('terms')" class="flex-1 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-800 dark:text-white font-bold py-5 md:py-6 rounded-2xl shadow-lg border border-slate-300 dark:border-slate-600 dark:hover:border-slate-400 transition-all text-xl md:text-2xl flex flex-col items-center justify-center group">
                    <i class="fa-solid fa-table-list text-3xl mb-2 group-hover:scale-110 transition-transform"></i>
                    Daily Schedule
                </button>
            </div>
        </div>

        <!-- TERM SELECTOR -->
        <div id="view-term-select" class="hidden flex-col items-center justify-center h-full animate-in fade-in duration-300 min-h-0">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-lg overflow-y-auto custom-scrollbar p-2">
                <button onclick="navigate('Term 1')" class="bg-slate-100 dark:bg-slate-800/80 hover:bg-indigo-100 dark:hover:bg-indigo-600 text-slate-800 dark:text-white font-bold py-5 md:py-6 rounded-xl shadow-md border border-slate-300 dark:border-transparent dark:hover:border-indigo-500 transition-all text-xl">Term 1</button>
                <button onclick="navigate('Term 2')" class="bg-slate-100 dark:bg-slate-800/80 hover:bg-cyan-100 dark:hover:bg-cyan-600 text-slate-800 dark:text-white font-bold py-5 md:py-6 rounded-xl shadow-md border border-slate-300 dark:border-transparent dark:hover:border-cyan-500 transition-all text-xl">Term 2</button>
                <button onclick="navigate('Term 3')" class="bg-slate-100 dark:bg-slate-800/80 hover:bg-emerald-100 dark:hover:bg-emerald-600 text-slate-800 dark:text-white font-bold py-5 md:py-6 rounded-xl shadow-md border border-slate-300 dark:border-transparent dark:hover:border-emerald-500 transition-all text-xl">Term 3</button>
                <button onclick="navigate('Term 4')" class="bg-slate-100 dark:bg-slate-800/80 hover:bg-rose-100 dark:hover:bg-rose-600 text-slate-800 dark:text-white font-bold py-5 md:py-6 rounded-xl shadow-md border border-slate-300 dark:border-transparent dark:hover:border-rose-500 transition-all text-xl">Term 4</button>
            </div>
        </div>

        <!-- WEEK SELECTOR -->
        <div id="view-week-select" class="hidden flex-col h-full items-center justify-start animate-in fade-in duration-300 min-h-0 pt-2">
            <div id="week-grid-container" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4 w-full max-w-6xl custom-scrollbar overflow-y-auto pb-4 pt-2 flex-1 px-1 md:px-4 mx-auto">
                <!-- Injected dynamically -->
            </div>
        </div>

        <!-- WEEK VIEW -->
        <div id="view-week" class="hidden flex-col h-full animate-in fade-in duration-300 min-h-0">
            <div id="week-grid" class="grid grid-cols-1 md:grid-cols-4 gap-3 md:gap-4 flex-1 overflow-y-auto overflow-x-hidden custom-scrollbar pb-4 min-w-full pt-1">
                <!-- Columns injected dynamically -->
            </div>
        </div>

        <!-- DAY VIEW -->
        <div id="view-day" class="hidden flex-col h-full animate-in slide-in-from-right-8 duration-300 min-h-0">
            <!-- Container for the day's lesson blocks -->
            <div id="day-blocks-container" class="flex-1 overflow-y-auto custom-scrollbar pr-2 md:pr-4 relative transition-all duration-500 rounded-2xl mt-1">
                <div id="day-blocks" class="space-y-3 pb-4 h-full min-h-full">
                    <!-- Blocks injected dynamically -->
                </div>
            </div>
        </div>

    </div>

    <!-- MODALS -->
    <!-- Add Full Day Modal -->
    <div id="modal-add" class="hidden fixed inset-0 z-[100] items-center justify-center p-2 md:p-6 bg-slate-900/95 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-2xl shadow-2xl w-full max-w-4xl h-full md:h-[90vh] flex flex-col overflow-hidden">
            <div class="flex justify-between items-center p-4 border-b border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 shrink-0">
                <div>
                    <h3 class="text-lg md:text-xl font-bold text-slate-800 dark:text-white flex items-center"><i class="fa-solid fa-circle-plus text-cyan-600 dark:text-cyan-400 mr-2"></i> Populate <span id="add-day-title" class="ml-1"></span></h3>
                </div>
                <button onclick="closeModals()" class="text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div id="add-day-form" class="flex-1 overflow-y-auto p-3 md:p-6 custom-scrollbar space-y-4 md:space-y-6">
                <!-- Form injected dynamically -->
            </div>
            <div class="p-4 border-t border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-3 shrink-0">
                <button onclick="closeModals()" class="px-4 py-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 font-semibold transition-colors text-sm md:text-base">Cancel</button>
                <button onclick="saveFullDay()" class="px-5 py-2 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white font-bold flex items-center transition-colors shadow-lg shadow-cyan-900/50 text-sm md:text-base">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save Day
                </button>
            </div>
        </div>
    </div>

    <!-- Edit Single Block Modal -->
    <div id="modal-edit" class="hidden fixed inset-0 z-[100] items-center justify-center p-4 bg-slate-900/95 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-2xl shadow-2xl w-full max-w-lg flex flex-col overflow-hidden">
            <div class="flex justify-between items-center p-4 md:p-5 border-b border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50">
                <h3 class="text-lg md:text-xl font-bold text-slate-800 dark:text-white flex items-center"><i class="fa-solid fa-pen text-amber-500 dark:text-amber-400 mr-2"></i> Quick Edit</h3>
                <button onclick="closeModals()" class="text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div class="p-4 md:p-6 space-y-4 overflow-y-auto custom-scrollbar max-h-[70vh]">
                <div id="edit-badge" class="text-xs text-cyan-600 dark:text-cyan-400 font-bold mb-2 bg-cyan-100 dark:bg-cyan-900/20 inline-block px-3 py-1 rounded-full border border-cyan-300 dark:border-cyan-800/50"></div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Subject / Header</label>
                    <input id="edit-subject" type="text" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2.5 text-slate-900 dark:text-white focus:outline-none focus:border-cyan-500" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Topic / Description</label>
                    <input id="edit-topic" type="text" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2.5 text-slate-900 dark:text-white focus:outline-none focus:border-cyan-500" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Personal Outline Link (Google Docs)</label>
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-folder-open absolute left-3 text-amber-500"></i>
                        <input id="edit-outline" type="url" placeholder="https://docs.google.com/..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg pl-9 pr-3 py-2.5 text-slate-900 dark:text-white focus:outline-none focus:border-amber-500" />
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Lesson Plan Link</label>
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-file-lines absolute left-3 text-emerald-500"></i>
                        <input id="edit-plan" type="url" placeholder="https://..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg pl-9 pr-3 py-2.5 text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500" />
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-1">Slides Link</label>
                    <div class="relative flex items-center">
                        <i class="fa-solid fa-desktop absolute left-3 text-indigo-500"></i>
                        <input id="edit-slides" type="url" placeholder="https://..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg pl-9 pr-3 py-2.5 text-slate-900 dark:text-white focus:outline-none focus:border-indigo-500" />
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400">Print Link(s)</label>
                        <button onclick="addEditPrintInput()" class="text-[10px] bg-pink-100 dark:bg-pink-500/20 text-pink-600 dark:text-pink-400 px-2 py-0.5 rounded font-bold hover:bg-pink-200 dark:hover:bg-pink-500/40 transition-colors shadow-sm"><i class="fa-solid fa-plus mr-1"></i>Add Link</button>
                    </div>
                    <div id="edit-print-container" class="space-y-1.5">
                        <!-- Dynamic inputs injected here -->
                    </div>
                </div>
            </div>
            <div class="p-4 border-t border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-3">
                <button onclick="closeModals()" class="px-5 py-2.5 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 font-semibold transition-colors">Cancel</button>
                <button onclick="saveEdit()" class="px-5 py-2.5 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white font-bold flex items-center shadow-lg shadow-cyan-900/50">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save Edit
                </button>
            </div>
        </div>
    </div>

    <!-- Cancel Day Modal -->
    <div id="modal-cancel" class="hidden fixed inset-0 z-[100] items-center justify-center p-4 bg-slate-900/95 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-2xl shadow-2xl w-full max-w-sm flex flex-col overflow-hidden">
            <div class="p-5 border-b border-slate-300 dark:border-slate-700 bg-rose-50 dark:bg-rose-900/20 flex justify-between items-center">
                <h3 class="text-lg font-bold text-rose-700 dark:text-rose-400 flex items-center"><i class="fa-solid fa-ban mr-2"></i> Cancel <span id="cancel-day-title" class="ml-1"></span></h3>
                <button onclick="closeModals()" class="text-rose-500 hover:text-rose-800 dark:text-rose-400 dark:hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 mb-2">Reason / Note (e.g., Public Holiday)</label>
                    <input id="cancel-day-note" type="text" placeholder="Public Holiday" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-2.5 text-slate-900 dark:text-white focus:outline-none focus:border-rose-500" />
                </div>
            </div>
            <div class="p-4 border-t border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-3">
                <button onclick="closeModals()" class="px-5 py-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 font-semibold transition-colors text-sm">Back</button>
                <button onclick="saveCancelDay()" class="px-5 py-2 rounded-lg bg-rose-600 hover:bg-rose-500 text-white font-bold transition-colors shadow-lg shadow-rose-900/50 text-sm">
                    Confirm
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase and App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // *** YOUR REAL FIREBASE CONFIG ***
        const firebaseConfig = {
            apiKey: "AIzaSyCEGrh2SIC20vJj_nLm4x34ok01srxip7I",
            authDomain: "paul-s-2026.firebaseapp.com",
            projectId: "paul-s-2026",
            storageBucket: "paul-s-2026.firebasestorage.app",
            messagingSenderId: "524167059781",
            appId: "1:524167059781:web:57347f46b29c9d4a49862c"
        };
        // **********************************

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let unsubscribeDB = null;

        window.appState = { view: 'landing', term: '', week: '', day: '', weekData: { Monday: [], Tuesday: [], Wednesday: [], Thursday: [] }, coverData: {} };

        // Handle Theme Toggle
        window.toggleTheme = () => {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.theme = 'dark';
            }
        };
        
        if (localStorage.theme === 'light' || (!('theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
            document.addEventListener("DOMContentLoaded", () => document.getElementById('theme-icon')?.classList.replace('fa-moon', 'fa-sun'));
        }

        // Custom Toast Function
        window.showToast = (msg) => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'bg-slate-800 dark:bg-slate-700 text-white px-5 py-3 rounded-xl shadow-xl text-sm font-semibold animate-in slide-in-from-bottom-5 fade-in duration-300 flex items-center border border-slate-600 z-[9999]';
            toast.innerHTML = `<i class="fa-solid fa-circle-info text-cyan-400 mr-2"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('animate-out', 'slide-out-to-bottom-5', 'fade-out', 'duration-300');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // Handle Print Dropdowns
        window.toggleDropdown = (e, btn) => {
            e.stopPropagation();
            const dropdown = btn.nextElementSibling;
            const isHidden = dropdown.classList.contains('hidden');
            
            document.querySelectorAll('.print-dropdown').forEach(d => {
                d.classList.add('hidden');
                d.classList.remove('flex');
            });
            
            if (isHidden) {
                dropdown.classList.remove('hidden');
                dropdown.classList.add('flex');
            }
        };

        document.addEventListener('click', () => {
            document.querySelectorAll('.print-dropdown').forEach(d => {
                d.classList.add('hidden');
                d.classList.remove('flex');
            });
        });

        // URL ROUTER LOGIC
        window.addEventListener('hashchange', handleHashRouting);
        
        function handleHashRouting() {
            const hash = decodeURIComponent(window.location.hash.replace('#', ''));
            if (!hash || hash === 'landing') {
                renderView('landing');
            } else if (hash === 'terms') {
                renderView('term-select');
            } else {
                const parts = hash.split('/');
                if (parts.length === 1) { 
                    window.appState.term = parts[0];
                    renderView('week-select');
                } else if (parts.length >= 2) {
                    const term = parts[0];
                    const week = parts[1];
                    window.appState.term = term;
                    window.appState.week = week;
                    loadWeekData(term, week);
                    
                    if (parts.length === 3) {
                        window.appState.day = parts[2];
                        renderView('day');
                    } else {
                        renderView('week');
                    }
                }
            }
        }

        window.navigate = (path) => { window.location.hash = path; };

        // Normalizes printLink to always be an array
        const getPrintLinks = (linkData) => {
            if (Array.isArray(linkData)) return linkData.filter(l => l.trim() !== '');
            if (typeof linkData === 'string' && linkData.trim() !== '') return [linkData.trim()];
            return [];
        };

        window.navigateWeek = (dir) => {
            let termNum = parseInt(window.appState.term.replace('Term ', ''));
            let weekNum = parseInt(window.appState.week.replace('Week ', ''));
            weekNum += dir;
            if (weekNum < 1) {
                termNum -= 1;
                if (termNum < 1) return; 
                weekNum = 12; 
            } else if (weekNum > 12) {
                termNum += 1;
                if (termNum > 4) return; 
                weekNum = 1;
            }
            navigate(`Term ${termNum}/Week ${weekNum}`);
        };

        window.navigateDay = (dir) => {
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday'];
            let curIdx = days.indexOf(window.appState.day);
            curIdx += dir;
            if (curIdx < 0) {
                let termNum = parseInt(window.appState.term.replace('Term ', ''));
                let weekNum = parseInt(window.appState.week.replace('Week ', ''));
                weekNum -= 1;
                if (weekNum < 1) {
                    termNum -= 1;
                    if(termNum < 1) return;
                    weekNum = 12;
                }
                navigate(`Term ${termNum}/Week ${weekNum}/Thursday`);
            } else if (curIdx >= days.length) {
                let termNum = parseInt(window.appState.term.replace('Term ', ''));
                let weekNum = parseInt(window.appState.week.replace('Week ', ''));
                weekNum += 1;
                if (weekNum > 12) {
                    termNum += 1;
                    if(termNum > 4) return;
                    weekNum = 1;
                }
                navigate(`Term ${termNum}/Week ${weekNum}/Monday`);
            } else {
                navigate(`${window.appState.term}/${window.appState.week}/${days[curIdx]}`);
            }
        };

        window.handleNavArrow = (dir) => {
            if (window.appState.view === 'week') window.navigateWeek(dir);
            else if (window.appState.view === 'day') window.navigateDay(dir);
        };

        // Date Logic
        window.getCurrentSchoolTime = () => {
            const now = new Date(); 
            const terms = [
                { name: 'Term 1', start: new Date('2026-01-28') }, { name: 'Term 2', start: new Date('2026-04-20') },
                { name: 'Term 3', start: new Date('2026-07-20') }, { name: 'Term 4', start: new Date('2026-10-12') }
            ];
            let curTerm = 'Term 2', weekNum = 1;
            for(let i = terms.length - 1; i >= 0; i--) {
                if(now >= terms[i].start) {
                    curTerm = terms[i].name;
                    weekNum = Math.floor((now - terms[i].start) / (7 * 24 * 60 * 60 * 1000)) + 1;
                    break;
                }
            }
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            let curDay = days[now.getDay()];
            if (curDay === 'Saturday' || curDay === 'Sunday' || curDay === 'Friday') {
                curDay = 'Monday'; weekNum += 1;
            }
            return { term: curTerm, week: `Week ${Math.min(Math.max(weekNum, 1), 12)}`, day: curDay };
        };

        window.jumpToCurrentWeek = () => {
            const cur = window.getCurrentSchoolTime();
            navigate(`${cur.term}/${cur.week}`);
        };

        signInAnonymously(auth).then(() => { handleHashRouting(); });

        window.loadWeekData = (term, week) => {
            window.appState.weekData = { Monday: [], Tuesday: [], Wednesday: [], Thursday: [] };
            window.appState.coverData = {};
            if (unsubscribeDB) unsubscribeDB(); 
            const docRef = doc(db, "timetables", `2026_${term.replace(' ', '')}_${week.replace(' ', '')}`);
            unsubscribeDB = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    window.appState.weekData = docSnap.data().days || window.appState.weekData;
                    window.appState.coverData = docSnap.data().cover || {};
                } else {
                    setDoc(docRef, { days: window.appState.weekData, cover: {} }, { merge: true });
                }
                if (window.appState.view === 'week') renderWeekGrid();
                if (window.appState.view === 'day') renderDayBlocks();
            });
        };

        window.handleGlobalBack = () => {
            if (window.appState.view === 'term-select') navigate('landing');
            else if (window.appState.view === 'week-select') navigate('terms');
            else if (window.appState.view === 'week') navigate(window.appState.term);
            else if (window.appState.view === 'day') navigate(`${window.appState.term}/${window.appState.week}`);
        };

        window.renderView = (view) => {
            window.appState.view = view;
            
            // Toggle Main Views
            ['landing', 'term-select', 'week-select', 'week', 'day'].forEach(v => {
                const el = document.getElementById('view-' + v);
                if(el) { el.classList.add('hidden'); el.classList.remove('flex'); }
            });
            const targetEl = document.getElementById('view-' + view);
            if(targetEl) { targetEl.classList.remove('hidden'); targetEl.classList.add('flex'); }
            
            // Unified Header Elements
            const header = document.getElementById('app-header');
            const titleEl = document.getElementById('header-title');
            const subtitleEl = document.getElementById('header-subtitle');
            const navEl = document.getElementById('header-nav');
            const liveDot = document.getElementById('header-live-dot');
            const backBtn = document.getElementById('global-back-btn');
            const backText = document.getElementById('global-back-text');
            const divider = document.getElementById('global-divider');
            const coverBtn = document.getElementById('header-toggle-cover-btn');
            
            if (view === 'landing') {
                header.classList.add('hidden');
                header.classList.remove('flex');
                if(coverBtn) { coverBtn.classList.add('hidden'); coverBtn.classList.remove('flex'); }
            } else {
                header.classList.remove('hidden');
                header.classList.add('flex');
                backBtn.classList.remove('hidden');
                backBtn.classList.add('flex');
                divider.classList.remove('hidden');
                
                if (view === 'term-select') {
                    backText.innerText = 'Home';
                    titleEl.innerText = '2026 Timetable';
                    subtitleEl.innerText = 'Select a term to begin';
                    subtitleEl.className = 'text-slate-500 dark:text-slate-400 text-[10px] md:text-xs font-bold uppercase tracking-widest';
                    navEl.classList.add('hidden');
                    liveDot.classList.add('hidden');
                    if(coverBtn) { coverBtn.classList.add('hidden'); coverBtn.classList.remove('flex'); }
                }
                if (view === 'week-select') {
                    backText.innerText = 'Terms';
                    titleEl.innerText = window.appState.term;
                    subtitleEl.innerText = 'Select your week';
                    subtitleEl.className = 'text-slate-500 dark:text-slate-400 text-[10px] md:text-xs font-bold uppercase tracking-widest';
                    navEl.classList.add('hidden');
                    liveDot.classList.add('hidden');
                    if(coverBtn) { coverBtn.classList.add('hidden'); coverBtn.classList.remove('flex'); }
                    renderWeekSelector();
                }
                if (view === 'week') {
                    backText.innerText = window.appState.term;
                    titleEl.innerText = window.appState.week;
                    subtitleEl.innerText = `${window.appState.term}, ${window.appState.week}`;
                    subtitleEl.className = 'text-cyan-600 dark:text-cyan-400 text-[10px] md:text-xs font-bold uppercase tracking-widest ml-0.5';
                    navEl.classList.remove('hidden');
                    liveDot.classList.remove('hidden');
                    liveDot.innerHTML = `<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>`;
                    if(coverBtn) { coverBtn.classList.add('hidden'); coverBtn.classList.remove('flex'); }
                    renderWeekGrid();
                }
                if (view === 'day') {
                    backText.innerText = window.appState.week;
                    titleEl.innerText = window.appState.day;
                    subtitleEl.innerText = `${window.appState.term}, ${window.appState.week}`;
                    subtitleEl.className = 'text-indigo-600 dark:text-indigo-400 text-[10px] md:text-xs font-bold uppercase tracking-widest ml-0.5';
                    navEl.classList.remove('hidden');
                    liveDot.classList.remove('hidden');
                    liveDot.innerHTML = `<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"></span>`;
                    if(coverBtn) { coverBtn.classList.remove('hidden'); coverBtn.classList.add('flex'); }
                    renderDayBlocks();
                }
            }
        };

        window.closeModals = () => {
            ['modal-add', 'modal-edit', 'modal-cancel'].forEach(id => {
                const el = document.getElementById(id);
                if(el) { el.classList.add('hidden'); el.classList.remove('flex'); }
            });
        };

        const getSkeleton = () => [
            { id: 'b1', type: 'lesson', time: '9:00am - 9:45am', subject: 'English', topic: '', unitOutlineLink: '', slidesLink: '', printLink: [], lessonPlanLink: '' },
            { id: 'b2', type: 'lesson', time: '9:45am - 10:00am', subject: 'English', topic: 'Daily Write', unitOutlineLink: '', slidesLink: '', printLink: [], lessonPlanLink: '' },
            { id: 'b3', type: 'lesson', time: '10:00am - 11:00am', subject: 'English', topic: 'Imaginative Writing', unitOutlineLink: '', slidesLink: '', printLink: [], lessonPlanLink: '' },
            { id: 'br1', type: 'break', time: '11:00am - 11:30am', topic: 'Break 1', icon: 'mug-hot' },
            { id: 'b4', type: 'lesson', time: '11:30am - 12:30pm', subject: 'History', topic: '', unitOutlineLink: '', slidesLink: '', printLink: [], lessonPlanLink: '' },
            { id: 'b5', type: 'lesson', time: '12:30pm - 1:30pm', subject: 'Maths', topic: '', unitOutlineLink: '', slidesLink: '', printLink: [], lessonPlanLink: '' },
            { id: 'br2', type: 'break', time: '1:30pm - 2:00pm', topic: 'Break 2', icon: 'apple-whole' },
            { id: 'b6', type: 'lesson', time: '2:00pm - 2:30pm', subject: 'Whole School', topic: 'Assembly', unitOutlineLink: '', slidesLink: '', printLink: [], lessonPlanLink: '' },
            { id: 'b7', type: 'lesson', time: '2:30pm - 3:00pm', subject: 'End of Day', topic: 'Wrap Up', unitOutlineLink: '', slidesLink: '', printLink: [], lessonPlanLink: '' },
        ];

        // Global Icon logic based on the unified theme logic
        const getIcon = (sub) => {
            if (!sub) return 'fa-folder-open text-slate-500';
            const lowerSub = sub.toLowerCase().trim();
            if (lowerSub.includes('shared reading')) return 'fa-book-open-reader text-cyan-500 dark:text-cyan-400';
            if (lowerSub.includes('daily write')) return 'fa-pen-nib text-blue-500 dark:text-blue-400';
            if (lowerSub.includes('writing')) return 'fa-pen-to-square text-indigo-500 dark:text-indigo-400';
            if (lowerSub.startsWith('english')) return 'fa-book text-sky-500 dark:text-sky-400';
            if (lowerSub.startsWith('math')) return 'fa-calculator text-red-500 dark:text-red-400';
            if (lowerSub.startsWith('history')) return 'fa-landmark text-purple-500 dark:text-purple-400';
            if (lowerSub.startsWith('art') || lowerSub.includes('visual art')) return 'fa-palette text-pink-500 dark:text-pink-400';
            if (lowerSub.startsWith('sport') || lowerSub === 'pe' || lowerSub === 'p.e') return 'fa-basketball text-amber-500 dark:text-amber-400';
            if (lowerSub === 'science rff') return 'fa-flask text-slate-600 dark:text-slate-400';
            if (lowerSub === 'pdh rff') return 'fa-heart-pulse text-slate-600 dark:text-slate-400';
            if (lowerSub.includes('rff')) return 'fa-person-chalkboard text-slate-600 dark:text-slate-400';
            if (lowerSub === 'whole school') return 'fa-medal text-yellow-500 dark:text-yellow-400';
            return 'fa-chalkboard text-slate-500 dark:text-slate-400';
        };

        const renderWeekSelector = () => {
            const container = document.getElementById('week-grid-container');
            container.innerHTML = '';
            
            const curTime = window.getCurrentSchoolTime();
            const currentTermNum = parseInt(curTime.term.replace('Term ', ''));
            const viewingTermNum = parseInt(window.appState.term.replace('Term ', ''));
            const currentWeekNum = parseInt(curTime.week.replace('Week ', ''));

            for(let i=1; i<=12; i++) {
                let status = 'future';
                if (viewingTermNum < currentTermNum) status = 'past';
                else if (viewingTermNum > currentTermNum) status = 'future';
                else {
                    if (i < currentWeekNum) status = 'past';
                    else if (i === currentWeekNum) status = 'current';
                    else status = 'future';
                }

                let cardClasses = '';
                let badgeHTML = '';
                let iconHTML = '';
                let titleClasses = '';
                let bgDecorHTML = '';

                if (status === 'current') {
                    cardClasses = 'bg-gradient-to-br from-cyan-500 to-indigo-600 dark:from-cyan-600 dark:to-indigo-700 border-transparent shadow-[0_10px_30px_rgba(6,182,212,0.3)] hover:shadow-[0_15px_40px_rgba(6,182,212,0.5)] scale-100 hover:scale-[1.03] z-10 ring-2 ring-white/20';
                    badgeHTML = '<span class="bg-white/20 backdrop-blur-md text-white border border-white/30 px-2.5 py-1 rounded-full text-[9px] md:text-[10px] font-black tracking-widest uppercase shadow-sm flex items-center gap-1.5"><span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-white"></span></span> Current</span>';
                    iconHTML = '<i class="fa-solid fa-calendar-day text-white/50 text-xl md:text-2xl group-hover:scale-110 transition-transform group-hover:text-white/80"></i>';
                    titleClasses = 'text-white drop-shadow-md';
                    bgDecorHTML = '<div class="absolute -bottom-8 -right-8 w-24 h-24 bg-white/10 rounded-full blur-2xl group-hover:bg-white/20 transition-colors"></div>';
                } else if (status === 'past') {
                    cardClasses = 'bg-slate-100 dark:bg-slate-800/40 border-slate-200 dark:border-slate-700 opacity-70 hover:opacity-100 shadow-sm hover:shadow-md';
                    badgeHTML = '<span class="bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 border border-slate-300 dark:border-slate-600 px-2.5 py-1 rounded-full text-[9px] md:text-[10px] font-bold tracking-widest uppercase flex items-center gap-1.5"><i class="fa-solid fa-check text-emerald-500"></i> Completed</span>';
                    iconHTML = '<i class="fa-solid fa-calendar-check text-slate-300 dark:text-slate-600 text-xl md:text-2xl group-hover:text-slate-400 dark:group-hover:text-slate-500 transition-colors"></i>';
                    titleClasses = 'text-slate-400 dark:text-slate-500';
                    bgDecorHTML = '';
                } else {
                    // Future
                    cardClasses = 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-xl hover:border-cyan-300 dark:hover:border-cyan-600 hover:-translate-y-1';
                    badgeHTML = '<span class="bg-slate-50 dark:bg-slate-900 text-slate-400 dark:text-slate-500 border border-slate-200 dark:border-slate-700 px-2.5 py-1 rounded-full text-[9px] md:text-[10px] font-bold tracking-widest uppercase">Upcoming</span>';
                    iconHTML = '<i class="fa-regular fa-calendar text-slate-200 dark:text-slate-600 text-xl md:text-2xl group-hover:text-cyan-400 transition-colors"></i>';
                    titleClasses = 'text-slate-700 dark:text-slate-200 group-hover:text-cyan-600 dark:group-hover:text-cyan-400 transition-colors';
                    bgDecorHTML = '<div class="absolute inset-0 bg-gradient-to-br from-cyan-500/0 to-indigo-500/0 group-hover:from-cyan-500/5 group-hover:to-indigo-500/5 transition-colors duration-500"></div>';
                }

                container.innerHTML += `
                    <button onclick="navigate('${window.appState.term}/Week ${i}')" class="relative text-left h-28 md:h-36 rounded-[1.5rem] p-4 md:p-5 overflow-hidden flex flex-col justify-between transition-all duration-300 border ${cardClasses} group">
                        ${bgDecorHTML}
                        <div class="flex justify-between items-start z-10 relative w-full">
                            ${badgeHTML}
                            ${iconHTML}
                        </div>
                        <div class="z-10 relative mt-auto w-full">
                            <h3 class="text-2xl md:text-3xl font-black tracking-tight ${titleClasses}">Week ${i}</h3>
                            <div class="w-8 h-1 rounded-full mt-1.5 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-y-2 group-hover:translate-y-0 ${status === 'current' ? 'bg-white' : 'bg-cyan-400'}"></div>
                        </div>
                    </button>
                `;
            }
        };

        const getPreviousSchoolWeek = (term, weekStr) => {
            let termNum = parseInt(term.replace('Term ', ''));
            let weekNum = parseInt(weekStr.replace('Week ', ''));
            
            if (weekNum > 1) {
                return { term: term, week: `Week ${weekNum - 1}` };
            } else if (termNum > 1) {
                return { term: `Term ${termNum - 1}`, week: `Week 10` }; 
            }
            return null; 
        };

        // Move single lesson block logic
        window.moveLessonToNextDay = async (day, idx, btn) => {
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday'];
            const curIdx = days.indexOf(day);
            
            if (btn.dataset.confirmed === "true") {
                let targetDay = days[curIdx + 1];
                let targetTerm = window.appState.term;
                let targetWeek = window.appState.week;
                let isNextWeek = false;

                // Handle Thursday rollover to next Monday
                if (curIdx === days.length - 1) {
                    targetDay = 'Monday';
                    isNextWeek = true;
                    let termNum = parseInt(window.appState.term.replace('Term ', ''));
                    let weekNum = parseInt(window.appState.week.replace('Week ', ''));
                    weekNum += 1;
                    if (weekNum > 12) {
                        termNum += 1;
                        if (termNum > 4) {
                            showToast("Cannot copy lesson past Term 4.");
                            return;
                        }
                        weekNum = 1;
                    }
                    targetTerm = `Term ${termNum}`;
                    targetWeek = `Week ${weekNum}`;
                }
                
                const blockToMove = { ...window.appState.weekData[day][idx] };

                if (!isNextWeek) {
                    // Normal move within the same week
                    let updatedWeekData = { ...window.appState.weekData };
                    
                    if (!updatedWeekData[targetDay] || updatedWeekData[targetDay].length === 0 || updatedWeekData[targetDay][0].type === 'cancelled') {
                        updatedWeekData[targetDay] = getSkeleton();
                    }
                    
                    updatedWeekData[targetDay][idx] = { ...blockToMove };
                    
                    setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: updatedWeekData }, { merge: true });
                    showToast(`Lesson copied to ${targetDay}`);
                } else {
                    // Move across to the next week's Monday
                    const nextWeekDocRef = doc(db, "timetables", `2026_${targetTerm.replace(' ', '')}_${targetWeek.replace(' ', '')}`);
                    const nextWeekSnap = await getDoc(nextWeekDocRef);
                    let nextWeekData = { Monday: [], Tuesday: [], Wednesday: [], Thursday: [] };
                    
                    if (nextWeekSnap.exists() && nextWeekSnap.data().days) {
                        nextWeekData = nextWeekSnap.data().days;
                    }
                    
                    if (!nextWeekData[targetDay] || nextWeekData[targetDay].length === 0 || nextWeekData[targetDay][0].type === 'cancelled') {
                        nextWeekData[targetDay] = getSkeleton();
                    }
                    
                    // Save to future week
                    nextWeekData[targetDay][idx] = { ...blockToMove };
                    await setDoc(nextWeekDocRef, { days: nextWeekData }, { merge: true });
                    
                    showToast(`Lesson copied to Next ${targetDay}`);
                }
            } else {
                btn.dataset.confirmed = "true";
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-check"></i>';
                btn.classList.add('bg-amber-200', 'dark:bg-amber-700', 'text-amber-700', 'dark:text-amber-200');
                setTimeout(() => {
                    if (btn && btn.dataset) {
                        btn.dataset.confirmed = "false";
                        btn.innerHTML = originalHTML;
                        btn.classList.remove('bg-amber-200', 'dark:bg-amber-700', 'text-amber-700', 'dark:text-amber-200');
                    }
                }, 3000);
            }
        };

        window.copyPreviousDayToEmpty = async (day) => {
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday'];
            const curIdx = days.indexOf(day);

            if(curIdx > 0) {

                    try {
                        const docRef = doc(db, "timetables", `2026_${prevTime.term.replace(' ', '')}_${prevTime.week.replace(' ', '')}`);
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists() && docSnap.data().days && docSnap.data().days['Thursday']) {

                }
            }
            
            if(prevData && prevData.length > 0) {
                const newDayData = getSkeleton().map((block, idx) => {
                    if (block.type === 'break') return block;
                    const prevBlock = prevData[idx];
                    if (prevBlock && prevBlock.type !== 'break') {
                        return {
                            ...block,
                            subject: prevBlock.subject || block.subject,
                            topic: prevBlock.topic || '',

                            slidesLink: prevBlock.slidesLink || '',
                            printLink: prevBlock.printLink || [],

                    }
                    return block;

                setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: { ...window.appState.weekData, [day]: newDayData } }, { merge: true });
