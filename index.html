    <!-- Firebase and App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // *** YOUR REAL FIREBASE CONFIG ***
        const firebaseConfig = {
            apiKey: "AIzaSyCEGrh2SIC20vJj_nLm4x34ok01srxip7I",
            authDomain: "paul-s-2026.firebaseapp.com",
            projectId: "paul-s-2026",
            storageBucket: "paul-s-2026.firebasestorage.app",
            messagingSenderId: "524167059781",
            appId: "1:524167059781:web:57347f46b29c9d4a49862c"
        };
        // **********************************

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let unsubscribeDB = null;

        window.appState = { view: 'landing', term: '', week: '', day: '', weekData: { Monday: [], Tuesday: [], Wednesday: [], Thursday: [] } };

        // Handle Theme Toggle
        window.toggleTheme = () => {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.theme = 'dark';
            }
        };
        
        if (localStorage.theme === 'light' || (!('theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
            document.addEventListener("DOMContentLoaded", () => document.getElementById('theme-icon')?.classList.replace('fa-moon', 'fa-sun'));
        }

        // Custom Toast Function
        window.showToast = (msg) => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'bg-slate-800 dark:bg-slate-700 text-white px-5 py-3 rounded-xl shadow-xl text-sm font-semibold animate-in slide-in-from-bottom-5 fade-in duration-300 flex items-center border border-slate-600';
            toast.innerHTML = `<i class="fa-solid fa-circle-info text-cyan-400 mr-2"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('animate-out', 'slide-out-to-bottom-5', 'fade-out', 'duration-300');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // URL ROUTER LOGIC
        window.addEventListener('hashchange', handleHashRouting);
        
        function handleHashRouting() {
            const hash = decodeURIComponent(window.location.hash.replace('#', ''));
            if (!hash || hash === 'landing') {
                renderView('landing');
            } else if (hash === 'terms') {
                renderView('term-select');
            } else {
                const parts = hash.split('/');
                if (parts.length === 1) { 
                    window.appState.term = parts[0];
                    renderView('week-select');
                } else if (parts.length >= 2) {
                    const term = parts[0];
                    const week = parts[1];
                    window.appState.term = term;
                    window.appState.week = week;
                    loadWeekData(term, week);
                    
                    if (parts.length === 3) {
                        window.appState.day = parts[2];
                        renderView('day');
                    } else {
                        renderView('week');
                    }
                }
            }
        }

        window.navigate = (path) => { window.location.hash = path; };

        // Date Logic
        window.getCurrentSchoolTime = () => {
            const now = new Date(); 
            const terms = [
                { name: 'Term 1', start: new Date('2026-01-28') }, { name: 'Term 2', start: new Date('2026-04-20') },
                { name: 'Term 3', start: new Date('2026-07-20') }, { name: 'Term 4', start: new Date('2026-10-12') }
            ];
            let curTerm = 'Term 2', weekNum = 1;
            for(let i = terms.length - 1; i >= 0; i--) {
                if(now >= terms[i].start) {
                    curTerm = terms[i].name;
                    weekNum = Math.floor((now - terms[i].start) / (7 * 24 * 60 * 60 * 1000)) + 1;
                    break;
                }
            }
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            let curDay = days[now.getDay()];
            if (curDay === 'Saturday' || curDay === 'Sunday' || curDay === 'Friday') {
                curDay = 'Monday'; weekNum += 1;
            }
            return { term: curTerm, week: `Week ${Math.min(Math.max(weekNum, 1), 12)}`, day: curDay };
        };

        window.jumpToCurrentWeek = () => {
            const cur = window.getCurrentSchoolTime();
            navigate(`${cur.term}/${cur.week}`);
        };

        signInAnonymously(auth).then(() => { handleHashRouting(); });

        window.loadWeekData = (term, week) => {
            window.appState.weekData = { Monday: [], Tuesday: [], Wednesday: [], Thursday: [] };
            if (unsubscribeDB) unsubscribeDB(); 
            const docRef = doc(db, "timetables", `2026_${term.replace(' ', '')}_${week.replace(' ', '')}`);
            unsubscribeDB = onSnapshot(docRef, (docSnap) => {

                                <div class="mt-3 pt-3 border-t border-slate-200 dark:border-slate-700">
                                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-1 uppercase tracking-wider"><i class="fa-solid fa-note-sticky mr-1"></i> Lesson Notes</label>
                                    <textarea id="note-input-${idx}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg p-3 text-slate-800 dark:text-slate-200 focus:outline-none focus:border-cyan-500 min-h-[80px]">${block.note || ''}</textarea>
                                    <div class="flex justify-end mt-2">
                                        <button onclick="saveNote(${idx})" class="bg-cyan-600 hover:bg-cyan-500 text-white px-4 py-1.5 rounded text-sm font-bold shadow">Save Note</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }
            });
        };

        window.initEdit = (day, idx) => {
            window.appState.day = day; window.appState.editingBlock = { ...window.appState.weekData[day][idx], index: idx };
            document.getElementById('edit-badge').innerText = day + ' | ' + window.appState.editingBlock.time;
            document.getElementById('edit-subject').value = window.appState.editingBlock.subject || '';
            document.getElementById('edit-topic').value = window.appState.editingBlock.topic || '';
            document.getElementById('edit-outline').value = window.appState.editingBlock.unitOutlineLink || '';
            document.getElementById('edit-plan').value = window.appState.editingBlock.lessonPlanLink || '';
            document.getElementById('edit-slides').value = window.appState.editingBlock.slidesLink || '';
            document.getElementById('edit-print').value = window.appState.editingBlock.printLink || '';
            document.getElementById('modal-edit').classList.remove('hidden'); document.getElementById('modal-edit').classList.add('flex');
        };

        window.saveEdit = () => {
            const updated = [...window.appState.weekData[window.appState.day]];
            const idx = window.appState.editingBlock.index;
            updated[idx].subject = document.getElementById('edit-subject').value;
            updated[idx].topic = document.getElementById('edit-topic').value;
            updated[idx].unitOutlineLink = document.getElementById('edit-outline').value;
            updated[idx].lessonPlanLink = document.getElementById('edit-plan').value;
            updated[idx].slidesLink = document.getElementById('edit-slides').value;
            updated[idx].printLink = document.getElementById('edit-print').value;
            setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: { ...window.appState.weekData, [window.appState.day]: updated } }, { merge: true });
            closeModals();
        };

        window.initAddDay = (day) => {
            window.appState.addingDay = day; window.appState.newDayForm = getSkeleton();
            document.getElementById('add-day-title').innerText = day;
            const form = document.getElementById('add-day-form'); form.innerHTML = '';
            window.appState.newDayForm.forEach((block, idx) => {
                if(block.type === 'break') form.innerHTML += `<div class="py-1 text-center text-slate-500 dark:text-slate-400 font-medium tracking-widest uppercase text-[10px] border border-dashed border-slate-300 dark:border-slate-700 rounded">${block.topic} (${block.time})</div>`;
                else form.innerHTML += `
                    <div class="bg-white dark:bg-slate-900/50 p-2.5 rounded border border-slate-200 dark:border-slate-700 space-y-2">
                        <div class="flex justify-between items-center border-b border-slate-200 dark:border-slate-700 pb-1.5 mb-1.5">
                            <span class="text-cyan-600 dark:text-cyan-400 font-bold text-[11px]">${block.time}</span>
                            <input type="text" id="add-sub-${idx}" value="${block.subject}" class="bg-transparent text-slate-800 dark:text-slate-200 font-bold text-xs text-right focus:outline-none border-b border-transparent focus:border-cyan-500" />
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                            <div>
                                <label class="block text-[9px] uppercase text-slate-500 dark:text-slate-400 mb-0.5">Topic</label>
                                <input type="text" id="add-top-${idx}" value="${block.topic}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded px-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-cyan-500" />
                            </div>
                            <div>
                                <label class="block text-[9px] uppercase text-amber-600 dark:text-amber-400 mb-0.5">Personal Outline</label>
                                <div class="relative flex items-center">
                                    <i class="fa-solid fa-folder-open absolute left-2 text-amber-500 text-[10px]"></i>
                                    <input type="url" id="add-outline-${idx}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-amber-500" />
                                </div>
                            </div>
                            <div>
                                <label class="block text-[9px] uppercase text-emerald-600 dark:text-emerald-400 mb-0.5">Plan Link</label>
                                <div class="relative flex items-center">
                                    <i class="fa-solid fa-file-lines absolute left-2 text-emerald-500 text-[10px]"></i>
                                    <input type="url" id="add-plan-${idx}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500" />
                                </div>
                            </div>
                            <div>
                                <label class="block text-[9px] uppercase text-indigo-600 dark:text-indigo-400 mb-0.5">Slides</label>
                                <div class="relative flex items-center">
                                    <i class="fa-solid fa-desktop absolute left-2 text-indigo-500 text-[10px]"></i>
                                    <input type="url" id="add-slide-${idx}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-indigo-500" />
                                </div>
                            </div>
                            <div>
                                <label class="block text-[9px] uppercase text-pink-600 dark:text-pink-400 mb-0.5">Print Link</label>
                                <div class="relative flex items-center">
                                    <i class="fa-solid fa-print absolute left-2 text-pink-500 text-[10px]"></i>
                                    <input type="url" id="add-print-${idx}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-pink-500" />
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('modal-add').classList.remove('hidden'); document.getElementById('modal-add').classList.add('flex');
        };

        window.saveFullDay = () => {
            const updated = window.appState.newDayForm.map((b, idx) => b.type === 'break' ? b : { ...b, subject: document.getElementById(`add-sub-${idx}`).value, topic: document.getElementById(`add-top-${idx}`).value, unitOutlineLink: document.getElementById(`add-outline-${idx}`).value, lessonPlanLink: document.getElementById(`add-plan-${idx}`).value, slidesLink: document.getElementById(`add-slide-${idx}`).value, printLink: document.getElementById(`add-print-${idx}`).value });
            setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: { ...window.appState.weekData, [window.appState.addingDay]: updated } }, { merge: true });
            closeModals();
        };
    </script>
</body>
</html>
