<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul's School Day</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            overflow: hidden; 
            margin: 0; 
            padding: 0;
            width: 100vw; 
            height: 100vh;
            position: fixed;
            inset: 0;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-2 md:p-4">
    <!-- Ambient Background Glows -->
    <div class="absolute filter blur-[100px] md:blur-[120px] z-0 opacity-30 rounded-full w-[300px] md:w-[500px] h-[300px] md:h-[500px] bg-indigo-600 top-[-10%] left-[-10%] pointer-events-none"></div>
    <div class="absolute filter blur-[100px] md:blur-[120px] z-0 opacity-30 rounded-full w-[250px] md:w-[400px] h-[250px] md:h-[400px] bg-cyan-600 bottom-[-10%] right-[-5%] pointer-events-none"></div>

    <!-- GLOBAL CONTROLS -->
    <button id="global-back-btn" class="hidden fixed top-4 right-4 md:top-6 md:right-6 bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 text-sm rounded-lg flex items-center justify-center transition-colors border border-slate-600 shadow-xl z-50 min-w-[90px]" onclick="handleGlobalBack()">
        <i class="fa-solid fa-chevron-left mr-2"></i> <span id="global-back-text">Back</span>
    </button>

    <a href="learning_zone.html" class="fixed bottom-4 right-4 md:bottom-6 md:right-6 w-14 h-14 bg-emerald-600 hover:bg-emerald-500 text-white rounded-full flex items-center justify-center transition-all shadow-[0_0_15px_rgba(16,185,129,0.4)] hover:shadow-[0_0_25px_rgba(16,185,129,0.6)] z-50 border border-emerald-400 group">
        <i class="fa-solid fa-headphones text-xl"></i>
        <!-- Hover Tooltip -->
        <span class="absolute right-16 top-1/2 -translate-y-1/2 bg-slate-800 text-emerald-400 text-xs font-bold px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none border border-emerald-500/30 shadow-lg">Enter Learning Zone</span>
    </a>

    <!-- Main App Container - FIXED HEIGHT TO PREVENT DOUBLE SCROLL -->
    <div class="relative w-full max-w-7xl h-full z-10 bg-slate-900/80 backdrop-blur-xl border border-slate-700/50 rounded-2xl md:rounded-[2rem] shadow-2xl p-3 md:p-6 flex flex-col overflow-hidden min-h-0">

        <!-- LANDING PAGE -->
        <div id="view-landing" class="flex flex-col items-center justify-center h-full space-y-10 animate-in fade-in zoom-in duration-500">
            <div class="text-center">
                <i class="fa-solid fa-graduation-cap text-6xl text-cyan-400 mb-6 drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]"></i>
                <h1 class="text-4xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400 mb-4">Paul's School Day</h1>
                <p class="text-slate-400 text-base md:text-xl font-medium tracking-wide">Classroom Management Hub</p>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 w-full max-w-2xl px-4">
                <button onclick="jumpToCurrentWeek()" class="flex-1 bg-gradient-to-br from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-5 md:py-6 rounded-2xl shadow-lg border border-cyan-400/30 hover:border-cyan-400 transition-all text-xl md:text-2xl flex flex-col items-center justify-center group">
                    <i class="fa-regular fa-calendar-check text-3xl mb-2 group-hover:scale-110 transition-transform"></i>
                    Current Week
                </button>
                <button onclick="navigate('terms')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-5 md:py-6 rounded-2xl shadow-lg border border-slate-600 hover:border-slate-400 transition-all text-xl md:text-2xl flex flex-col items-center justify-center group">
                    <i class="fa-solid fa-table-list text-3xl mb-2 group-hover:scale-110 transition-transform"></i>
                    Daily Schedule
                </button>
            </div>
        </div>

        <!-- TERM SELECTOR -->
        <div id="view-term-select" class="hidden flex-col items-center justify-center h-full space-y-8 animate-in fade-in duration-300 min-h-0">
            <div class="text-center mb-4 mt-8 md:mt-0">
                <h1 class="text-3xl md:text-5xl font-extrabold text-white mb-2">2026 Timetable</h1>
                <p class="text-slate-400 text-sm md:text-lg">Select a term to begin</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-lg overflow-y-auto custom-scrollbar p-2">
                <button onclick="navigate('Term 1')" class="bg-slate-800/80 hover:bg-indigo-600 text-white font-bold py-5 md:py-6 rounded-xl shadow-lg border-2 border-transparent hover:border-indigo-500 transition-all text-xl">Term 1</button>
                <button onclick="navigate('Term 2')" class="bg-slate-800/80 hover:bg-cyan-600 text-white font-bold py-5 md:py-6 rounded-xl shadow-lg border-2 border-transparent hover:border-cyan-500 transition-all text-xl">Term 2</button>
                <button onclick="navigate('Term 3')" class="bg-slate-800/80 hover:bg-emerald-600 text-white font-bold py-5 md:py-6 rounded-xl shadow-lg border-2 border-transparent hover:border-emerald-500 transition-all text-xl">Term 3</button>
                <button onclick="navigate('Term 4')" class="bg-slate-800/80 hover:bg-rose-600 text-white font-bold py-5 md:py-6 rounded-xl shadow-lg border-2 border-transparent hover:border-rose-500 transition-all text-xl">Term 4</button>
            </div>
        </div>

        <!-- WEEK SELECTOR -->
        <div id="view-week-select" class="hidden flex-col h-full items-center justify-start animate-in fade-in duration-300 pt-10 md:pt-0 min-h-0">
            <div class="w-full max-w-4xl border-b border-slate-700 pb-2 mb-4 shrink-0">
                <h1 id="week-selector-title" class="text-2xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400">Term</h1>
                <p class="text-slate-400 text-xs md:text-sm">Select your week</p>
            </div>
            <div id="week-grid-container" class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 w-full max-w-4xl custom-scrollbar overflow-y-auto pb-4 flex-1">
                <!-- Injected dynamically -->
            </div>
        </div>

        <!-- WEEK VIEW -->
        <div id="view-week" class="hidden flex-col h-full animate-in fade-in duration-300 pt-10 md:pt-0 min-h-0">
            <div class="border-b border-slate-700/50 pb-2 mb-2 flex items-baseline gap-3 shrink-0">
                <h1 id="week-title" class="text-xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400 leading-none">Week</h1>
                <p id="week-subtitle" class="text-slate-400 text-xs md:text-sm font-semibold">Term, Week</p>
            </div>
            <!-- Stacks vertically on mobile, 4 columns on desktop -->
            <div id="week-grid" class="grid grid-cols-1 md:grid-cols-4 gap-3 md:gap-4 flex-1 overflow-y-auto overflow-x-hidden custom-scrollbar pb-4 min-w-full">
                <!-- Columns injected dynamically -->
            </div>
        </div>

        <!-- DAY VIEW -->
        <div id="view-day" class="hidden flex-col h-full animate-in slide-in-from-right-8 duration-300 pt-10 md:pt-0 min-h-0">
            <div class="border-b border-slate-700 pb-2 mb-3 shrink-0">
                <div class="flex items-baseline gap-3">
                    <h1 id="day-title" class="text-xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400 leading-none">Schedule</h1>
                    <p id="day-subtitle" class="text-slate-400 text-[10px] md:text-xs font-semibold">Term, Week</p>
                </div>
            </div>
            <div id="day-blocks" class="flex-1 overflow-y-auto custom-scrollbar pr-2 md:pr-4 space-y-2 pb-4">
                <!-- Blocks injected dynamically (Condensed) -->
            </div>
        </div>

    </div>

    <!-- MODALS -->
    <!-- Add Full Day Modal -->
    <div id="modal-add" class="hidden fixed inset-0 z-[100] items-center justify-center p-2 md:p-6 bg-slate-900/95 backdrop-blur-sm">
        <div class="bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl w-full max-w-4xl h-full md:h-[90vh] flex flex-col overflow-hidden">
            <div class="flex justify-between items-center p-4 border-b border-slate-700 bg-slate-800/50 shrink-0">
                <div>
                    <h3 class="text-lg md:text-xl font-bold text-white flex items-center"><i class="fa-solid fa-circle-plus text-cyan-400 mr-2"></i> Populate <span id="add-day-title" class="ml-1"></span></h3>
                </div>
                <button onclick="closeModals()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div id="add-day-form" class="flex-1 overflow-y-auto p-3 md:p-6 custom-scrollbar space-y-4 md:space-y-6">
                <!-- Form injected dynamically -->
            </div>
            <div class="p-4 border-t border-slate-700 bg-slate-800/50 flex justify-end gap-3 shrink-0">
                <button onclick="closeModals()" class="px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-700 font-semibold transition-colors text-sm md:text-base">Cancel</button>
                <button onclick="saveFullDay()" class="px-5 py-2 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white font-bold flex items-center transition-colors shadow-lg shadow-cyan-900/50 text-sm md:text-base">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save Day
                </button>
            </div>
        </div>
    </div>

    <!-- Edit Single Block Modal -->
    <div id="modal-edit" class="hidden fixed inset-0 z-[100] items-center justify-center p-4 bg-slate-900/95 backdrop-blur-sm">
        <div class="bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl w-full max-w-lg flex flex-col overflow-hidden">
            <div class="flex justify-between items-center p-4 md:p-5 border-b border-slate-700 bg-slate-800/50">
                <h3 class="text-lg md:text-xl font-bold text-white flex items-center"><i class="fa-solid fa-pen text-amber-400 mr-2"></i> Quick Edit</h3>
                <button onclick="closeModals()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <div class="p-4 md:p-6 space-y-4">
                <div id="edit-badge" class="text-xs text-cyan-400 font-bold mb-2 bg-cyan-900/20 inline-block px-3 py-1 rounded-full border border-cyan-800/50"></div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Subject / Header</label>
                    <input id="edit-subject" type="text" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-cyan-500 text-sm" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Topic / Description</label>
                    <input id="edit-topic" type="text" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-cyan-500 text-sm" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Lesson Plan Link</label>
                    <input id="edit-plan" type="url" placeholder="https://..." class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-emerald-500 text-sm" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Slides Link</label>
                    <input id="edit-slides" type="url" placeholder="https://..." class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Print Link</label>
                    <input id="edit-print" type="url" placeholder="https://..." class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-pink-500 text-sm" />
                </div>
            </div>
            <div class="p-4 border-t border-slate-700 bg-slate-800/50 flex justify-end gap-3">
                <button onclick="closeModals()" class="px-5 py-2 rounded-lg text-slate-300 hover:bg-slate-700 font-semibold transition-colors text-sm">Cancel</button>
                <button onclick="saveEdit()" class="px-5 py-2 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white font-bold flex items-center shadow-lg shadow-cyan-900/50 text-sm">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save Edit
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase and App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // *** YOUR REAL FIREBASE CONFIG ***
        const firebaseConfig = {
            apiKey: "AIzaSyCEGrh2SIC20vJj_nLm4x34ok01srxip7I",
            authDomain: "paul-s-2026.firebaseapp.com",
            projectId: "paul-s-2026",
            storageBucket: "paul-s-2026.firebasestorage.app",
            messagingSenderId: "524167059781",
            appId: "1:524167059781:web:57347f46b29c9d4a49862c"
        };
        // **********************************

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let unsubscribeDB = null;

        window.appState = { view: 'landing', term: '', week: '', day: '', weekData: { Monday: [], Tuesday: [], Wednesday: [], Thursday: [] } };

        // URL ROUTER LOGIC
        window.addEventListener('hashchange', handleHashRouting);
        
        function handleHashRouting() {
            const hash = decodeURIComponent(window.location.hash.replace('#', ''));
            if (!hash || hash === 'landing') {
                renderView('landing');
            } else if (hash === 'terms') {
                renderView('term-select');
            } else {
                const parts = hash.split('/');
                if (parts.length === 1) { // Only term provided
                    window.appState.term = parts[0];
                    renderView('week-select');
                } else if (parts.length >= 2) {
                    const term = parts[0];
                    const week = parts[1];
                    window.appState.term = term;
                    window.appState.week = week;
                    loadWeekData(term, week);
                    
                    if (parts.length === 3) {
                        window.appState.day = parts[2];
                        renderView('day');
                    } else {
                        renderView('week');
                    }
                }
            }
        }

        window.navigate = (path) => { window.location.hash = path; };

        // Date Logic
        window.getCurrentSchoolTime = () => {
            const now = new Date(); 
            const terms = [
                { name: 'Term 1', start: new Date('2026-01-28') }, { name: 'Term 2', start: new Date('2026-04-20') },
                { name: 'Term 3', start: new Date('2026-07-20') }, { name: 'Term 4', start: new Date('2026-10-12') }
            ];
            let curTerm = 'Term 2', weekNum = 1;
            for(let i = terms.length - 1; i >= 0; i--) {
                if(now >= terms[i].start) {
                    curTerm = terms[i].name;
                    weekNum = Math.floor((now - terms[i].start) / (7 * 24 * 60 * 60 * 1000)) + 1;
                    break;
                }
            }
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            let curDay = days[now.getDay()];
            if (curDay === 'Saturday' || curDay === 'Sunday' || curDay === 'Friday') {
                curDay = 'Monday'; weekNum += 1;
            }
            return { term: curTerm, week: `Week ${Math.min(Math.max(weekNum, 1), 12)}`, day: curDay };
        };

        window.jumpToCurrentWeek = () => {
            const cur = window.getCurrentSchoolTime();
            navigate(`${cur.term}/${cur.week}`);
        };

        signInAnonymously(auth).then(() => { handleHashRouting(); });

        window.loadWeekData = (term, week) => {
            window.appState.weekData = { Monday: [], Tuesday: [], Wednesday: [], Thursday: [] };
            if (unsubscribeDB) unsubscribeDB(); 
            const docRef = doc(db, "timetables", `2026_${term.replace(' ', '')}_${week.replace(' ', '')}`);
            unsubscribeDB = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) window.appState.weekData = docSnap.data().days;
                else setDoc(docRef, { days: window.appState.weekData }, { merge: true });
                if (window.appState.view === 'week') renderWeekGrid();
                if (window.appState.view === 'day') renderDayBlocks();
            });
        };

        window.handleGlobalBack = () => {
            if (window.appState.view === 'term-select') navigate('landing');
            else if (window.appState.view === 'week-select') navigate('terms');
            else if (window.appState.view === 'week') navigate(window.appState.term);
            else if (window.appState.view === 'day') navigate(`${window.appState.term}/${window.appState.week}`);
        };

        window.renderView = (view) => {
            window.appState.view = view;
            ['landing', 'term-select', 'week-select', 'week', 'day'].forEach(v => {
                const el = document.getElementById('view-' + v);
                if(el) { el.classList.add('hidden'); el.classList.remove('flex'); }
            });
            const targetEl = document.getElementById('view-' + view);
            if(targetEl) { targetEl.classList.remove('hidden'); targetEl.classList.add('flex'); }
            
            const backBtn = document.getElementById('global-back-btn');
            const backText = document.getElementById('global-back-text');
            if (view === 'landing') backBtn.classList.add('hidden');
            else {
                backBtn.classList.remove('hidden');
                if (view === 'term-select') {
                    backText.innerText = 'Home';
                }
                if (view === 'week-select') {
                    backText.innerText = 'Terms';
                    document.getElementById('week-selector-title').innerText = window.appState.term;
                    renderWeekSelector();
                }
                if (view === 'week') {
                    backText.innerText = window.appState.term;
                    document.getElementById('week-title').innerText = window.appState.week;
                    document.getElementById('week-subtitle').innerText = `${window.appState.term}, ${window.appState.week}`;
                    renderWeekGrid();
                }
                if (view === 'day') {
                    backText.innerText = window.appState.week;
                    document.getElementById('day-title').innerText = window.appState.day;
                    document.getElementById('day-subtitle').innerText = `${window.appState.term}, ${window.appState.week}`;
                    renderDayBlocks();
                }
            }
        };

        window.closeModals = () => {
            document.getElementById('modal-add').classList.add('hidden'); document.getElementById('modal-edit').classList.add('hidden');
            document.getElementById('modal-add').classList.remove('flex'); document.getElementById('modal-edit').classList.remove('flex');
        };

        const getSkeleton = () => [
            { id: 'b1', type: 'lesson', time: '9:00am - 9:45am', subject: 'English', topic: '', slidesLink: '', printLink: '', lessonPlanLink: '' },
            { id: 'b2', type: 'lesson', time: '9:45am - 10:00am', subject: 'English', topic: 'Daily Write', slidesLink: '', printLink: '', lessonPlanLink: '' },
            { id: 'b3', type: 'lesson', time: '10:00am - 11:00am', subject: 'English', topic: 'Imaginative Writing', slidesLink: '', printLink: '', lessonPlanLink: '' },
            { id: 'br1', type: 'break', time: '11:00am - 11:30am', topic: 'Break 1', icon: 'mug-hot' },
            { id: 'b4', type: 'lesson', time: '11:30am - 12:30pm', subject: 'History', topic: '', slidesLink: '', printLink: '', lessonPlanLink: '' },
            { id: 'b5', type: 'lesson', time: '12:30pm - 1:30pm', subject: 'Maths', topic: '', slidesLink: '', printLink: '', lessonPlanLink: '' },
            { id: 'br2', type: 'break', time: '1:30pm - 2:00pm', topic: 'Break 2', icon: 'apple-whole' },
            { id: 'b6', type: 'lesson', time: '2:00pm - 2:30pm', subject: 'Whole School', topic: 'Assembly', slidesLink: '', printLink: '', lessonPlanLink: '' },
            { id: 'b7', type: 'lesson', time: '2:30pm - 3:00pm', subject: 'End of Day', topic: 'Wrap Up', slidesLink: '', printLink: '', lessonPlanLink: '' },
        ];

        const getIcon = (sub) => {
            if(sub === 'English') return 'fa-book-open text-indigo-400';
            if(sub === 'Maths') return 'fa-pen text-rose-400';
            if(sub === 'History') return 'fa-calendar text-emerald-400';
            if(sub === 'Whole School') return 'fa-medal text-yellow-400';
            return 'fa-backpack text-cyan-400';
        };

        const renderWeekSelector = () => {
            const container = document.getElementById('week-grid-container');
            container.innerHTML = '';
            const curTime = window.getCurrentSchoolTime();
            for(let i=1; i<=12; i++) {
                const isCurrent = (window.appState.term === curTime.term && `Week ${i}` === curTime.week);
                const borderClass = isCurrent ? 'ring-2 ring-inset ring-cyan-400 shadow-[inset_0_0_15px_rgba(34,211,238,0.3)] bg-slate-700/80' : 'border border-slate-600 bg-slate-800/60 hover:border-cyan-400';
                container.innerHTML += `<button onclick="navigate('${window.appState.term}/Week ${i}')" class="${borderClass} text-slate-200 hover:text-white font-semibold py-4 md:py-6 rounded-xl transition-all text-base md:text-xl w-full box-border">${i}</button>`;
            }
        };

        // Render the Grid - No Overlaps, Larger Fonts, Nice Tooltips
        const renderWeekGrid = () => {
            const grid = document.getElementById('week-grid');
            grid.innerHTML = '';
            const curTime = window.getCurrentSchoolTime();
            
            ['Monday', 'Tuesday', 'Wednesday', 'Thursday'].forEach(day => {
                const data = window.appState.weekData[day] || [];
                const isCurrentDay = (window.appState.term === curTime.term && window.appState.week === curTime.week && day === curTime.day);
                
                const col = document.createElement('div');
                col.className = `flex flex-col bg-slate-800/50 rounded-xl overflow-hidden backdrop-blur-sm transition-all h-full ${isCurrentDay ? 'ring-2 ring-inset ring-cyan-400 shadow-[inset_0_0_15px_rgba(34,211,238,0.2)]' : 'border border-slate-700/50'}`;
                
                let headerHTML = `<div onclick="navigate('${window.appState.term}/${window.appState.week}/${day}')" class="${isCurrentDay ? 'bg-cyan-900/60' : 'bg-slate-800/80'} p-2 text-center border-b border-slate-700 cursor-pointer hover:bg-slate-700 flex justify-center items-center"><h2 class="text-sm md:text-base font-bold text-slate-200">${day}</h2></div>`;
                
                let bodyHTML = '<div class="p-2 space-y-2 overflow-y-auto custom-scrollbar flex-1">';
                
                if (data.length === 0) {
                    bodyHTML += `<div class="flex items-center justify-center h-full min-h-[100px]"><button onclick="initAddDay('${day}')" class="flex flex-col items-center justify-center text-slate-400 hover:text-cyan-400 p-3 border border-dashed border-slate-600 rounded-lg hover:bg-slate-800 w-full"><i class="fa-solid fa-circle-plus text-xl mb-1"></i><span class="text-[10px] md:text-xs font-bold">Populate Day</span></button></div>`;
                } else {
                    data.forEach((block, idx) => {
                        if(block.type === 'break') {
                            bodyHTML += `<div class="py-1 text-center text-slate-400 font-medium tracking-wider uppercase text-[9px] md:text-[10px] bg-slate-900/50 rounded-md border border-dashed border-slate-700"><i class="fa-solid fa-${block.icon} mr-1"></i> ${block.topic}</div>`;
                        } else {
                            bodyHTML += `
                            <div class="bg-slate-900/80 p-2 md:p-2.5 rounded-lg border border-slate-700 group flex flex-col md:flex-row items-start md:items-center justify-between gap-1.5 md:gap-2">
                                <div class="flex flex-col w-full md:w-[65%]">
                                    <div class="text-cyan-400 text-[10px] md:text-xs font-bold leading-none mb-1">${block.time}</div>
                                    <div class="text-slate-100 font-bold text-xs md:text-sm leading-tight">${block.subject}</div>
                                    <div class="text-slate-400 text-[10px] md:text-xs truncate leading-tight mt-0.5">${block.topic}</div>
                                </div>
                                <div class="flex w-full md:w-auto justify-end gap-1.5 relative mt-1 md:mt-0">
                                    ${block.slidesLink ? `<a href="${block.slidesLink}" target="_blank" class="relative group/btn flex items-center justify-center w-7 h-7 rounded-md bg-indigo-500/10 text-indigo-400 hover:bg-indigo-600 hover:text-white border border-indigo-500/30">
                                        <i class="fa-solid fa-desktop text-xs"></i>
                                        <span class="absolute -top-6 right-0 bg-slate-800 text-indigo-400 text-[9px] px-1.5 py-0.5 rounded opacity-0 group-hover/btn:opacity-100 shadow pointer-events-none whitespace-nowrap z-20 border border-indigo-500/30">Slides</span>
                                    </a>` : ''}
                                    ${block.printLink ? `<a href="${block.printLink}" target="_blank" class="relative group/btn flex items-center justify-center w-7 h-7 rounded-md bg-pink-500/10 text-pink-400 hover:bg-pink-600 hover:text-white border border-pink-500/30">
                                        <i class="fa-solid fa-print text-xs"></i>
                                        <span class="absolute -top-6 right-0 bg-slate-800 text-pink-400 text-[9px] px-1.5 py-0.5 rounded opacity-0 group-hover/btn:opacity-100 shadow pointer-events-none whitespace-nowrap z-20 border border-pink-500/30">Print</span>
                                    </a>` : ''}
                                    ${block.lessonPlanLink ? `<a href="${block.lessonPlanLink}" target="_blank" class="relative group/btn flex items-center justify-center w-7 h-7 rounded-md bg-emerald-500/10 text-emerald-400 hover:bg-emerald-600 hover:text-white border border-emerald-500/30">
                                        <i class="fa-solid fa-file-lines text-xs"></i>
                                        <span class="absolute -top-6 right-0 bg-slate-800 text-emerald-400 text-[9px] px-1.5 py-0.5 rounded opacity-0 group-hover/btn:opacity-100 shadow pointer-events-none whitespace-nowrap z-20 border border-emerald-500/30">Lesson Plan</span>
                                    </a>` : ''}
                                </div>
                            </div>`;
                        }
                    });
                }
                bodyHTML += '</div>';
                col.innerHTML = headerHTML + bodyHTML;
                grid.appendChild(col);
            });
        };

        // Condensed Daily View
        const renderDayBlocks = () => {
            const container = document.getElementById('day-blocks');
            container.innerHTML = '';
            const data = window.appState.weekData[window.appState.day] || [];
            
            data.forEach((block, idx) => {
                if(block.type === 'break') {
                    container.innerHTML += `<div class="py-1 text-center text-slate-400 font-medium tracking-widest uppercase text-[9px] md:text-[10px] bg-slate-800/30 rounded-lg border border-dashed border-slate-600/50 my-1"><i class="fa-solid fa-${block.icon} mr-1"></i> ${block.topic} (${block.time})</div>`;
                } else {
                    container.innerHTML += `
                    <div class="flex flex-col sm:flex-row bg-slate-800/60 hover:bg-slate-700/80 transition-colors border border-slate-600/30 rounded-lg p-2 md:px-3 md:py-1.5 group relative items-start sm:items-center mb-1.5">
                        <button onclick="initEdit('${window.appState.day}', ${idx})" class="absolute -top-2 -right-2 flex items-center justify-center w-6 h-6 rounded-full bg-amber-500 text-slate-900 shadow-md md:opacity-0 md:group-hover:opacity-100 transition-opacity z-10 hover:scale-110" title="Edit Lesson"><i class="fa-solid fa-pen text-[10px]"></i></button>
                        
                        <div class="sm:w-28 text-cyan-400 font-bold text-[10px] md:text-xs shrink-0 mb-1 sm:mb-0">${block.time}</div>
                        <div class="flex-1 flex items-center w-full">
                            <div class="mr-2 hidden md:block"><i class="fa-solid ${getIcon(block.subject)} text-sm"></i></div>
                            <div class="flex-1 pr-4">
                                <div class="text-slate-100 font-bold text-xs md:text-sm leading-tight">
                                    ${block.subject} <span class="text-slate-400 font-normal ml-1">- ${block.topic}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-1.5 mt-1 sm:mt-0 ml-auto w-full sm:w-auto justify-end pr-1">
                            ${block.lessonPlanLink ? `<a href="${block.lessonPlanLink}" target="_blank" class="relative group/btn flex items-center justify-center w-7 h-7 rounded-md bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500 hover:text-white border border-emerald-500/30 shadow-sm">
                                <i class="fa-solid fa-file-lines text-[10px]"></i>
                                <span class="absolute -top-6 bg-slate-800 text-emerald-400 text-[9px] px-1.5 py-0.5 rounded opacity-0 group-hover/btn:opacity-100 transition-opacity pointer-events-none shadow-lg whitespace-nowrap z-20">Lesson Plan</span>
                            </a>` : ''}
                            ${block.slidesLink ? `<a href="${block.slidesLink}" target="_blank" class="relative group/btn flex items-center justify-center w-7 h-7 rounded-md bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500 hover:text-white border border-indigo-500/30 shadow-sm">
                                <i class="fa-solid fa-desktop text-[10px]"></i>
                                <span class="absolute -top-6 bg-slate-800 text-indigo-400 text-[9px] px-1.5 py-0.5 rounded opacity-0 group-hover/btn:opacity-100 transition-opacity pointer-events-none shadow-lg whitespace-nowrap z-20">Slides</span>
                            </a>` : ''}
                            ${block.printLink ? `<a href="${block.printLink}" target="_blank" class="relative group/btn flex items-center justify-center w-7 h-7 rounded-md bg-pink-500/10 text-pink-400 hover:bg-pink-500 hover:text-white border border-pink-500/30 shadow-sm">
                                <i class="fa-solid fa-print text-[10px]"></i>
                                <span class="absolute -top-6 bg-slate-800 text-pink-400 text-[9px] px-1.5 py-0.5 rounded opacity-0 group-hover/btn:opacity-100 transition-opacity pointer-events-none shadow-lg whitespace-nowrap z-20">Print</span>
                            </a>` : ''}
                        </div>
                    </div>`;
                }
            });
        };

        window.initEdit = (day, idx) => {
            window.appState.day = day; window.appState.editingBlock = { ...window.appState.weekData[day][idx], index: idx };
            document.getElementById('edit-badge').innerText = day + ' | ' + window.appState.editingBlock.time;
            document.getElementById('edit-subject').value = window.appState.editingBlock.subject || '';
            document.getElementById('edit-topic').value = window.appState.editingBlock.topic || '';
            document.getElementById('edit-plan').value = window.appState.editingBlock.lessonPlanLink || '';
            document.getElementById('edit-slides').value = window.appState.editingBlock.slidesLink || '';
            document.getElementById('edit-print').value = window.appState.editingBlock.printLink || '';
            document.getElementById('modal-edit').classList.remove('hidden'); document.getElementById('modal-edit').classList.add('flex');
        };

        window.saveEdit = () => {
            const updated = [...window.appState.weekData[window.appState.day]];
            const idx = window.appState.editingBlock.index;
            updated[idx].subject = document.getElementById('edit-subject').value;
            updated[idx].topic = document.getElementById('edit-topic').value;
            updated[idx].lessonPlanLink = document.getElementById('edit-plan').value;
            updated[idx].slidesLink = document.getElementById('edit-slides').value;
            updated[idx].printLink = document.getElementById('edit-print').value;
            setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: { ...window.appState.weekData, [window.appState.day]: updated } }, { merge: true });
            closeModals();
        };

        window.initAddDay = (day) => {
            window.appState.addingDay = day; window.appState.newDayForm = getSkeleton();
            document.getElementById('add-day-title').innerText = day;
            const form = document.getElementById('add-day-form'); form.innerHTML = '';
            window.appState.newDayForm.forEach((block, idx) => {
                if(block.type === 'break') form.innerHTML += `<div class="py-1 text-center text-slate-500 font-medium tracking-widest uppercase text-[10px] border border-dashed border-slate-700 rounded">${block.topic} (${block.time})</div>`;
                else form.innerHTML += `<div class="bg-slate-900/50 p-2.5 rounded border border-slate-700 space-y-2"><div class="flex justify-between items-center border-b border-slate-700 pb-1.5 mb-1.5"><span class="text-cyan-400 font-bold text-[11px]">${block.time}</span><input type="text" id="add-sub-${idx}" value="${block.subject}" class="bg-transparent text-slate-200 font-bold text-xs text-right focus:outline-none border-b border-transparent focus:border-cyan-500" /></div><div class="grid grid-cols-1 md:grid-cols-2 gap-2"><div><label class="block text-[9px] uppercase text-slate-400 mb-0.5">Topic</label><input type="text" id="add-top-${idx}" value="${block.topic}" class="w-full bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs text-white focus:outline-none focus:border-cyan-500" /></div><div><label class="block text-[9px] uppercase text-emerald-400 mb-0.5">Plan Link</label><input type="url" id="add-plan-${idx}" class="w-full bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs text-white focus:outline-none focus:border-emerald-500" /></div><div><label class="block text-[9px] uppercase text-indigo-400 mb-0.5">Slides</label><input type="url" id="add-slide-${idx}" class="w-full bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs text-white focus:outline-none focus:border-indigo-500" /></div><div><label class="block text-[9px] uppercase text-pink-400 mb-0.5">Print Link</label><input type="url" id="add-print-${idx}" class="w-full bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs text-white focus:outline-none focus:border-pink-500" /></div></div></div>`;
            });
            document.getElementById('modal-add').classList.remove('hidden'); document.getElementById('modal-add').classList.add('flex');
        };

        window.saveFullDay = () => {
            const updated = window.appState.newDayForm.map((b, idx) => b.type === 'break' ? b : { ...b, subject: document.getElementById(`add-sub-${idx}`).value, topic: document.getElementById(`add-top-${idx}`).value, lessonPlanLink: document.getElementById(`add-plan-${idx}`).value, slidesLink: document.getElementById(`add-slide-${idx}`).value, printLink: document.getElementById(`add-print-${idx}`).value });
            setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: { ...window.appState.weekData, [window.appState.addingDay]: updated } }, { merge: true });
            closeModals();
        };
    </script>
</body>
</html>
