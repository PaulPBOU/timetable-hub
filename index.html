            const blocksContainer = document.getElementById('day-blocks-container');
            
            if (isCovered) {
                if (toggleCoverBtn) toggleCoverBtn.className = "hidden items-center justify-center h-8 w-8 md:h-9 md:w-9 rounded-full bg-purple-100 dark:bg-purple-900/40 border border-purple-300 dark:border-purple-700/50 text-purple-600 dark:text-purple-400 transition-all shadow-[inset_0_0_10px_rgba(168,85,247,0.2)]";
                if (window.appState.view === 'day' && toggleCoverBtn) toggleCoverBtn.classList.replace('hidden', 'flex');
                if (blocksContainer) blocksContainer.classList.add('bg-stripes-purple', 'px-2', 'py-1');
            } else {
                if (toggleCoverBtn) toggleCoverBtn.className = "hidden items-center justify-center h-8 w-8 md:h-9 md:w-9 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-400 dark:text-slate-500 hover:text-purple-500 hover:bg-purple-50 dark:hover:bg-purple-900/20 transition-all shadow-sm";
                if (window.appState.view === 'day' && toggleCoverBtn) toggleCoverBtn.classList.replace('hidden', 'flex');
                if (blocksContainer) blocksContainer.classList.remove('bg-stripes-purple', 'px-2', 'py-1');
            }
            
            let html = '<div class="w-full max-w-3xl mx-auto flex flex-col pb-8 pt-2 md:pt-4">';

            if (data.length === 1 && data[0].type === 'cancelled') {
                html += `
                    <div class="flex flex-col items-center justify-center p-8 md:p-12 text-center rounded-3xl bg-stripes-red border-2 border-rose-200 dark:border-rose-900/50 mt-6 md:mt-10 shadow-lg">
                        <div class="w-24 h-24 bg-rose-100 dark:bg-rose-900/50 rounded-full flex items-center justify-center mb-6 shadow-inner border border-rose-200 dark:border-rose-800/50">
                            <i class="fa-solid fa-mug-hot text-4xl md:text-5xl text-rose-500 dark:text-rose-400 drop-shadow-sm"></i>
                        </div>
                        <h3 class="text-rose-700 dark:text-rose-300 font-black text-2xl md:text-4xl uppercase tracking-widest mb-3">No Learning</h3>
                        <p class="text-rose-600 dark:text-rose-400 text-base md:text-xl font-semibold bg-white/50 dark:bg-slate-900/50 px-6 py-2 rounded-full border border-rose-200 dark:border-rose-800/50 shadow-sm">${data[0].note || 'Day Cancelled'}</p>
                    </div>
                `;
                html += '</div>';
                container.innerHTML = html;
                return;
            }

            data.forEach((block, idx) => {
                if(block.type === 'break') {
                    html += `
                    <div class="flex items-center justify-center gap-4 my-6 opacity-80">
                        <div class="h-px bg-amber-200 dark:bg-amber-800/50 flex-1"></div>
                        <div class="px-5 py-2 rounded-full bg-amber-50 dark:bg-amber-900/20 text-amber-600 dark:text-amber-400 text-[10px] md:text-xs font-black tracking-widest uppercase border border-amber-200 dark:border-amber-800/50 shadow-sm flex items-center">
                            <i class="fa-solid fa-${block.icon} mr-2 text-sm"></i> ${block.topic} (${block.time})
                        </div>
                        <div class="h-px bg-amber-200 dark:bg-amber-800/50 flex-1"></div>
                    </div>`;
                } else {
                    const theme = getTheme(block.subject);
                    const hasNote = block.note && block.note.trim() !== "";
                    
                    let printLinks = getPrintLinks(block.printLink);
                    let printBtnHTML = '';
                    if (printLinks.length === 1) {
                        printBtnHTML = `<a href="${printLinks[0]}" target="_blank" onclick="event.stopPropagation()" class="relative group/btn flex items-center justify-center px-3 py-1.5 md:px-4 md:py-2 rounded-xl bg-pink-50 dark:bg-pink-500/10 text-pink-600 dark:text-pink-400 hover:bg-pink-100 dark:hover:bg-pink-500 hover:text-white transition-all font-bold text-xs md:text-sm border border-pink-200 dark:border-pink-500/30 shadow-sm gap-2 whitespace-nowrap">
                            <i class="fa-solid fa-print"></i> Printing
                        </a>`;
                    } else if (printLinks.length > 1) {
                        let multiLinks = printLinks.map((link, i) => `<a href="${link}" target="_blank" onclick="event.stopPropagation()" class="block px-4 py-2.5 hover:bg-pink-50 dark:hover:bg-pink-800/60 text-pink-700 dark:text-pink-300 text-xs md:text-sm font-bold transition-colors whitespace-nowrap border-b border-pink-100 dark:border-pink-500/20 last:border-0">File ${i + 1}</a>`).join('');
                        
                        printBtnHTML = `
                        <div class="relative group/btn" onclick="event.stopPropagation()">
                            <button onclick="toggleDropdown(event, this)" class="px-3 py-1.5 md:px-4 md:py-2 rounded-xl bg-pink-50 dark:bg-pink-500/10 text-pink-600 dark:text-pink-400 hover:bg-pink-100 dark:hover:bg-pink-500 hover:text-white transition-all font-bold text-xs md:text-sm border border-pink-200 dark:border-pink-500/30 shadow-sm flex items-center gap-2 whitespace-nowrap cursor-pointer">
                                <i class="fa-solid fa-print"></i> Printing <i class="fa-solid fa-chevron-down text-[10px]"></i>
                            </button>
                            <div class="print-dropdown absolute top-full mt-2 left-0 hidden flex-col bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-pink-200 dark:border-pink-500/30 z-[100] overflow-hidden min-w-[120px]">
                                ${multiLinks}
                            </div>
                        </div>`;
                    }

                    html += `
                    <div class="relative bg-white dark:bg-slate-800/80 backdrop-blur-xl border border-slate-200 dark:border-slate-700/50 rounded-2xl md:rounded-[1.5rem] shadow-sm hover:shadow-xl transition-all duration-300 group mb-5 flex flex-col z-10 hover:z-20">
                        
                        <!-- Left Subject Color Stripe -->
                        <div class="absolute left-0 top-0 bottom-0 w-2 md:w-3 ${theme.bar} rounded-l-2xl md:rounded-l-[1.5rem]"></div>
                        
                        <div class="p-4 md:p-6 pl-6 md:pl-8 flex flex-col flex-1">
                            
                            <!-- Header Info -->
                            <div class="flex justify-between items-center mb-4">
                                <span class="px-3 py-1.5 ${theme.badgeBg} ${theme.badgeText} rounded-full text-[10px] md:text-xs font-bold font-mono border ${theme.badgeBorder} shadow-sm flex items-center tracking-wide">
                                    <i class="fa-regular fa-clock mr-1.5"></i> ${block.time}
                                </span>
                                
                                <div class="flex items-center z-20 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-all">
                                    <button onclick="event.stopPropagation(); moveLessonToNextDay('${window.appState.day}', ${idx}, this)" class="relative group/action flex items-center justify-center w-8 h-8 md:w-9 md:h-9 rounded-none rounded-l-xl bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:bg-amber-100 dark:hover:bg-amber-900/50 hover:text-amber-600 dark:hover:text-amber-400 transition-colors border-r border-slate-300/50 dark:border-slate-600/50 cursor-pointer">
                                        <i class="fa-solid fa-share text-xs md:text-sm"></i>
                                        <span class="absolute bottom-full mb-1 right-0 bg-white dark:bg-slate-800 text-amber-600 dark:text-amber-400 text-[10px] font-bold px-2 py-1 rounded-lg opacity-0 group-hover/action:opacity-100 transition-opacity whitespace-nowrap pointer-events-none border border-amber-200 dark:border-amber-800/50 shadow-lg z-[60]">Copy to Next Day</span>
                                    </button>
                                    <button onclick="event.stopPropagation(); initEdit('${window.appState.day}', ${idx})" class="relative group/action flex items-center justify-center w-8 h-8 md:w-9 md:h-9 rounded-none rounded-r-xl bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600 hover:text-slate-800 dark:hover:text-slate-200 transition-colors cursor-pointer">
                                        <i class="fa-solid fa-pen text-xs md:text-sm"></i>
                                        <span class="absolute bottom-full mb-1 right-0 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 text-[10px] font-bold px-2 py-1 rounded-lg opacity-0 group-hover/action:opacity-100 transition-opacity whitespace-nowrap pointer-events-none border border-slate-200 dark:border-slate-700 shadow-lg z-[60]">Edit Lesson</span>
                                    </button>
                                </div>
                            </div>

                            <!-- Main Body -->
                            <div class="flex items-start gap-4 mb-4 cursor-pointer" onclick="toggleNote(${idx})">
                                <!-- Dynamic Icon -->
                                <div class="w-14 h-14 md:w-16 md:h-16 rounded-2xl bg-slate-50 dark:bg-slate-900/50 flex items-center justify-center shrink-0 border border-slate-100 dark:border-slate-800 shadow-inner ${theme.iconColor} text-2xl md:text-3xl transition-transform group-hover:scale-105">
                                    <i class="fa-solid ${theme.icon}"></i>
                                </div>
                                <div class="flex-1 pt-1">
                                    <h2 class="text-xl md:text-2xl font-black text-slate-800 dark:text-white leading-tight flex items-center gap-2">
                                        ${block.subject}
                                        ${hasNote ? '<i class="fa-solid fa-note-sticky text-amber-500 text-sm md:text-base drop-shadow-sm" title="Note added"></i>' : ''}
                                    </h2>
                                    ${block.topic ? `<p class="text-slate-500 dark:text-slate-400 text-sm md:text-base font-medium mt-1 leading-snug">${block.topic}</p>` : `<p class="text-slate-400 dark:text-slate-500/50 text-sm md:text-base font-medium mt-1 italic">No topic outlined</p>`}
                                </div>
                            </div>

                            <!-- Link Action Row -->
                            <div class="flex flex-wrap items-center gap-2 pt-4 mt-auto border-t border-slate-100 dark:border-slate-700/50 relative z-10">
                                ${block.unitOutlineLink ? `
                                <a href="${block.unitOutlineLink}" target="_blank" onclick="event.stopPropagation()" class="px-3 py-1.5 md:px-4 md:py-2 rounded-xl bg-amber-50 dark:bg-amber-500/10 text-amber-600 dark:text-amber-400 hover:bg-amber-100 dark:hover:bg-amber-500 hover:text-white transition-all font-bold text-xs md:text-sm border border-amber-200 dark:border-amber-500/30 shadow-sm flex items-center">
                                    <i class="fa-solid fa-folder-open mr-2"></i> Paul's Overview
                                </a>` : ''}
                                
                                ${block.lessonPlanLink ? `
                                <a href="${block.lessonPlanLink}" target="_blank" onclick="event.stopPropagation()" class="px-3 py-1.5 md:px-4 md:py-2 rounded-xl bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 hover:bg-emerald-100 dark:hover:bg-emerald-500 hover:text-white transition-all font-bold text-xs md:text-sm border border-emerald-200 dark:border-emerald-500/30 shadow-sm flex items-center">
                                    <i class="fa-solid fa-file-lines mr-2"></i> Plan
                                </a>` : ''}

                                ${block.slidesLink ? `
                                <a href="${block.slidesLink}" target="_blank" onclick="event.stopPropagation()" class="px-3 py-1.5 md:px-4 md:py-2 rounded-xl bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-100 dark:hover:bg-indigo-500 hover:text-white transition-all font-bold text-xs md:text-sm border border-indigo-200 dark:border-indigo-500/30 shadow-sm flex items-center">
                                    <i class="fa-solid fa-desktop mr-2"></i> Slides
                                </a>` : ''}

                                ${printBtnHTML}
                            </div>

                            <!-- Expandable Note Field -->
                            <div id="note-wrapper-${idx}" class="grid grid-rows-[0fr] opacity-0 transition-all duration-300 ease-in-out w-full" onclick="event.stopPropagation()">
                                <div class="overflow-hidden min-h-0 w-full">
                                    <div class="mt-4 pt-4 border-t border-slate-200 dark:border-slate-700/50">
                                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider flex items-center"><i class="fa-solid fa-note-sticky mr-1.5"></i> Lesson Notes</label>
                                        <textarea id="note-input-${idx}" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-600 rounded-xl p-3 md:p-4 text-sm md:text-base text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 min-h-[100px] transition-shadow custom-scrollbar">${block.note || ''}</textarea>
                                        <div class="flex justify-end mt-3">
                                            <button onclick="saveNote(${idx})" class="bg-cyan-600 hover:bg-cyan-500 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md shadow-cyan-900/20 transition-colors flex items-center">
                                                <i class="fa-solid fa-floppy-disk mr-2"></i> Save Note
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>`;
                }
            });

            html += '</div>';
            container.innerHTML = html;
        };

        window.initEdit = (day, idx) => {
            window.appState.day = day; window.appState.editingBlock = { ...window.appState.weekData[day][idx], index: idx };
            document.getElementById('edit-badge').innerText = day + ' | ' + window.appState.editingBlock.time;
            document.getElementById('edit-subject').value = window.appState.editingBlock.subject || '';
            document.getElementById('edit-topic').value = window.appState.editingBlock.topic || '';
            document.getElementById('edit-outline').value = window.appState.editingBlock.unitOutlineLink || '';
            document.getElementById('edit-plan').value = window.appState.editingBlock.lessonPlanLink || '';
            document.getElementById('edit-slides').value = window.appState.editingBlock.slidesLink || '';
            
            // Build Multiple Print Inputs
            const printLinks = getPrintLinks(window.appState.editingBlock.printLink);
            if (printLinks.length === 0) printLinks.push(''); 
            const printContainer = document.getElementById('edit-print-container');
            printContainer.innerHTML = '';
            printLinks.forEach((link, i) => {
                printContainer.innerHTML += `
                <div class="relative flex items-center mt-1 print-input-group">
                    <i class="fa-solid fa-print absolute left-3 text-pink-500"></i>
                    <input type="url" value="${link}" placeholder="https://..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg pl-9 pr-8 py-2.5 text-slate-900 dark:text-white focus:outline-none focus:border-pink-500 edit-print-input" />
                    ${i > 0 ? `<button onclick="this.parentElement.remove()" class="absolute right-2 text-slate-400 hover:text-red-500 p-1"><i class="fa-solid fa-xmark"></i></button>` : ''}
                </div>`;
            });

            document.getElementById('modal-edit').classList.remove('hidden'); document.getElementById('modal-edit').classList.add('flex');
        };

        window.addEditPrintInput = () => {
            const container = document.getElementById('edit-print-container');
            container.insertAdjacentHTML('beforeend', `
            <div class="relative flex items-center mt-1.5 print-input-group">
                <i class="fa-solid fa-print absolute left-3 text-pink-500"></i>
                <input type="url" placeholder="https://..." class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg pl-9 pr-8 py-2.5 text-slate-900 dark:text-white focus:outline-none focus:border-pink-500 edit-print-input" />
                <button onclick="this.parentElement.remove()" class="absolute right-2 text-slate-400 hover:text-red-500 p-1"><i class="fa-solid fa-xmark"></i></button>
            </div>`);
        };

        window.saveEdit = () => {
            const updated = [...window.appState.weekData[window.appState.day]];
            const idx = window.appState.editingBlock.index;
            
            const printInputs = Array.from(document.querySelectorAll('.edit-print-input')).map(inp => inp.value.trim()).filter(val => val !== '');

            updated[idx].subject = document.getElementById('edit-subject').value;
            updated[idx].topic = document.getElementById('edit-topic').value;
            updated[idx].unitOutlineLink = document.getElementById('edit-outline').value;
            updated[idx].lessonPlanLink = document.getElementById('edit-plan').value;
            updated[idx].slidesLink = document.getElementById('edit-slides').value;
            updated[idx].printLink = printInputs;
            
            setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: { ...window.appState.weekData, [window.appState.day]: updated } }, { merge: true });
            closeModals();
        };

        window.initAddDay = (day) => {
            window.appState.addingDay = day; window.appState.newDayForm = getSkeleton();
            document.getElementById('add-day-title').innerText = day;
            const form = document.getElementById('add-day-form'); form.innerHTML = '';
            window.appState.newDayForm.forEach((block, idx) => {
                if(block.type === 'break') form.innerHTML += `<div class="py-1 text-center text-amber-600 dark:text-amber-400 font-medium tracking-widest uppercase text-[10px] bg-amber-50 dark:bg-amber-900/20 border border-dashed border-amber-300 dark:border-amber-700/50 rounded">${block.topic} (${block.time})</div>`;
                else form.innerHTML += `
                    <div class="bg-white dark:bg-slate-900/50 p-2.5 rounded border border-slate-200 dark:border-slate-700 space-y-2">
                        <div class="flex justify-between items-center border-b border-slate-200 dark:border-slate-700 pb-1.5 mb-1.5">
                            <span class="text-cyan-600 dark:text-cyan-400 font-bold text-[11px]">${block.time}</span>
                            <input type="text" id="add-sub-${idx}" value="${block.subject}" class="bg-transparent text-slate-800 dark:text-slate-200 font-bold text-xs text-right focus:outline-none border-b border-transparent focus:border-cyan-500" />
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                            <div>
                                <label class="block text-[9px] uppercase text-slate-500 dark:text-slate-400 mb-0.5">Topic</label>
                                <input type="text" id="add-top-${idx}" value="${block.topic}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded px-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-cyan-500" />
                            </div>
                            <div>
                                <label class="block text-[9px] uppercase text-amber-600 dark:text-amber-400 mb-0.5">Personal Outline</label>
                                <div class="relative flex items-center">
                                    <i class="fa-solid fa-folder-open absolute left-2 text-amber-500 text-[10px]"></i>
                                    <input type="url" id="add-outline-${idx}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-amber-500" />
                                </div>
                            </div>
                            <div>
                                <label class="block text-[9px] uppercase text-emerald-600 dark:text-emerald-400 mb-0.5">Plan Link</label>
                                <div class="relative flex items-center">
                                    <i class="fa-solid fa-file-lines absolute left-2 text-emerald-500 text-[10px]"></i>
                                    <input type="url" id="add-plan-${idx}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-emerald-500" />
                                </div>
                            </div>
                            <div>
                                <label class="block text-[9px] uppercase text-indigo-600 dark:text-indigo-400 mb-0.5">Slides</label>
                                <div class="relative flex items-center">
                                    <i class="fa-solid fa-desktop absolute left-2 text-indigo-500 text-[10px]"></i>
                                    <input type="url" id="add-slide-${idx}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-indigo-500" />
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between items-center mb-0.5">
                                    <label class="block text-[9px] uppercase text-pink-600 dark:text-pink-400">Print Link(s)</label>
                                    <button onclick="addPopulatePrintInput(${idx})" class="text-[9px] bg-pink-100 dark:bg-pink-500/20 text-pink-600 dark:text-pink-400 px-1.5 rounded hover:bg-pink-200 dark:hover:bg-pink-500/40 transition-colors shadow-sm"><i class="fa-solid fa-plus"></i></button>
                                </div>
                                <div id="add-print-container-${idx}" class="space-y-1">
                                    <div class="relative flex items-center">
                                        <i class="fa-solid fa-print absolute left-2 text-pink-500 text-[10px]"></i>
                                        <input type="url" class="add-print-${idx} w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-2 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-pink-500" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('modal-add').classList.remove('hidden'); document.getElementById('modal-add').classList.add('flex');
        };

        window.initCancelDay = (day) => {
            window.appState.cancellingDay = day;
            document.getElementById('cancel-day-title').innerText = day;
            document.getElementById('cancel-day-note').value = '';
            document.getElementById('modal-cancel').classList.remove('hidden');
            document.getElementById('modal-cancel').classList.add('flex');
        };

        window.saveCancelDay = () => {
            const note = document.getElementById('cancel-day-note').value.trim();
            const cancelledData = [{ type: 'cancelled', note: note }];
            setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: { ...window.appState.weekData, [window.appState.cancellingDay]: cancelledData } }, { merge: true });
            closeModals();
        };

        window.addPopulatePrintInput = (idx) => {
            const container = document.getElementById(`add-print-container-${idx}`);
            container.insertAdjacentHTML('beforeend', `
            <div class="relative flex items-center mt-1">
                <i class="fa-solid fa-print absolute left-2 text-pink-500 text-[10px]"></i>
                <input type="url" class="add-print-${idx} w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded pl-7 pr-6 py-1 text-xs text-slate-900 dark:text-white focus:outline-none focus:border-pink-500" />
                <button onclick="this.parentElement.remove()" class="absolute right-1 text-slate-400 hover:text-red-500 p-0.5"><i class="fa-solid fa-xmark text-[10px]"></i></button>
            </div>`);
        };

        window.saveFullDay = () => {
            const updated = window.appState.newDayForm.map((b, idx) => {
                if (b.type === 'break') return b;
                
                const printLinks = Array.from(document.querySelectorAll(`.add-print-${idx}`)).map(inp => inp.value.trim()).filter(val => val !== '');

                return {
                    ...b, 
                    subject: document.getElementById(`add-sub-${idx}`).value, 
                    topic: document.getElementById(`add-top-${idx}`).value, 
                    unitOutlineLink: document.getElementById(`add-outline-${idx}`).value, 
                    lessonPlanLink: document.getElementById(`add-plan-${idx}`).value, 
                    slidesLink: document.getElementById(`add-slide-${idx}`).value, 
                    printLink: printLinks 
                };
            });
            
            setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: { ...window.appState.weekData, [window.appState.addingDay]: updated } }, { merge: true });
            closeModals();
        };
    </script>
</body>
</html>
