<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Hub</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        .bg-glow { 
            position: absolute; 
            filter: blur(120px); 
            z-index: 0; 
            opacity: 0.35; 
            border-radius: 50%;
        }

        /* Glassmorphism Card Hover Effects */
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(71, 85, 105, 0.5);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            background: rgba(51, 65, 85, 0.8);
            border-color: #22d3ee; /* Cyan 400 */
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px rgba(34, 211, 238, 0.3);
            cursor: pointer;
        }

        /* Fade Animation for menu transitions */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body class="relative flex flex-col justify-center items-center px-6 py-12">
    
    <!-- Background Glows -->
    <div class="bg-glow w-[500px] h-[500px] bg-indigo-600 top-[-15%] left-[-10%]"></div>
    <div class="bg-glow w-[400px] h-[400px] bg-cyan-600 bottom-[-10%] right-[-5%]"></div>
    <div class="bg-glow w-[300px] h-[300px] bg-purple-600 top-[40%] left-[40%] opacity-20"></div>

    <!-- Main Container -->
    <div class="relative z-10 w-full max-w-5xl flex flex-col items-center">
        
        <!-- Header & Breadcrumbs -->
        <div class="text-center mb-12 w-full">
            <h1 class="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400 mb-4 drop-shadow-lg">
                <i class="fa-solid fa-layer-group mr-3 text-indigo-400"></i>Classroom Hub
            </h1>
            
            <div class="flex items-center justify-center gap-4 mt-6">
                <button id="back-btn" onclick="goBack()" class="hidden text-slate-400 hover:text-cyan-400 transition-colors font-bold tracking-wide">
                    <i class="fa-solid fa-arrow-left mr-2"></i> Back
                </button>
                <div id="breadcrumb" class="text-lg md:text-xl font-semibold text-slate-300 tracking-wider">
                    <!-- Dynamic Breadcrumb Text -->
                </div>
            </div>
        </div>

        <!-- Dynamic Menu Grid -->
        <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 w-full fade-in">
            <!-- Buttons are injected here by Javascript -->
        </div>

    </div>

    <script>
        // Data State
        let currentLevel = 'year'; // year, term, week, day
        let selections = {
            year: '',
            term: '',
            week: ''
        };

        const menuGrid = document.getElementById('menu-grid');
        const breadcrumb = document.getElementById('breadcrumb');
        const backBtn = document.getElementById('back-btn');

        // Render Functions
        function renderYears() {
            currentLevel = 'year';
            breadcrumb.innerHTML = '<i class="fa-solid fa-house text-cyan-400"></i> Select Year';
            backBtn.classList.add('hidden');
            
            menuGrid.innerHTML = `
                <div onclick="selectYear('2026')" class="glass-card rounded-2xl p-8 flex flex-col items-center justify-center text-center group col-span-1 md:col-span-2 lg:col-span-4 max-w-md mx-auto w-full">
                    <i class="fa-regular fa-calendar text-5xl text-indigo-400 mb-4 group-hover:scale-110 transition-transform duration-300"></i>
                    <h2 class="text-4xl font-bold text-slate-100">2026</h2>
                    <p class="text-slate-400 mt-2 font-medium">Current Academic Year</p>
                </div>
            `;
            triggerAnimation();
        }

        function renderTerms() {
            currentLevel = 'term';
            breadcrumb.innerHTML = `<span class="text-cyan-400">${selections.year}</span> <i class="fa-solid fa-chevron-right text-slate-600 text-sm mx-2"></i> Select Term`;
            backBtn.classList.remove('hidden');

            const terms = ['Term 1', 'Term 2', 'Term 3', 'Term 4'];
            menuGrid.innerHTML = terms.map((term, index) => `
                <div onclick="selectTerm('${term}')" class="glass-card rounded-2xl p-8 flex flex-col items-center justify-center text-center group">
                    <i class="fa-solid fa-folder-open text-4xl text-cyan-400 mb-4 group-hover:scale-110 transition-transform duration-300"></i>
                    <h2 class="text-3xl font-bold text-slate-100">${term}</h2>
                </div>
            `).join('');
            triggerAnimation();
        }

        function renderWeeks() {
            currentLevel = 'week';
            breadcrumb.innerHTML = `<span class="text-cyan-400">${selections.year}</span> <i class="fa-solid fa-chevron-right text-slate-600 text-sm mx-2"></i> <span class="text-cyan-400">${selections.term}</span> <i class="fa-solid fa-chevron-right text-slate-600 text-sm mx-2"></i> Select Week`;
            backBtn.classList.remove('hidden');

            let weeksHTML = '';
            // Generate 10 Weeks
            for(let i = 1; i <= 10; i++) {
                weeksHTML += `
                    <div onclick="selectWeek('Week ${i}')" class="glass-card rounded-xl p-6 flex items-center justify-between group">
                        <span class="text-xl font-bold text-slate-200">Week ${i}</span>
                        <i class="fa-solid fa-arrow-right text-slate-500 group-hover:text-cyan-400 group-hover:translate-x-1 transition-all"></i>
                    </div>
                `;
            }
            
            // Adjust grid for 10 items (makes it look clean)
            menuGrid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 w-full fade-in";
            menuGrid.innerHTML = weeksHTML;
            triggerAnimation();
        }

        function renderDays() {
            currentLevel = 'day';
            breadcrumb.innerHTML = `<span class="text-cyan-400">${selections.year}</span> <i class="fa-solid fa-chevron-right text-slate-600 text-sm mx-2"></i> <span class="text-cyan-400">${selections.term}</span> <i class="fa-solid fa-chevron-right text-slate-600 text-sm mx-2"></i> <span class="text-cyan-400">${selections.week}</span> <i class="fa-solid fa-chevron-right text-slate-600 text-sm mx-2"></i> Select Day`;
            backBtn.classList.remove('hidden');

            const days = [
                { name: 'Monday', icon: 'fa-moon', note: 'Public Holiday (Wk 8)' },
                { name: 'Tuesday', icon: 'fa-sun', note: '' },
                { name: 'Wednesday', icon: 'fa-cloud', note: '' },
                { name: 'Thursday', icon: 'fa-bolt', note: '' },
                { name: 'Friday', icon: 'fa-star', note: '' }
            ];

            menuGrid.className = "grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4 w-full fade-in";
            
            menuGrid.innerHTML = days.map(day => {
                // If it's Monday of Week 8, show the public holiday note
                let specialNote = '';
                if(day.name === 'Monday' && selections.week === 'Week 8') {
                    specialNote = `<p class="text-pink-400 text-sm mt-2 font-semibold">${day.note}</p>`;
                }

                return `
                <div onclick="openDay('${day.name}')" class="glass-card rounded-2xl p-6 flex flex-col items-center justify-center text-center group h-40">
                    <i class="fa-solid ${day.icon} text-3xl text-indigo-300 mb-3 group-hover:text-cyan-400 group-hover:scale-110 transition-all duration-300"></i>
                    <h2 class="text-2xl font-bold text-slate-100">${day.name}</h2>
                    ${specialNote}
                </div>
            `}).join('');
            triggerAnimation();
        }

        // Selection Actions
        function selectYear(year) { selections.year = year; renderTerms(); }
        function selectTerm(term) { selections.term = term; renderWeeks(); }
        function selectWeek(week) { selections.week = week; renderDays(); }
        
        function openDay(dayName) {
            // Convert "Term 2" to "term2", "Week 8" to "week8", "Tuesday" to "tuesday.html"
            const folderYear = selections.year; // Grabs the '2026' selection
            const folderTerm = selections.term.replace(/\s+/g, '').toLowerCase(); 
            const folderWeek = selections.week.replace(/\s+/g, '').toLowerCase();
            const fileDay = dayName.toLowerCase() + '.html';

            // Constructs the URL path: 2026/term2/week8/tuesday.html
            const targetUrl = `${folderYear}/${folderTerm}/${folderWeek}/${fileDay}`;
            
            // Navigate to the page
            window.location.href = targetUrl;
        }

        function goBack() {
            if (currentLevel === 'term') renderYears();
            else if (currentLevel === 'week') renderTerms();
            else if (currentLevel === 'day') renderWeeks();
        }

        function triggerAnimation() {
            menuGrid.classList.remove('fade-in');
            void menuGrid.offsetWidth; // Trigger reflow
            menuGrid.classList.add('fade-in');
        }

        // Initialize App
        renderYears();
    </script>
</body>
</html>
