<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul's School Day</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');
        body { 
            font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            padding: 0;
            width: 100vw; 
            height: 100vh;
            position: fixed;
            inset: 0;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.6); border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(71, 85, 105, 0.9); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .hidden { display: none !important; }
        
        .bg-stripes-red {
            background-color: rgba(254, 226, 226, 0.4);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(244, 63, 94, 0.05) 10px, rgba(244, 63, 94, 0.05) 20px);
        }
        .dark .bg-stripes-red {
            background-color: rgba(159, 18, 57, 0.15);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(244, 63, 94, 0.05) 10px, rgba(244, 63, 94, 0.05) 20px);
        }
        
        .bg-stripes-rff {
            background-color: #475569;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255, 255, 255, 0.1) 10px, rgba(255, 255, 255, 0.1) 20px);
        }
        .dark .bg-stripes-rff {
            background-color: #334155;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255, 255, 255, 0.05) 10px, rgba(255, 255, 255, 0.05) 20px);
        }

        .bg-card-stripes-rff {
            background-image: repeating-linear-gradient(45deg, rgba(148, 163, 184, 0.06), rgba(148, 163, 184, 0.06) 10px, transparent 10px, transparent 20px) !important;
        }
        .dark .bg-card-stripes-rff {
            background-image: repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.02) 10px, transparent 10px, transparent 20px) !important;
        }

        .bg-stripes-purple {
            background-color: rgba(168, 85, 247, 0.03);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(168, 85, 247, 0.05) 10px, rgba(168, 85, 247, 0.05) 20px);
        }
        .dark .bg-stripes-purple {
            background-color: rgba(168, 85, 247, 0.05);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(168, 85, 247, 0.05) 10px, rgba(168, 85, 247, 0.05) 20px);
        }

        @keyframes gradient-x {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-x {
            background-size: 200% 200%;
            animation: gradient-x 3s ease infinite;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-2 md:p-4 bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
    
    <div class="absolute filter blur-[100px] md:blur-[120px] z-0 opacity-40 dark:opacity-30 rounded-full w-[300px] md:w-[500px] h-[300px] md:h-[500px] bg-indigo-200 dark:bg-indigo-600 top-[-10%] left-[-10%] pointer-events-none transition-colors duration-300"></div>
    <div class="absolute filter blur-[100px] md:blur-[120px] z-0 opacity-40 dark:opacity-30 rounded-full w-[250px] md:w-[400px] h-[250px] md:h-[400px] bg-cyan-200 dark:bg-cyan-600 bottom-[-10%] right-[-5%] pointer-events-none transition-colors duration-300"></div>

    <a href="learning_zone.html" class="fixed bottom-4 right-4 md:bottom-6 md:right-6 w-14 h-14 bg-emerald-600 hover:bg-emerald-500 text-white rounded-full flex items-center justify-center transition-all shadow-[0_0_15px_rgba(16,185,129,0.4)] hover:shadow-[0_0_25px_rgba(16,185,129,0.6)] z-50 border border-emerald-400 group">
        <i class="fa-solid fa-headphones text-xl"></i>
        <span class="absolute right-16 top-1/2 -translate-y-1/2 bg-white dark:bg-slate-800 text-emerald-600 dark:text-emerald-400 text-xs font-bold px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none border border-emerald-200 dark:border-emerald-500/30 shadow-lg">Enter Learning Zone</span>
    </a>

    <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Main App Container -->
    <div class="relative w-full max-w-7xl h-full z-10 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-slate-200 dark:border-slate-700/50 rounded-2xl md:rounded-[2rem] shadow-2xl p-3 md:p-5 flex flex-col overflow-hidden min-h-0 transition-colors duration-300">

        <header id="app-header" class="hidden flex-row justify-between items-center shrink-0 mb-2 pb-2 md:mb-3 md:pb-2.5 border-b border-slate-200 dark:border-slate-700/70 w-full gap-2 md:gap-4 transition-all duration-300 relative">
            <div class="flex flex-row items-baseline justify-start shrink-0 gap-2 md:gap-3">
                <h1 id="header-title" class="text-xl md:text-3xl font-black text-slate-800 dark:text-white tracking-tight leading-none">Title</h1>
                <div class="flex items-center gap-1.5">
                    <span id="header-live-dot" class="relative flex h-2 w-2 hidden mb-0.5"></span>
                    <p id="header-subtitle" class="text-slate-500 dark:text-slate-400 text-[10px] md:text-xs font-bold uppercase tracking-widest">Subtitle</p>
                </div>
            </div>

            <div id="header-nav" class="hidden sm:flex items-center absolute left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2 bg-transparent justify-center shrink-0 gap-8 opacity-30 hover:opacity-100 transition-opacity duration-300">
                <button onclick="handleNavArrow(-1)" class="text-slate-500 dark:text-slate-400 hover:text-cyan-600 dark:hover:text-cyan-400 hover:scale-110 flex items-center justify-center transition-all p-2"><i class="fa-solid fa-chevron-left text-sm md:text-base"></i></button>
                <button onclick="handleNavArrow(1)" class="text-slate-500 dark:text-slate-400 hover:text-cyan-600 dark:hover:text-cyan-400 hover:scale-110 flex items-center justify-center transition-all p-2"><i class="fa-solid fa-chevron-right text-sm md:text-base"></i></button>
            </div>

            <div class="flex items-center justify-end shrink-0 gap-2 md:gap-3 z-10">
                <button id="header-todo-btn" onclick="openTodoModal()" class="hidden items-center justify-center h-8 md:h-9 px-3 rounded-full bg-cyan-50 dark:bg-cyan-900/30 border border-cyan-200 dark:border-cyan-700/50 text-cyan-600 dark:text-cyan-400 hover:bg-cyan-100 dark:hover:bg-cyan-900/50 transition-all shadow-sm gap-2" title="Manage Daily Tasks">
                    <i class="fa-solid fa-list-check text-xs"></i>
                    <span id="header-todo-count" class="text-[10px] md:text-xs font-bold">Tasks</span>
                </button>

                <button id="header-toggle-cover-btn" onclick="toggleCoverDay(window.appState.day)" class="hidden items-center justify-center h-8 w-8 md:h-9 md:w-9 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-400 dark:text-slate-500 hover:text-purple-500 hover:bg-purple-50 dark:hover:bg-purple-900/20 transition-all shadow-sm" title="Toggle Class Cover">
                    <i class="fa-solid fa-chalkboard-user text-xs md:text-sm"></i>
                </button>

                <div class="flex items-center bg-slate-100 dark:bg-slate-800 border border-slate-200/80 dark:border-slate-700/80 shadow-sm rounded-full p-1 transition-all duration-300">
                    <button id="global-back-btn" class="hidden items-center group pl-2 pr-3 h-7 md:h-8 hover:bg-white dark:hover:bg-slate-700/50 rounded-full transition-all duration-300" onclick="handleGlobalBack()">
                        <div class="w-5 h-5 md:w-6 md:h-6 rounded-full bg-white dark:bg-slate-600 shadow-sm flex items-center justify-center group-hover:-translate-x-0.5 transition-transform duration-300 border border-slate-100 dark:border-slate-500 text-slate-500 dark:text-slate-300">
                            <i class="fa-solid fa-chevron-left text-[9px] md:text-[10px]"></i>
                        </div>
                        <span id="global-back-text" class="ml-1.5 font-bold text-[10px] md:text-xs text-slate-600 dark:text-slate-300">Back</span>
                    </button>
                    
                    <div id="global-divider" class="hidden w-px h-4 bg-slate-200 dark:bg-slate-600 mx-1"></div>

                    <button onclick="navigate('landing')" class="w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center hover:bg-white dark:hover:bg-slate-700/50 text-slate-500 dark:text-slate-400 hover:text-cyan-600 dark:hover:text-cyan-400 transition-colors" title="Home">
                        <i class="fa-solid fa-house text-xs"></i>
                    </button>
                    
                    <button onclick="toggleTheme()" class="w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center hover:bg-white dark:hover:bg-slate-700/50 text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors" title="Toggle Theme">
                        <i class="fa-solid fa-moon theme-icon-class text-xs transition-transform hover:rotate-12"></i>
                    </button>
                </div>
            </div>
        </header>

        <div id="view-landing" class="hidden flex-col items-center justify-center h-full space-y-10 animate-in fade-in zoom-in duration-500 relative w-full">
            <button onclick="toggleTheme()" class="absolute top-0 right-0 mt-2 mr-2 md:mt-4 md:mr-4 w-10 h-10 md:w-12 md:h-12 rounded-full flex items-center justify-center bg-white/80 dark:bg-slate-800/80 backdrop-blur-md shadow-sm border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-white dark:hover:bg-slate-700 transition-all hover:scale-105 z-20" title="Toggle Theme">
                <i class="fa-solid fa-moon theme-icon-class text-sm md:text-base transition-transform hover:rotate-12"></i>
            </button>

            <div class="text-center">
                <i class="fa-solid fa-graduation-cap text-6xl text-cyan-500 dark:text-cyan-400 mb-6 drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]"></i>
                <h1 class="text-4xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-600 to-indigo-600 dark:from-cyan-400 dark:to-indigo-400 mb-4">5-6N 2026</h1>
                <p class="text-slate-500 dark:text-slate-400 text-base md:text-xl font-medium tracking-wide">Paul Boustani Classroom Hub</p>
            </div>
            
            <div class="flex flex-col gap-4 w-full max-w-2xl px-4">
                <button onclick="initStartDay()" class="w-full bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-300 hover:to-orange-400 text-white font-black py-6 md:py-8 rounded-[2rem] shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all text-2xl md:text-4xl flex items-center justify-center group border border-amber-300/50">
                    <i class="fa-solid fa-sun mr-4 group-hover:rotate-180 transition-transform duration-700"></i>
                    Start The Day
                </button>
                
                <div class="flex flex-col sm:flex-row gap-4 w-full">
                    <button onclick="jumpToCurrentWeek()" class="flex-1 bg-gradient-to-br from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-5 md:py-6 rounded-2xl shadow-lg border border-cyan-400/30 hover:border-cyan-300 transition-all text-xl flex flex-col items-center justify-center group">
                        <i class="fa-regular fa-calendar-check text-2xl mb-2 group-hover:scale-110 transition-transform"></i>
                        Current Week
                    </button>
                    <button onclick="navigate('terms')" class="flex-1 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-800 dark:text-white font-bold py-5 md:py-6 rounded-2xl shadow-lg border border-slate-300 dark:border-slate-600 dark:hover:border-slate-400 transition-all text-xl flex flex-col items-center justify-center group">
                        <i class="fa-solid fa-table-list text-2xl mb-2 group-hover:scale-110 transition-transform"></i>
                        Daily Schedule
                    </button>
                    <button onclick="window.location.href='https://paulpbou.github.io/timetable-hub/interactive_apps/landing.html'" class="flex-1 bg-indigo-50 hover:bg-indigo-100 dark:bg-indigo-900/20 dark:hover:bg-indigo-900/40 text-indigo-700 dark:text-indigo-400 font-bold py-5 md:py-6 rounded-2xl shadow-lg border border-indigo-200 dark:border-indigo-800 transition-all text-xl flex flex-col items-center justify-center group">
                        <i class="fa-solid fa-layer-group text-2xl mb-2 group-hover:scale-110 transition-transform"></i>
                        Interactive Apps
                    </button>
                </div>
            </div>
        </div>

        <div id="view-start-day" class="hidden flex-col h-full animate-in zoom-in duration-500 min-h-0 bg-slate-50 dark:bg-slate-900 absolute inset-0 z-50 overflow-hidden rounded-2xl md:rounded-[2rem]">
            <div class="absolute top-6 left-6 md:top-10 md:left-10 bottom-6 flex flex-col z-30 pointer-events-none">
                <div class="shrink-0 mb-4">
                    <h3 class="text-sm md:text-lg font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-1 md:mb-2 flex items-center gap-2">
                        <i class="fa-solid fa-sun text-amber-500"></i> Today's Schedule
                    </h3>
                    <h2 id="left-day-name" class="text-5xl md:text-7xl font-black tracking-tighter text-slate-800 dark:text-white drop-shadow-sm leading-none mb-1 md:mb-2">Day</h2>
                    <p id="left-date-text" class="text-lg md:text-2xl font-bold text-cyan-600 dark:text-cyan-400 tracking-wide">D/M/YYYY</p>
                </div>
                
                <div id="start-day-todos-wrapper" class="hidden flex-col gap-1 pointer-events-auto overflow-y-auto custom-scrollbar pr-2 w-48 md:w-64 min-h-0 relative mt-2">
                    <h4 onclick="toggleStartDayTodos()" class="text-[10px] md:text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 shrink-0 flex items-center cursor-pointer hover:text-slate-600 dark:hover:text-slate-300 transition-colors select-none p-1 -ml-1 rounded group">
                        <i class="fa-solid fa-list-check text-cyan-500 mr-1.5"></i> DAILY TODO:
                        <i id="todo-chevron" class="fa-solid fa-chevron-down ml-auto text-[10px] transition-transform duration-300 -rotate-90 opacity-70 group-hover:opacity-100"></i>
                    </h4>
                    <div id="start-day-todos-anim" class="grid grid-rows-[0fr] opacity-0 transition-all duration-300 ease-in-out w-full">
                        <div class="overflow-hidden min-h-0 w-full">
                            <div id="start-day-todos" class="flex flex-col gap-2 shrink-0 pb-4 pt-1"></div>
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="navigate('landing')" class="absolute top-4 right-4 md:top-6 md:right-8 z-50 w-10 h-10 md:w-12 md:h-12 bg-white/80 dark:bg-slate-800/80 backdrop-blur text-slate-500 dark:text-slate-400 rounded-full flex items-center justify-center hover:bg-rose-50 hover:text-rose-600 dark:hover:bg-rose-900/30 dark:hover:text-rose-400 transition-all shadow-md border border-slate-200 dark:border-slate-700 hover:scale-105 shrink-0 cursor-pointer" title="Close Schedule">
                <i class="fa-solid fa-xmark text-lg md:text-xl"></i>
            </button>

            <div class="flex-1 min-h-0 px-2 pb-2 pt-[3px] md:px-6 md:pb-6 md:pt-[3px] w-full mx-auto overflow-hidden relative">
                <div id="start-day-schedule" class="flex flex-col gap-1.5 md:gap-2 h-full min-h-0 w-fit pb-2 md:pb-4 overflow-y-auto custom-scrollbar pr-2 md:pr-4 mx-auto pt-[3px]"></div>

                <div class="absolute top-16 right-2 md:top-24 md:right-8 flex flex-col gap-2 md:gap-2.5 shrink-0 w-32 sm:w-40 md:w-52 z-20">
                    <h4 class="text-[9px] md:text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 ml-1 mb-0.5 flex items-center"><i class="fa-solid fa-bolt text-amber-400 mr-1.5 text-xs md:text-sm"></i> Teacher Tools</h4>
                    <a href="https://online.schoolbytes.education/sbadmin/home" target="_blank" class="w-full px-2 py-2 md:px-3.5 md:py-3 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md hover:bg-amber-50 dark:hover:bg-amber-900/20 text-slate-700 dark:text-slate-200 text-[10px] sm:text-xs md:text-sm font-bold rounded-xl md:rounded-2xl shadow-sm hover:shadow-md border border-slate-200/80 dark:border-slate-700 transition-all hover:-translate-y-1 flex items-center gap-2 md:gap-3 group">
                        <div class="w-6 h-6 md:w-8 md:h-8 rounded-md md:rounded-lg bg-amber-100 dark:bg-amber-900/50 flex items-center justify-center text-amber-500 shrink-0 group-hover:scale-110 group-hover:rotate-6 transition-all shadow-inner"><i class="fa-solid fa-bullhorn text-[10px] md:text-sm"></i></div>
                        <span class="truncate">Daily Update</span>
                    </a>
                    <a href="https://outlook.cloud.microsoft/mail/" target="_blank" class="w-full px-2 py-2 md:px-3.5 md:py-3 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md hover:bg-blue-50 dark:hover:bg-blue-900/20 text-slate-700 dark:text-slate-200 text-[10px] sm:text-xs md:text-sm font-bold rounded-xl md:rounded-2xl shadow-sm hover:shadow-md border border-slate-200/80 dark:border-slate-700 transition-all hover:-translate-y-1 flex items-center gap-2 md:gap-3 group">
                        <div class="w-6 h-6 md:w-8 md:h-8 rounded-md md:rounded-lg bg-blue-100 dark:bg-blue-900/50 flex items-center justify-center text-blue-500 shrink-0 group-hover:scale-110 group-hover:-rotate-6 transition-all shadow-inner"><i class="fa-solid fa-envelope text-[10px] md:text-sm"></i></div>
                        <span class="truncate">Check E-mail</span>
                    </a>
                    <a href="https://online.schoolbytes.education/sbadmin/attendance/roll_call/teacher" target="_blank" class="w-full px-2 py-2 md:px-3.5 md:py-3 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md hover:bg-emerald-50 dark:hover:bg-emerald-900/20 text-slate-700 dark:text-slate-200 text-[10px] sm:text-xs md:text-sm font-bold rounded-xl md:rounded-2xl shadow-sm hover:shadow-md border border-slate-200/80 dark:border-slate-700 transition-all hover:-translate-y-1 flex items-center gap-2 md:gap-3 group">
                        <div class="w-6 h-6 md:w-8 md:h-8 rounded-md md:rounded-lg bg-emerald-100 dark:bg-emerald-900/50 flex items-center justify-center text-emerald-500 shrink-0 group-hover:scale-110 group-hover:rotate-6 transition-all shadow-inner"><i class="fa-solid fa-clipboard-user text-[10px] md:text-sm"></i></div>
                        <span class="truncate">Mark The Roll</span>
                    </a>
                </div>
            </div>
        </div>

        <div id="view-term-select" class="hidden flex-col items-center justify-center h-full animate-in fade-in duration-300 min-h-0">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-lg overflow-y-auto custom-scrollbar p-2">
                <button onclick="navigate('Term 1')" class="bg-slate-100 dark:bg-slate-800/80 hover:bg-indigo-100 dark:hover:bg-indigo-600 text-slate-800 dark:text-white font-bold py-5 md:py-6 rounded-xl shadow-md border border-slate-300 dark:border-transparent dark:hover:border-indigo-500 transition-all text-xl">Term 1</button>
                <button onclick="navigate('Term 2')" class="bg-slate-100 dark:bg-slate-800/80 hover:bg-cyan-100 dark:hover:bg-cyan-600 text-slate-800 dark:text-white font-bold py-5 md:py-6 rounded-xl shadow-md border border-slate-300 dark:border-transparent dark:hover:border-cyan-500 transition-all text-xl">Term 2</button>
                <button onclick="navigate('Term 3')" class="bg-slate-100 dark:bg-slate-800/80 hover:bg-emerald-100 dark:hover:bg-emerald-600 text-slate-800 dark:text-white font-bold py-5 md:py-6 rounded-xl shadow-md border border-slate-300 dark:border-transparent dark:hover:border-emerald-500 transition-all text-xl">Term 3</button>
                <button onclick="navigate('Term 4')" class="bg-slate-100 dark:bg-slate-800/80 hover:bg-rose-100 dark:hover:bg-rose-600 text-slate-800 dark:text-white font-bold py-5 md:py-6 rounded-xl shadow-md border border-slate-300 dark:border-transparent dark:hover:border-rose-500 transition-all text-xl">Term 4</button>
            </div>
        </div>

        <div id="view-week-select" class="hidden flex-col h-full items-center justify-start animate-in fade-in duration-300 min-h-0 pt-2">
            <div id="week-grid-container" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4 w-full max-w-6xl custom-scrollbar overflow-y-auto pb-4 pt-2 flex-1 px-1 md:px-4 mx-auto"></div>
        </div>

        <div id="view-week" class="hidden flex-col h-full animate-in fade-in duration-300 min-h-0">

        <div id="view-day" class="hidden flex-col h-full animate-in slide-in-from-right-8 duration-300 min-h-0">
            <div id="day-blocks-container" class="flex-1 overflow-y-auto custom-scrollbar pr-2 md:pr-4 relative transition-all duration-500 rounded-2xl mt-1">
                <div id="day-blocks" class="space-y-3 pb-4 h-full min-h-full"></div>
            </div>
        </div>

    </div>

    <!-- Daily Tasks / Todo Modal -->
    <div id="modal-todos" class="hidden fixed inset-0 z-[100] items-center justify-center p-4 bg-slate-900/95 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-2xl shadow-2xl w-full max-w-md flex flex-col overflow-hidden">
            <div class="flex justify-between items-center p-4 md:p-5 border-b border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50">
                <h3 class="text-lg md:text-xl font-bold text-slate-800 dark:text-white flex items-center"><i class="fa-solid fa-list-check text-cyan-500 mr-2"></i> Daily Tasks</h3>
                <button onclick="closeModals()" class="text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEGrh2SIC20vJj_nLm4x34ok01srxip7I",
            authDomain: "paul-s-2026.firebaseapp.com",
            projectId: "paul-s-2026",
            storageBucket: "paul-s-2026.firebasestorage.app",
            messagingSenderId: "524167059781",
            appId: "1:524167059781:web:57347f46b29c9d4a49862c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let unsubscribeDB = null;

        window.appState = { 
            view: 'landing', 
            term: '', week: '', day: '', 
            weekData: { Monday: [], Tuesday: [], Wednesday: [], Thursday: [] }, 
            coverData: {}, 
            todosData: { Monday: [], Tuesday: [], Wednesday: [], Thursday: [] },
            soundPlayed: false,
            newDayForm: [],
            addingDay: '',
            activeBlockIndex: 0
        };

        window.parseTimeStrToMins = (tStr) => {
            if(!tStr) return 0;
            const match = tStr.trim().match(/(\d+):(\d+)\s*(am|pm)/i);
            if(!match) return 0;
            let h = parseInt(match[1]);
            const m = parseInt(match[2]);
            const ampm = match[3].toLowerCase();
            if(ampm === 'pm' && h < 12) h += 12;
            if(ampm === 'am' && h === 12) h = 0;
            return h * 60 + m;
        };

        window.formatMinsToTimeStr = (mins) => {
            let h = Math.floor(mins / 60);
            const m = mins % 60;
            const ampm = h >= 12 ? 'pm' : 'am';
            if(h > 12) h -= 12;
            if(h === 0) h = 12;
            return `${h}:${m.toString().padStart(2, '0')}${ampm}`;
        };

        const calculateNewTimeString = (timeStr, durationMins) => {
            const parts = timeStr.split('-');
            if(parts.length !== 2) return timeStr; 
            
            const startMins = window.parseTimeStrToMins(parts[0]);
            if(startMins === 0 && parts[0].trim().toLowerCase() !== "12:00am") return timeStr;
            
            const endMins = startMins + durationMins;
            return `${parts[0].trim()} - ${window.formatMinsToTimeStr(endMins)}`;
        };

        window.setQuickEditDuration = (mins) => {
            const timeInput = document.getElementById('edit-time');
            timeInput.value = calculateNewTimeString(timeInput.value, mins);
        };

        window.setPopulateDuration = (mins) => {
            const idx = window.appState.activeBlockIndex;
            let form = window.appState.newDayForm;
            if(!form[idx]) return;

            const newTime = calculateNewTimeString(form[idx].time, mins);
            form[idx].time = newTime;
            
            // Cascade shift subsequent blocks up to the next break
            let currentEnd = window.parseTimeStrToMins(newTime.split('-')[1]);
            for(let i = idx + 1; i < form.length; i++) {
                if(form[i].type === 'break') break; 
                
                const bParts = form[i].time.split('-');
                const bStart = window.parseTimeStrToMins(bParts[0]);
                const bEnd = window.parseTimeStrToMins(bParts[1]);
                const bDur = (bEnd > bStart) ? (bEnd - bStart) : 40; 
                
                const newBStart = currentEnd;
                const newBEnd = currentEnd + bDur;
                form[i].time = `${window.formatMinsToTimeStr(newBStart)} - ${window.formatMinsToTimeStr(newBEnd)}`;
                currentEnd = newBEnd;
            }
            renderPopulateUI();
        };

        window.toggleTheme = () => {
            const html = document.documentElement;
            const icons = document.querySelectorAll('.theme-icon-class');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icons.forEach(icon => icon.classList.replace('fa-moon', 'fa-sun'));
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                icons.forEach(icon => icon.classList.replace('fa-sun', 'fa-moon'));
                localStorage.theme = 'dark';
            }
        };
        
        if (localStorage.theme === 'light' || (!('theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
            document.addEventListener("DOMContentLoaded", () => {
                document.querySelectorAll('.theme-icon-class').forEach(icon => icon.classList.replace('fa-moon', 'fa-sun'));
            });
        }

        window.showToast = (msg) => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'bg-slate-800 dark:bg-slate-700 text-white px-5 py-3 rounded-xl shadow-xl text-sm font-semibold animate-in slide-in-from-bottom-5 fade-in duration-300 flex items-center border border-slate-600 z-[9999]';
            toast.innerHTML = `<i class="fa-solid fa-circle-info text-cyan-400 mr-2"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('animate-out', 'slide-out-to-bottom-5', 'fade-out', 'duration-300');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        window.playStartSound = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const playOsc = (freq, time, type='sine') => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + time);
                    gain.gain.setValueAtTime(0, ctx.currentTime + time);
                    gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + time + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + time + 0.5);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime + time);
                    osc.stop(ctx.currentTime + time + 0.5);
                };
                playOsc(523.25, 0.0);
                playOsc(659.25, 0.1);
                playOsc(783.99, 0.2);
                playOsc(1046.50, 0.3, 'triangle');
            } catch(e) { console.log('Audio not supported', e); }
        };

        window.toggleDropdown = (e, btn) => {
            e.stopPropagation();
            const dropdown = btn.nextElementSibling;
            const isHidden = dropdown.classList.contains('hidden');
            
            document.querySelectorAll('.print-dropdown').forEach(d => {
                d.classList.add('hidden');
                d.classList.remove('flex');
            });
            
            if (isHidden) {
                dropdown.classList.remove('hidden');
                dropdown.classList.add('flex');
            }
        };

        document.addEventListener('click', () => {
            document.querySelectorAll('.print-dropdown').forEach(d => {
                d.classList.add('hidden');
                d.classList.remove('flex');
            });
        });

        window.addEventListener('hashchange', handleHashRouting);
        
        function handleHashRouting() {
            const hash = decodeURIComponent(window.location.hash.replace('#', ''));
            if (!hash || hash === 'landing') {
                renderView('landing');
            } else if (hash === 'terms') {
                renderView('term-select');
            } else if (hash === 'start-day') {
                if (!window.appState.term) {
                    const cur = window.getCurrentSchoolTime();
                    window.appState.term = cur.term;
                    window.appState.week = cur.week;
                    window.appState.day = cur.day;
                }
                loadWeekData(window.appState.term, window.appState.week);
                renderView('start-day');
            } else {
                const parts = hash.split('/');
                if (parts.length === 1) { 
                    window.appState.term = parts[0];
                    renderView('week-select');
                } else if (parts.length >= 2) {
                    const term = parts[0];
                    const week = parts[1];
                    window.appState.term = term;
                    window.appState.week = week;
                    loadWeekData(term, week);
                    
                    if (parts.length === 3) {
                        window.appState.day = parts[2];
                        renderView('day');
                    } else {
                        renderView('week');
                    }
                }
            }
        }

        window.navigate = (path) => { window.location.hash = path; };

        const getPrintLinks = (linkData) => {
            if (Array.isArray(linkData)) return linkData.filter(l => l.trim() !== '');
            if (typeof linkData === 'string' && linkData.trim() !== '') return [linkData.trim()];
            return [];
        };

        window.navigateWeek = (dir) => {
            let termNum = parseInt(window.appState.term.replace('Term ', ''));
            let weekNum = parseInt(window.appState.week.replace('Week ', ''));
            weekNum += dir;
            if (weekNum < 1) {
                termNum -= 1;
                if (termNum < 1) return; 
                weekNum = 12; 
            } else if (weekNum > 12) {
                termNum += 1;
                if (termNum > 4) return; 
                weekNum = 1;
            }
            navigate(`Term ${termNum}/Week ${weekNum}`);
        };

        window.navigateDay = (dir) => {
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday'];
            let curIdx = days.indexOf(window.appState.day);
            curIdx += dir;
            if (curIdx < 0) {
                let termNum = parseInt(window.appState.term.replace('Term ', ''));
                let weekNum = parseInt(window.appState.week.replace('Week ', ''));
                weekNum -= 1;
                if (weekNum < 1) {
                    termNum -= 1;
                    if(termNum < 1) return;
                    weekNum = 12;
                }
                navigate(`Term ${termNum}/Week ${weekNum}/Thursday`);
            } else if (curIdx >= days.length) {
                let termNum = parseInt(window.appState.term.replace('Term ', ''));
                let weekNum = parseInt(window.appState.week.replace('Week ', ''));
                weekNum += 1;
                if (weekNum > 12) {
                    termNum += 1;
                    if(termNum > 4) return;
                    weekNum = 1;
                }
                navigate(`Term ${termNum}/Week ${weekNum}/Monday`);
            } else {
                navigate(`${window.appState.term}/${window.appState.week}/${days[curIdx]}`);
            }
        };

        window.handleNavArrow = (dir) => {
            if (window.appState.view === 'week') window.navigateWeek(dir);
            else if (window.appState.view === 'day') window.navigateDay(dir);
        };

        window.getCurrentSchoolTime = () => {
            const realNow = new Date();
            const now = new Date(realNow); 
            now.setHours(0, 0, 0, 0);
            
            const terms = [
                { name: 'Term 1', start: new Date(2026, 0, 28) },
                { name: 'Term 2', start: new Date(2026, 3, 20) },
                { name: 'Term 3', start: new Date(2026, 6, 20) },
                { name: 'Term 4', start: new Date(2026, 9, 12) }
            ];
            
            let curTerm = 'Term 2', weekNum = 1;
            
            for(let i = terms.length - 1; i >= 0; i--) {
                if(now >= terms[i].start) {
                    curTerm = terms[i].name;
                    const daysDiff = Math.round((now - terms[i].start) / (1000 * 60 * 60 * 24));
                    weekNum = Math.floor(daysDiff / 7) + 1;
                    break;
                }
            }
            
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            let curDay = days[realNow.getDay()];
            
            if (curDay === 'Saturday' || curDay === 'Sunday' || curDay === 'Friday') {
                curDay = 'Monday'; 
                weekNum += 1;
            }
            
            return { term: curTerm, week: `Week ${Math.min(Math.max(weekNum, 1), 12)}`, day: curDay };
        };

        window.jumpToCurrentWeek = () => {
            const cur = window.getCurrentSchoolTime();
            navigate(`${cur.term}/${cur.week}`);
        };

        window.initStartDay = () => {

            if (unsubscribeDB) unsubscribeDB(); 
            const docRef = doc(db, "timetables", `2026_${term.replace(' ', '')}_${week.replace(' ', '')}`);
            unsubscribeDB = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    window.appState.weekData = docSnap.data().days || window.appState.weekData;
                    window.appState.coverData = docSnap.data().cover || {};
                    window.appState.todosData = docSnap.data().todos || { Monday: [], Tuesday: [], Wednesday: [], Thursday: [] };
                } else {
                    setDoc(docRef, { days: window.appState.weekData, cover: {}, todos: window.appState.todosData }, { merge: true });
                }
                
                if (window.appState.view === 'week') renderWeekGrid();
                if (window.appState.view === 'day') renderDayBlocks();
                window.updateTodoUI(); 
            });
        };

        window.autoCarryOverTodos = async (currentDay) => {
            if (!currentDay) return;
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday'];
            const curIdx = days.indexOf(currentDay);
            let prevTodos = [];

            if (curIdx > 0) {
                prevTodos = window.appState.todosData[days[curIdx - 1]] || [];
            } else if (curIdx === 0) {
                const prevTime = getPreviousSchoolWeek(window.appState.term, window.appState.week);
                if (prevTime) {
                    try {
                        const docRef = doc(db, "timetables", `2026_${prevTime.term.replace(' ', '')}_${prevTime.week.replace(' ', '')}`);
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists() && docSnap.data().todos && docSnap.data().todos['Thursday']) {
                            prevTodos = docSnap.data().todos['Thursday'];
                        }
                    } catch(e) { console.error("Error fetching previous week todos", e); }
                }
            }

            const undone = prevTodos.filter(t => !t.done);
            if (undone.length === 0) return;

            let currentTodos = [...(window.appState.todosData[currentDay] || [])];
            let added = false;
            
            undone.forEach(ut => {
                if (!currentTodos.find(ct => ct.text.toLowerCase() === ut.text.toLowerCase())) {
                    currentTodos.push({ text: ut.text, done: false });
                    added = true;
                }
            });

            if (added) {
                window.appState.todosData[currentDay] = currentTodos;
                setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { 
                    todos: { ...window.appState.todosData, [currentDay]: currentTodos } 
                }, { merge: true });
                
                if (window.appState.view === 'day' || window.appState.view === 'start-day') {
                    window.updateTodoUI();
                }
            }
        };

            const newTodos = [...currentTodos, { text: text, done: false }];
            
            window.appState.todosData[day] = newTodos;
            window.updateTodoUI();
            
            setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { 
                todos: { ...window.appState.todosData, [day]: newTodos } 
            }, { merge: true });
            
            input.value = '';
            input.focus();
        };

        window.toggleTodo = (idx, isDone) => {
            const day = window.appState.day;
            const currentTodos = [...(window.appState.todosData[day] || [])];
            if(currentTodos[idx]) {
                currentTodos[idx].done = isDone;
                window.appState.todosData[day] = currentTodos;
                window.updateTodoUI();
                setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { 
                    todos: { ...window.appState.todosData, [day]: currentTodos }

            }

                    badgeHTML = '<span class="bg-white/20 backdrop-blur-md text-white border border-white/30 px-2.5 py-1 rounded-full text-[9px] md:text-[10px] font-black tracking-widest uppercase shadow-sm flex items-center gap-1.5"><span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-white"></span></span> Current</span>';

        const getPreviousSchoolWeek = (term, weekStr) => {
            let termNum = parseInt(term.replace('Term ', ''));
            let weekNum = parseInt(weekStr.replace('Week ', ''));
            if (weekNum > 1) return { term: term, week: `Week ${weekNum - 1}` };
            else if (termNum > 1) return { term: `Term ${termNum - 1}`, week: `Week 10` }; 
            return null; 
        };

        window.getMappedIndex = (sourceDay, targetDay, sourceIdx) => {
            if (sourceDay === targetDay) return sourceIdx;
            
            const getStructure = (day) => {
                const data = window.appState.weekData[day] || getSkeleton(day);
                const br1 = data.findIndex(b => b.type === 'break' && b.topic.includes('Break 1'));
                if (br1 === -1) return day === 'Tuesday' ? 2 : 4; 
                return br1; 
            };

            const sourceB1Len = getStructure(sourceDay);
            const targetB1Len = getStructure(targetDay);

        window.renderPopulateUI = () => {
            const form = window.appState.newDayForm;
            const activeIdx = window.appState.activeBlockIndex;
            const sidebarContainer = document.getElementById('populate-sidebar-list');
            const editorContainer = document.getElementById('populate-editor-panel');
            
            // Render Sidebar
            let sidebarHTML = '';
            form.forEach((block, idx) => {
                if(block.type === 'break') {
                    sidebarHTML += `<div class="py-2 text-center flex items-center justify-center gap-2 text-amber-600 dark:text-amber-500/80 font-black tracking-widest uppercase text-[9px] md:text-[10px] bg-amber-50/50 dark:bg-amber-900/10 border-y border-dashed border-amber-200 dark:border-amber-800/50 opacity-80 my-1"><i class="fa-solid fa-${block.icon}"></i> ${block.topic}</div>`;
                } else {
                    const isActive = idx === activeIdx;
                    const theme = getTheme(block.subject, block.topic);
                    const subLabel = block.subject || 'Empty Block';
                    
                    sidebarHTML += `
                        <div onclick="setPopulateActiveBlock(${idx})" class="cursor-pointer p-3 md:p-3.5 rounded-xl border-2 transition-all flex flex-col group relative overflow-hidden ${isActive ? `border-${theme.basicColor}-500 bg-${theme.basicColor}-50 dark:bg-${theme.basicColor}-900/20 shadow-md scale-[1.02]` : 'border-transparent hover:bg-slate-200/50 dark:hover:bg-slate-800/50 bg-white dark:bg-slate-800 shadow-sm border-slate-200 dark:border-slate-700/50'}">
                            ${isActive ? `<div class="absolute left-0 top-0 bottom-0 w-1 bg-${theme.basicColor}-500 rounded-l"></div>` : `<div class="absolute left-0 top-0 bottom-0 w-1 bg-${theme.basicColor}-300 dark:bg-${theme.basicColor}-700 rounded-l opacity-0 group-hover:opacity-100 transition-opacity"></div>`}
                            <div class="flex justify-between items-start pl-2">
                                <div class="flex flex-col min-w-0 pr-2">
                                    <div class="text-[10px] md:text-xs font-bold text-slate-500 dark:text-slate-400 mb-0.5"><i class="fa-regular fa-clock mr-1 opacity-70"></i>${block.time}</div>
                                    <div id="pop-side-sub-${idx}" class="font-black text-sm md:text-base leading-tight truncate ${isActive ? `text-${theme.basicColor}-700 dark:text-${theme.basicColor}-300` : 'text-slate-700 dark:text-slate-200'}">${subLabel}</div>
                                </div>
                                <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${isActive ? `bg-${theme.basicColor}-100 dark:bg-${theme.basicColor}-900/50 text-${theme.basicColor}-600 dark:text-${theme.basicColor}-400` : 'bg-slate-100 dark:bg-slate-700 text-slate-400 dark:text-slate-500'}">
                                    <i class="fa-solid ${theme.icon} text-sm"></i>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
            sidebarContainer.innerHTML = sidebarHTML;

            const activeBlock = form[activeIdx];
            if (!activeBlock || activeBlock.type === 'break') {
                editorContainer.innerHTML = `<div class="flex-1 flex flex-col items-center justify-center text-slate-400"><i class="fa-solid fa-mug-hot text-5xl mb-4"></i><p class="font-bold">Select a lesson block to edit.</p></div>`;
                return;
            }

            const commonSubjects = ['English - Writing', 'English - Spelling', 'English - Shared Reading', 'Maths', 'History', 'Science', 'Geography', 'PDHPE', 'Creative Arts', 'Sport', 'RFF'];
            const subjectChipsHTML = commonSubjects.map(sub => `<button onclick="setPopulatePresetSubject('${sub}')" class="px-3 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-cyan-50 dark:hover:bg-cyan-900/30 text-slate-600 dark:text-slate-300 hover:text-cyan-600 dark:hover:text-cyan-400 border border-slate-200 dark:border-slate-700 hover:border-cyan-300 dark:hover:border-cyan-700 transition-colors text-[10px] md:text-xs font-bold shadow-sm whitespace-nowrap">${sub}</button>`).join('');

            let nextBlockIdx = -1;
            for(let i = activeIdx + 1; i < form.length; i++) {
                if(form[i].type !== 'break') { nextBlockIdx = i; break; }
            }
            const nextBtnHTML = nextBlockIdx !== -1 
                ? `<button onclick="setPopulateActiveBlock(${nextBlockIdx})" class="ml-auto flex items-center gap-2 bg-slate-800 hover:bg-slate-700 dark:bg-slate-700 dark:hover:bg-slate-600 text-white px-5 py-2.5 rounded-xl font-bold transition-all shadow-md active:scale-95 text-sm">Next Block <i class="fa-solid fa-arrow-right"></i></button>`
                : `<div class="ml-auto text-emerald-500 font-black flex items-center gap-2 bg-emerald-50 dark:bg-emerald-900/20 px-4 py-2 rounded-xl border border-emerald-200 dark:border-emerald-800"><i class="fa-solid fa-check"></i> Last Block</div>`;

            editorContainer.innerHTML = `
                <div class="mb-6 pb-4 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl md:text-3xl font-black text-slate-800 dark:text-white leading-tight">Edit Lesson Details</h2>
                        <span class="inline-flex items-center gap-1.5 px-3 py-1 mt-2 rounded-full bg-cyan-50 dark:bg-cyan-900/30 text-cyan-600 dark:text-cyan-400 text-xs md:text-sm font-bold border border-cyan-200 dark:border-cyan-800/50"><i class="fa-regular fa-clock"></i> ${activeBlock.time}</span>
                    </div>
                </div>

                <div class="space-y-6 md:space-y-8 flex-1">
                    
                    <div class="space-y-3 mb-6">
                        <label class="flex justify-between items-center text-sm font-bold text-slate-600 dark:text-slate-300 uppercase tracking-widest">
                            <span class="flex items-center"><i class="fa-regular fa-clock text-cyan-500 mr-2"></i> Lesson Time</span>
                            <div class="flex gap-2">
                                <button onclick="setPopulateDuration(15)" class="text-[10px] md:text-xs bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-lg hover:bg-cyan-500 hover:text-white transition-colors font-bold shadow-sm border border-slate-200 dark:border-slate-700 hover:border-cyan-500">15m</button>
                                <button onclick="setPopulateDuration(45)" class="text-[10px] md:text-xs bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-lg hover:bg-cyan-500 hover:text-white transition-colors font-bold shadow-sm border border-slate-200 dark:border-slate-700 hover:border-cyan-500">45m</button>
                                <button onclick="setPopulateDuration(60)" class="text-[10px] md:text-xs bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-lg hover:bg-cyan-500 hover:text-white transition-colors font-bold shadow-sm border border-slate-200 dark:border-slate-700 hover:border-cyan-500">60m</button>
                            </div>
                        </label>
                        <input id="pop-time-input" type="text" value="${activeBlock.time}" oninput="handlePopulateInput('time', this)" placeholder="e.g. 9:00am - 9:45am" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-base text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all font-bold shadow-sm" />
                    </div>

                    <div class="space-y-3">
                        <label class="flex items-center text-sm font-bold text-slate-600 dark:text-slate-300 uppercase tracking-widest"><i class="fa-solid fa-book-open text-cyan-500 mr-2"></i> Subject</label>
                        <div class="flex flex-wrap gap-2 mb-3">${subjectChipsHTML}</div>
                        <input id="pop-sub-input" type="text" value="${activeBlock.subject}" oninput="handlePopulateInput('subject', this)" placeholder="e.g. Maths, English, Assembly..." class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-base text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all font-bold shadow-sm" />
                    </div>

                    <div class="space-y-3">
                        <label class="flex items-center text-sm font-bold text-slate-600 dark:text-slate-300 uppercase tracking-widest"><i class="fa-solid fa-bullseye text-amber-500 mr-2"></i> Topic / Focus</label>
                        <input type="text" value="${activeBlock.topic}" oninput="handlePopulateInput('topic', this)" placeholder="What are we learning about?" class="w-full bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-base text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all shadow-sm" />
                    </div>

                    <div class="bg-slate-50/50 dark:bg-slate-800/30 p-5 rounded-2xl border border-slate-200 dark:border-slate-700/50 space-y-4">
                        <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest flex items-center mb-2"><i class="fa-solid fa-link mr-1.5"></i> Digital Resources</h4>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="relative">
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 ml-1">Personal Outline Link</label>
                                <div class="relative flex items-center shadow-sm rounded-xl">
                                    <i class="fa-solid fa-folder-open absolute left-4 text-amber-500"></i>
                                    <input type="url" value="${activeBlock.unitOutlineLink}" oninput="handlePopulateInput('unitOutlineLink', this)" placeholder="https://..." class="w-full bg-white dark:bg-slate-900/80 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-4 py-2.5 text-sm text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-amber-500/50 focus:border-amber-500 transition-all" />
                                </div>
                            </div>
                            <div class="relative">
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 ml-1">Lesson Plan Link</label>
                                <div class="relative flex items-center shadow-sm rounded-xl">
                                    <i class="fa-solid fa-file-lines absolute left-4 text-emerald-500"></i>
                                    <input type="url" value="${activeBlock.lessonPlanLink}" oninput="handlePopulateInput('lessonPlanLink', this)" placeholder="https://..." class="w-full bg-white dark:bg-slate-900/80 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-4 py-2.5 text-sm text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all" />
                                </div>
                            </div>
                            <div class="relative md:col-span-2">
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 ml-1">Slides Link</label>
                                <div class="relative flex items-center shadow-sm rounded-xl">
                                    <i class="fa-solid fa-desktop absolute left-4 text-indigo-500"></i>
                                    <input type="url" value="${activeBlock.slidesLink}" oninput="handlePopulateInput('slidesLink', this)" placeholder="https://..." class="w-full bg-white dark:bg-slate-900/80 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-4 py-2.5 text-sm text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="flex justify-between items-center text-sm font-bold text-slate-600 dark:text-slate-300 uppercase tracking-widest"><span class="flex items-center"><i class="fa-solid fa-print text-pink-500 mr-2"></i> Print Materials</span></label>
                        <div id="populate-print-container" class="space-y-2.5 bg-slate-50/50 dark:bg-slate-800/30 p-4 rounded-2xl border border-slate-200 dark:border-slate-700/50">
                            <!-- Injected by JS -->
                        </div>
                    </div>

                </div>

                <div class="mt-8 pt-4 border-t border-slate-200 dark:border-slate-800 flex justify-between items-center shrink-0">
                    <button onclick="deletePopulateBlock(${activeIdx})" class="flex items-center gap-2 bg-rose-50 dark:bg-rose-900/20 text-rose-600 dark:text-rose-400 hover:bg-rose-100 dark:hover:bg-rose-900/40 border border-rose-200 dark:border-rose-800/50 px-4 py-2.5 rounded-xl text-sm font-bold transition-all shadow-sm">
                        <i class="fa-solid fa-trash"></i> Delete Slot
                    </button>
                    <div class="flex items-center gap-4">
                        <div class="text-xs font-bold text-slate-400 hidden sm:block">Block ${form.filter(b => b.type !== 'break').indexOf(activeBlock) + 1} of ${form.filter(b => b.type !== 'break').length}</div>
                        ${nextBtnHTML}
                    </div>
                </div>
            `;
            
            renderPopulatePrintLinks();
        };

        window.setPopulateActiveBlock = (idx) => {
            if(window.appState.newDayForm[idx].type === 'break') return;
            window.appState.activeBlockIndex = idx;
            renderPopulateUI();
        };

        window.setPopulatePresetSubject = (sub) => {
            const idx = window.appState.activeBlockIndex;
            window.appState.newDayForm[idx].subject = sub;
            document.getElementById('pop-sub-input').value = sub;
            
            const sideLabel = document.getElementById(`pop-side-sub-${idx}`);
            if(sideLabel) sideLabel.innerText = sub;
            
            const sidebarContainer = document.getElementById('populate-sidebar-list');
            const scrollPos = sidebarContainer.parentElement.scrollTop;
            renderPopulateUI(); 
            setTimeout(() => { document.getElementById('populate-sidebar-list').parentElement.scrollTop = scrollPos; }, 0);
        };

        window.handlePopulateInput = (field, el) => {
            const val = el.value;
            const idx = window.appState.activeBlockIndex;
            window.appState.newDayForm[idx][field] = val;

            if(field === 'subject') {
                const sideLabel = document.getElementById(`pop-side-sub-${idx}`);
                if(sideLabel) sideLabel.innerText = val || 'Empty Block';
            }
        };

        window.renderPopulatePrintLinks = () => {
            const idx = window.appState.activeBlockIndex;
            const block = window.appState.newDayForm[idx];
            const container = document.getElementById('populate-print-container');
            if(!container) return;

            let links = Array.isArray(block.printLink) ? block.printLink : [];
            if(links.length === 0) links = ['']; 

            container.innerHTML = links.map((link, i) => `
                <div class="relative flex items-center">
                    <i class="fa-solid fa-print absolute left-4 text-pink-400"></i>
                    <input type="url" value="${link}" oninput="handlePopulatePrintUpdate(${i}, this.value)" placeholder="https://..." class="w-full bg-white dark:bg-slate-900/80 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-10 py-2.5 text-sm text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-500/50 focus:border-pink-500 transition-all shadow-sm" />
                    <button onclick="removePopulatePrint(${i})" class="absolute right-2 text-slate-300 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30 p-1.5 rounded-lg transition-colors" title="Remove Link"><i class="fa-solid fa-xmark"></i></button>
                </div>
            `).join('') + `
                <div class="pt-1">
                    <button onclick="addPopulatePrint()" class="text-xs bg-pink-50 text-pink-600 hover:bg-pink-100 dark:bg-pink-500/10 dark:text-pink-400 dark:hover:bg-pink-500/20 px-4 py-2 rounded-xl font-bold transition-colors flex items-center w-max border border-pink-200 dark:border-pink-500/30 shadow-sm">
                        <i class="fa-solid fa-plus mr-1.5"></i> Add Print Link
                    </button>
                </div>
            `;
        };

        window.handlePopulatePrintUpdate = (i, val) => {
            const block = window.appState.newDayForm[window.appState.activeBlockIndex];
            if(!Array.isArray(block.printLink)) block.printLink = [];
            block.printLink[i] = val;
        };

        window.addPopulatePrint = () => {
            const block = window.appState.newDayForm[window.appState.activeBlockIndex];
            if(!Array.isArray(block.printLink)) block.printLink = [];
            block.printLink.push('');
            renderPopulatePrintLinks();
        };

        window.removePopulatePrint = (i) => {
            const block = window.appState.newDayForm[window.appState.activeBlockIndex];
            block.printLink.splice(i, 1);
            renderPopulatePrintLinks();
        };

        window.saveFullDay = () => {
            const cleanedForm = window.appState.newDayForm.map(b => {
                if(b.type === 'break') return b;
                const cleanedPrint = Array.isArray(b.printLink) ? b.printLink.filter(l => l.trim() !== '') : [];
                return { ...b, printLink: cleanedPrint };
            });

            setDoc(doc(db, "timetables", `2026_${window.appState.term.replace(' ', '')}_${window.appState.week.replace(' ', '')}`), { days: { ...window.appState.weekData, [window.appState.addingDay]: cleanedForm } }, { merge: true });
            
            showToast(`${window.appState.addingDay} populated successfully!`);
            closeModals();
        };
    </script>
</body>
</html>
