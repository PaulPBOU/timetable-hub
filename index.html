<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="relative w-screen h-screen flex flex-col items-center justify-center p-2 md:p-6">
    <div class="absolute filter blur-[100px] md:blur-[120px] z-0 opacity-30 rounded-full w-[300px] md:w-[500px] h-[300px] md:h-[500px] bg-indigo-600 top-[-10%] left-[-10%] pointer-events-none"></div>
    <div class="absolute filter blur-[100px] md:blur-[120px] z-0 opacity-30 rounded-full w-[250px] md:w-[400px] h-[250px] md:h-[400px] bg-cyan-600 bottom-[-10%] right-[-5%] pointer-events-none"></div>

    <div class="relative w-full max-w-6xl h-full max-h-[95vh] md:max-h-[90vh] z-10 bg-slate-900/70 backdrop-blur-xl border border-slate-700/50 rounded-2xl md:rounded-[2rem] shadow-[0_8px_32px_rgba(0,0,0,0.5)] p-3 md:p-8 flex flex-col overflow-hidden">

        <div id="view-home" class="flex flex-col items-center justify-center h-full space-y-6 animate-in fade-in zoom-in duration-500">
            <div class="text-center">
                <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400 mb-2">Classroom Dashboard</h1>
                <p class="text-slate-400 text-base md:text-lg">Select a timeframe to begin</p>
            </div>
            <div class="bg-slate-800/50 p-6 md:p-8 rounded-3xl border border-slate-700/50 backdrop-blur-md shadow-2xl w-full max-w-md space-y-4">
                <div class="flex justify-between items-center text-slate-300 bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                    <span class="font-bold text-lg md:text-xl">2026</span><span class="text-cyan-400 text-sm">Selected</span>
                </div>
                <div class="flex justify-between items-center text-slate-300 bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                    <span class="font-bold text-lg md:text-xl">Term 2</span><span class="text-cyan-400 text-sm">Selected</span>
                </div>
                <button onclick="setView('week')" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex justify-between items-center px-6">
                    <span class="text-lg md:text-xl">Week 8</span><i class="fa-solid fa-chevron-right text-xl"></i>
                </button>
            </div>
        </div>

        <div id="view-week" class="hidden flex-col h-full animate-in fade-in duration-500">
            <div class="flex justify-between items-center mb-3">
                <div>
                    <h1 class="text-2xl md:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400 mb-0">Week Overview</h1>
                    <p class="text-slate-400 text-xs md:text-sm font-semibold">Term 2, Week 8</p>
                </div>
                <button onclick="setView('home')" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 md:px-4 md:py-2 text-xs md:text-sm rounded-lg flex items-center transition-colors border border-slate-600">
                    <i class="fa-solid fa-chevron-left mr-2"></i> Home
                </button>
            </div>

            <div id="week-grid" class="grid grid-cols-4 gap-1.5 md:gap-3 flex-1 overflow-y-auto overflow-x-auto custom-scrollbar pb-2 min-w-full">
                </div>

            <div class="mt-2 bg-slate-800/60 border border-slate-700/50 rounded-xl p-2 md:p-3 flex items-center justify-between backdrop-blur-sm shrink-0">
                <div class="flex items-center">
                    <div class="bg-emerald-500/20 p-2 md:p-2.5 rounded-lg mr-3">
                        <i class="fa-solid fa-medal text-emerald-400 text-xl"></i>
                    </div>
                    <div>
                        <h2 class="text-sm md:text-base font-bold text-slate-200 leading-tight">Friday</h2>
                        <p class="text-slate-400 text-[10px] md:text-xs">Whole School Sports Day</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-day" class="hidden flex-col h-full animate-in slide-in-from-right-8 duration-300">
            <div class="flex justify-between items-end border-b border-slate-700 pb-4 mb-4">
                <div>
                    <button onclick="setView('week')" class="text-cyan-400 hover:text-cyan-300 mb-2 flex items-center text-xs md:text-sm font-semibold transition-colors">
                        <i class="fa-solid fa-chevron-left mr-1"></i> Back to Week
                    </button>
                    <h1 id="day-title" class="text-2xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400 mb-1">Schedule</h1>
                    <p class="text-slate-400 text-xs md:text-sm font-semibold">Term 2, Week 8</p>
                </div>
            </div>
            <div id="day-blocks" class="flex-1 overflow-y-auto custom-scrollbar pr-2 md:pr-4 space-y-2.5">
                </div>
        </div>

    </div>

    <div id="modal-add" class="hidden fixed inset-0 z-[100] items-center justify-center p-2 md:p-6 bg-slate-900/90 backdrop-blur-md">
        <div class="bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl w-full max-w-4xl h-full md:h-[90vh] flex flex-col overflow-hidden">
            <div class="flex justify-between items-center p-4 border-b border-slate-700 bg-slate-800/50 shrink-0">
                <div>
                    <h3 class="text-lg md:text-xl font-bold text-white flex items-center"><i class="fa-solid fa-circle-plus text-cyan-400 mr-2"></i> Populate <span id="add-day-title" class="ml-1"></span></h3>
                    <p class="text-xs text-slate-400">Fill in the links and topics for your standard schedule.</p>
                </div>
                <button onclick="closeModals()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div id="add-day-form" class="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-6">
                </div>
            <div class="p-4 border-t border-slate-700 bg-slate-800/50 flex justify-end gap-3 shrink-0">
                <button onclick="closeModals()" class="px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-700 text-sm font-semibold transition-colors">Cancel</button>
                <button onclick="saveFullDay()" class="px-6 py-2 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-bold flex items-center transition-colors shadow-lg shadow-cyan-900/50">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save Day to Cloud
                </button>
            </div>
        </div>
    </div>

    <div id="modal-edit" class="hidden fixed inset-0 z-[100] items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
        <div class="bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl w-full max-w-lg flex flex-col overflow-hidden">
            <div class="flex justify-between items-center p-4 border-b border-slate-700 bg-slate-800/50">
                <h3 class="text-lg md:text-xl font-bold text-white flex items-center"><i class="fa-solid fa-pen text-amber-400 mr-2"></i> Quick Edit</h3>
                <button onclick="closeModals()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-4 space-y-3">
                <div id="edit-badge" class="text-xs text-cyan-400 font-bold mb-2 bg-cyan-900/20 inline-block px-3 py-1 rounded-full border border-cyan-800/50"></div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Subject / Header</label>
                    <input id="edit-subject" type="text" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-cyan-500 text-sm" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Topic / Description</label>
                    <input id="edit-topic" type="text" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-cyan-500 text-sm" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Lesson Plan Link</label>
                    <input id="edit-plan" type="url" placeholder="https://..." class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-emerald-500 text-sm" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Slides Link</label>
                    <input id="edit-slides" type="url" placeholder="https://..." class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1">Print Link</label>
                    <input id="edit-print" type="url" placeholder="https://..." class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-pink-500 text-sm" />
                </div>
            </div>
            <div class="p-4 border-t border-slate-700 bg-slate-800/50 flex justify-end gap-3">
                <button onclick="closeModals()" class="px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-700 text-sm font-semibold transition-colors">Cancel</button>
                <button onclick="saveEdit()" class="px-4 py-2 rounded-lg bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-bold flex items-center shadow-lg shadow-cyan-900/50">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Save Edit
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

       // Your web app's Firebase configuration
            const firebaseConfig = {
            apiKey: "AIzaSyCEGrh2SIC20vJj_nLm4x34ok01srxip7I",
            authDomain: "paul-s-2026.firebaseapp.com",
            projectId: "paul-s-2026",
            storageBucket: "paul-s-2026.firebasestorage.app",
            messagingSenderId: "524167059781",
            appId: "1:524167059781:web:57347f46b29c9d4a49862c"
            };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // State Management
        window.appState = {
            view: 'home',
            day: '',
            weekData: { Monday: [], Tuesday: [], Wednesday: [], Thursday: [] },
            editingBlock: null,
            addingDay: null,
            newDayForm: []
        };

        // Authenticate and load cloud data
        signInAnonymously(auth).then(() => {
            const docRef = doc(db, "timetables", "2026_Term2_Week8");
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    window.appState.weekData = docSnap.data().days;
                } else {
                    setDoc(docRef, { days: window.appState.weekData }, { merge: true });
                }
                renderApp();
            });
        });

        // Navigation
        window.setView = (view, day = '') => {
            window.appState.view = view;
            if (day) window.appState.day = day;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-week').classList.add('hidden');
            document.getElementById('view-day').classList.add('hidden');
            document.getElementById('view-' + view).classList.remove('hidden');
            if(view !== 'home') document.getElementById('view-' + view).classList.add('flex');
            renderApp();
        };

        window.closeModals = () => {
            document.getElementById('modal-add').classList.add('hidden');
            document.getElementById('modal-edit').classList.add('hidden');
            document.getElementById('modal-add').classList.remove('flex');
            document.getElementById('modal-edit').classList.remove('flex');
        };

        // Skeleton Data for Empty Days
        const getSkeleton = () => [
            { id: 'b1', type: 'lesson', time: '9:00am - 9:45am', subject: 'English', topic: '', slidesLink: '', printLink: '', lessonPlanLink: '' },
            { id: 'b2', type: 'lesson', time: '9:45am - 10:00am', subject: 'English', topic: 'Daily Write', slidesLink: '', printLink: '', lessonPlanLink: '' },
            { id: 'b3', type: 'lesson', time: '10:00am - 11:00am', subject: 'English', topic: 'Imaginative Writing', slidesLink: '', printLink: '', lessonPlanLink: '' },
            { id: 'br1', type: 'break', time: '11:00am - 11:30am', topic: 'Break 1', icon: 'mug-hot' },
            { id: 'b4', type: 'lesson', time: '11:30am - 12:30pm', subject: 'History', topic: '', slidesLink: '', printLink: '', lessonPlanLink: '' },
            { id: 'b5', type: 'lesson', time: '12:30pm - 1:30pm', subject: 'Maths', topic: '', slidesLink: '', printLink: '', lessonPlanLink: '' },
            { id: 'br2', type: 'break', time: '1:30pm - 2:00pm', topic: 'Break 2', icon: 'apple-whole' },
            { id: 'b6', type: 'lesson', time: '2:00pm - 2:30pm', subject: 'Whole School', topic: 'Assembly', slidesLink: '', printLink: '', lessonPlanLink: '' },
            { id: 'b7', type: 'lesson', time: '2:30pm - 3:00pm', subject: 'End of Day', topic: 'Wrap Up', slidesLink: '', printLink: '', lessonPlanLink: '' },
        ];

        const getIcon = (subject) => {
            if(subject === 'English') return 'fa-book-open text-indigo-400';
            if(subject === 'Maths') return 'fa-pen text-rose-400';
            if(subject === 'History') return 'fa-calendar text-emerald-400';
            if(subject === 'Whole School') return 'fa-medal text-yellow-400';
            return 'fa-backpack text-cyan-400';
        };

        const renderApp = () => {
            if (window.appState.view === 'week') renderWeekGrid();
            if (window.appState.view === 'day') renderDayBlocks();
        };

        // Render the Condensed 4-Column Week View
        const renderWeekGrid = () => {
            const grid = document.getElementById('week-grid');
            grid.innerHTML = '';
            ['Monday', 'Tuesday', 'Wednesday', 'Thursday'].forEach(day => {
                const data = window.appState.weekData[day] || [];
                const col = document.createElement('div');
                col.className = "flex flex-col bg-slate-800/40 border border-slate-700/50 rounded-xl overflow-hidden backdrop-blur-sm min-w-[130px] md:min-w-[200px]";
                
                let headerHTML = `<div onclick="setView('day', '${day}')" class="bg-slate-800/80 p-2 md:p-3 text-center border-b border-slate-700 cursor-pointer hover:bg-slate-700 flex justify-center items-center"><h2 class="text-sm md:text-base font-bold text-slate-200">${day}</h2></div>`;
                
                let bodyHTML = '<div class="p-1.5 md:p-2 space-y-1.5 overflow-y-auto custom-scrollbar flex-1">';
                
                if (data.length === 0) {
                    bodyHTML += `<div class="flex items-center justify-center h-full"><button onclick="initAddDay('${day}')" class="flex flex-col items-center justify-center text-slate-400 hover:text-cyan-400 p-4 border border-dashed border-slate-600 rounded-xl hover:bg-slate-800 w-full"><i class="fa-solid fa-circle-plus text-2xl mb-2"></i><span class="text-xs md:text-sm font-bold">Populate Day</span></button></div>`;
                } else {
                    data.forEach((block, idx) => {
                        if(block.type === 'break') {
                            bodyHTML += `<div class="py-1 text-center text-slate-400 font-medium tracking-wider uppercase text-[8px] md:text-[10px] bg-slate-900/50 rounded border border-dashed border-slate-700"><i class="fa-solid fa-${block.icon} mr-1"></i> ${block.topic}</div>`;
                        } else {
                            bodyHTML += `
                            <div class="bg-slate-900/60 p-1.5 md:p-2 rounded-lg border border-slate-700 relative group">
                                <div class="text-cyan-400 text-[9px] md:text-[11px] font-bold leading-tight">${block.time}</div>
                                <div class="text-slate-200 font-bold text-[10px] md:text-xs leading-tight mt-0.5">${block.subject}</div>
                                <div class="text-slate-400 text-[9px] md:text-[11px] truncate leading-tight">${block.topic}</div>
                                <div class="flex gap-1 mt-1">
                                    ${block.slidesLink ? `<a href="${block.slidesLink}" target="_blank" class="text-indigo-400 hover:text-indigo-300"><i class="fa-solid fa-desktop text-[10px] md:text-xs"></i></a>` : ''}
                                    ${block.printLink ? `<a href="${block.printLink}" target="_blank" class="text-pink-400 hover:text-pink-300"><i class="fa-solid fa-print text-[10px] md:text-xs"></i></a>` : ''}
                                    ${block.lessonPlanLink ? `<a href="${block.lessonPlanLink}" target="_blank" class="text-emerald-400 hover:text-emerald-300"><i class="fa-solid fa-file-lines text-[10px] md:text-xs"></i></a>` : ''}
                                </div>
                                <button onclick="initEdit('${day}', ${idx})" class="absolute top-1 right-1 w-5 h-5 bg-slate-800 rounded flex items-center justify-center opacity-0 group-hover:opacity-100 text-amber-400 hover:bg-amber-500 hover:text-slate-900 border border-amber-500/30"><i class="fa-solid fa-pen text-[10px]"></i></button>
                            </div>`;
                        }
                    });
                }
                bodyHTML += '</div>';
                col.innerHTML = headerHTML + bodyHTML;
                grid.appendChild(col);
            });
        };

        // Render Expanded Day View
        const renderDayBlocks = () => {
            document.getElementById('day-title').innerText = window.appState.day + ' Schedule';
            const container = document.getElementById('day-blocks');
            container.innerHTML = '';
            const data = window.appState.weekData[window.appState.day] || [];
            
            data.forEach((block, idx) => {
                if(block.type === 'break') {
                    container.innerHTML += `<div class="py-2.5 text-center text-slate-400 font-medium tracking-widest uppercase text-xs bg-slate-800/30 rounded-lg border border-dashed border-slate-600/50 my-2"><i class="fa-solid fa-${block.icon} mr-1"></i> ${block.topic} (${block.time})</div>`;
                } else {
                    container.innerHTML += `
                    <div class="flex flex-col sm:flex-row bg-slate-800/60 hover:bg-slate-700/80 transition-colors border border-slate-600/30 rounded-xl p-3 md:p-4 group relative items-start sm:items-center">
                        <div class="sm:w-40 text-cyan-400 font-bold text-xs md:text-sm mb-1 sm:mb-0 shrink-0">${block.time}</div>
                        <div class="flex-1 flex items-start w-full">
                            <div class="mr-3 hidden md:block"><i class="fa-solid ${getIcon(block.subject)} text-lg"></i></div>
                            <div class="flex-1">
                                <div class="text-slate-100 font-bold text-sm md:text-lg leading-tight">${block.subject}</div>
                                <div class="text-slate-400 text-xs md:text-sm mt-0.5">${block.topic}</div>
                            </div>
                        </div>
                        <div class="flex gap-1.5 mt-3 sm:mt-0 ml-auto w-full sm:w-auto justify-end">
                            ${block.lessonPlanLink ? `<a href="${block.lessonPlanLink}" target="_blank" class="flex items-center justify-center w-8 h-8 md:w-10 md:h-10 rounded-lg bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500 hover:text-white border border-emerald-500/30"><i class="fa-solid fa-file-lines"></i></a>` : ''}
                            ${block.slidesLink ? `<a href="${block.slidesLink}" target="_blank" class="flex items-center justify-center w-8 h-8 md:w-10 md:h-10 rounded-lg bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500 hover:text-white border border-indigo-500/30"><i class="fa-solid fa-desktop"></i></a>` : ''}
                            ${block.printLink ? `<a href="${block.printLink}" target="_blank" class="flex items-center justify-center w-8 h-8 md:w-10 md:h-10 rounded-lg bg-pink-500/10 text-pink-400 hover:bg-pink-500 hover:text-white border border-pink-500/30"><i class="fa-solid fa-print"></i></a>` : ''}
                            <button onclick="initEdit('${window.appState.day}', ${idx})" class="flex items-center justify-center w-8 h-8 md:w-10 md:h-10 rounded-lg bg-amber-500/10 text-amber-400 hover:bg-amber-500 hover:text-slate-900 border border-amber-500/30 md:opacity-0 md:group-hover:opacity-100"><i class="fa-solid fa-pen"></i></button>
                        </div>
                    </div>`;
                }
            });
        };

        // Edit Single Lesson Modal
        window.initEdit = (day, idx) => {
            window.appState.day = day;
            window.appState.editingBlock = { ...window.appState.weekData[day][idx], index: idx };
            document.getElementById('edit-badge').innerText = day + ' | ' + window.appState.editingBlock.time;
            document.getElementById('edit-subject').value = window.appState.editingBlock.subject || '';
            document.getElementById('edit-topic').value = window.appState.editingBlock.topic || '';
            document.getElementById('edit-plan').value = window.appState.editingBlock.lessonPlanLink || '';
            document.getElementById('edit-slides').value = window.appState.editingBlock.slidesLink || '';
            document.getElementById('edit-print').value = window.appState.editingBlock.printLink || '';
            document.getElementById('modal-edit').classList.remove('hidden');
            document.getElementById('modal-edit').classList.add('flex');
        };

        // Save Edit to Cloud
        window.saveEdit = () => {
            const day = window.appState.day;
            const idx = window.appState.editingBlock.index;
            const updated = [...window.appState.weekData[day]];
            updated[idx].subject = document.getElementById('edit-subject').value;
            updated[idx].topic = document.getElementById('edit-topic').value;
            updated[idx].lessonPlanLink = document.getElementById('edit-plan').value;
            updated[idx].slidesLink = document.getElementById('edit-slides').value;
            updated[idx].printLink = document.getElementById('edit-print').value;
            
            const docRef = doc(db, "timetables", "2026_Term2_Week8");
            setDoc(docRef, { days: { ...window.appState.weekData, [day]: updated } }, { merge: true });
            closeModals();
        };

        // Populate Full Day Modal
        window.initAddDay = (day) => {
            window.appState.addingDay = day;
            window.appState.newDayForm = getSkeleton();
            document.getElementById('add-day-title').innerText = day;
            
            const form = document.getElementById('add-day-form');
            form.innerHTML = '';
            
            window.appState.newDayForm.forEach((block, idx) => {
                if(block.type === 'break') {
                    form.innerHTML += `<div class="py-2 text-center text-slate-500 font-medium tracking-widest uppercase text-xs border border-dashed border-slate-700 rounded-lg">${block.topic} (${block.time})</div>`;
                } else {
                    form.innerHTML += `
                    <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700 space-y-3">
                        <div class="flex justify-between items-center border-b border-slate-700 pb-2 mb-2">
                            <span class="text-cyan-400 font-bold text-sm">${block.time}</span>
                            <input type="text" id="add-sub-${idx}" value="${block.subject}" class="bg-transparent text-slate-200 font-bold text-sm text-right focus:outline-none border-b border-transparent focus:border-cyan-500" />
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <div><label class="block text-[10px] uppercase text-slate-400 mb-1">Topic</label><input type="text" id="add-top-${idx}" value="${block.topic}" class="w-full bg-slate-900 border border-slate-600 rounded-md px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500" /></div>
                            <div><label class="block text-[10px] uppercase text-emerald-400 mb-1">Plan Link</label><input type="url" id="add-plan-${idx}" class="w-full bg-slate-900 border border-slate-600 rounded-md px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500" /></div>
                            <div><label class="block text-[10px] uppercase text-indigo-400 mb-1">Slides Link</label><input type="url" id="add-slide-${idx}" class="w-full bg-slate-900 border border-slate-600 rounded-md px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500" /></div>
                            <div><label class="block text-[10px] uppercase text-pink-400 mb-1">Print Link</label><input type="url" id="add-print-${idx}" class="w-full bg-slate-900 border border-slate-600 rounded-md px-3 py-2 text-sm text-white focus:outline-none focus:border-pink-500" /></div>
                        </div>
                    </div>`;
                }
            });
            
            document.getElementById('modal-add').classList.remove('hidden');
            document.getElementById('modal-add').classList.add('flex');
        };

        // Save Full Day to Cloud
        window.saveFullDay = () => {
            const day = window.appState.addingDay;
            const updated = window.appState.newDayForm.map((block, idx) => {
                if (block.type === 'break') return block;
                return {
                    ...block,
                    subject: document.getElementById(`add-sub-${idx}`).value,
                    topic: document.getElementById(`add-top-${idx}`).value,
                    lessonPlanLink: document.getElementById(`add-plan-${idx}`).value,
                    slidesLink: document.getElementById(`add-slide-${idx}`).value,
                    printLink: document.getElementById(`add-print-${idx}`).value,
                };
            });

            const docRef = doc(db, "timetables", "2026_Term2_Week8");
            setDoc(docRef, { days: { ...window.appState.weekData, [day]: updated } }, { merge: true });
            closeModals();
        };
    </script>
</body>
</html>
