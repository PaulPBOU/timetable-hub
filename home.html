    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEGrh2SIC20vJj_nLm4x34ok01srxip7I",
            authDomain: "paul-s-2026.firebaseapp.com",
            projectId: "paul-s-2026",
            storageBucket: "paul-s-2026.firebasestorage.app",
            messagingSenderId: "524167059781",
            appId: "1:524167059781:web:57347f46b29c9d4a49862c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Determine current time
        window.getCurrentSchoolTime = () => {
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            
            // Term 3 parameters
            const term3Start = new Date(2026, 6, 20); // July 20, 2026 (Month is 0-indexed)
            
            let weekNum = 0;
            let curDay = 'Monday';
            let isTerm3 = false;

            if (now >= term3Start) {
                const daysDiff = Math.floor((now - term3Start) / (1000 * 60 * 60 * 24));
                weekNum = Math.floor(daysDiff / 7) + 1;
                if(weekNum >= 1 && weekNum <= 10) isTerm3 = true;
            }

            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            curDay = days[now.getDay()];

            return { isTerm3, week: weekNum, day: curDay };
        };

        const schoolTime = window.getCurrentSchoolTime();
        window.currentWeekNum = schoolTime.isTerm3 ? schoolTime.week : -1;
        window.currentDayStr = schoolTime.day;

        // Todo State
        window.activeTodoWeek = (window.currentWeekNum >= 1 && window.currentWeekNum <= 10) ? window.currentWeekNum : 1;
        window.activeTodoDay = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'].includes(window.currentDayStr) ? window.currentDayStr : 'Monday';
        window.todosData = [];
        let unsubscribeTodos = null;

        // Term Events State (pre-populated fallback)
        window.termEvents = {
            "1-2": [{ id: "e1", title: "Athletics Carnival", details: "All students to meet at the oval by 9am. Remember hats and sunscreen.", color: "rose" }],     
            "3-0": [{ id: "e2", title: "Staff Dev Day", details: "Pupil free day. Staff meeting in the library at 8:30am.", color: "purple" }],      
            "4-3": [{ id: "e3", title: "Science Fair", details: "Stage 3 presentations in the hall. Parents invited from 2pm.", color: "cyan" }],         
            "7-1": [{ id: "e4", title: "Zoo Excursion", details: "Bus leaves strictly at 9:15am. Bring packed recess and lunch.", color: "amber" }],       
            "9-4": [{ id: "e5", title: "Last Day of Term", details: "Casual clothes day. Gold coin donation.", color: "emerald" }]   
        };
        
        window.activeCell = { w: 0, d: 0, id: null };
        window.selectedColor = 'cyan';
        window.editSelectedColor = 'cyan';

        const colorStyles = {
            'cyan': {
                badge: 'bg-cyan-50 text-cyan-700 dark:bg-cyan-500/10 dark:text-cyan-300 ring-1 ring-inset ring-cyan-500/20 dark:ring-cyan-400/20',
                accent: 'bg-cyan-500 dark:bg-cyan-400',
                modalHeader: 'bg-cyan-50 dark:bg-cyan-900/30 border-b border-cyan-200 dark:border-cyan-800',
                modalText: 'text-cyan-700 dark:text-cyan-300'
            },
            'emerald': {
                badge: 'bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-300 ring-1 ring-inset ring-emerald-500/20 dark:ring-emerald-400/20',
                accent: 'bg-emerald-500 dark:bg-emerald-400',
                modalHeader: 'bg-emerald-50 dark:bg-emerald-900/30 border-b border-emerald-200 dark:border-emerald-800',
                modalText: 'text-emerald-700 dark:text-emerald-300'
            },
            'amber': {
                badge: 'bg-amber-50 text-amber-700 dark:bg-amber-500/10 dark:text-amber-300 ring-1 ring-inset ring-amber-500/20 dark:ring-amber-400/20',
                accent: 'bg-amber-500 dark:bg-amber-400',
                modalHeader: 'bg-amber-50 dark:bg-amber-900/30 border-b border-amber-200 dark:border-amber-800',
                modalText: 'text-amber-700 dark:text-amber-300'
            },
            'rose': {
                badge: 'bg-rose-50 text-rose-700 dark:bg-rose-500/10 dark:text-rose-300 ring-1 ring-inset ring-rose-500/20 dark:ring-rose-400/20',
                accent: 'bg-rose-500 dark:bg-rose-400',
                modalHeader: 'bg-rose-50 dark:bg-rose-900/30 border-b border-rose-200 dark:border-rose-800',
                modalText: 'text-rose-700 dark:text-rose-300'
            },
            'purple': {
                badge: 'bg-purple-50 text-purple-700 dark:bg-purple-500/10 dark:text-purple-300 ring-1 ring-inset ring-purple-500/20 dark:ring-purple-400/20',
                accent: 'bg-purple-500 dark:bg-purple-400',
                modalHeader: 'bg-purple-50 dark:bg-purple-900/30 border-b border-purple-200 dark:border-purple-800',
                modalText: 'text-purple-700 dark:text-purple-300'
            }
        };

        const dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];

        window.autoCarryOverTodos = async () => {
            const currentDay = window.activeTodoDay;
            const currentWeek = window.activeTodoWeek;
            
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            const curIdx = days.indexOf(currentDay);
            
            let prevDay = '';
            let prevWeek = currentWeek;
            
            if (curIdx > 0) {
                prevDay = days[curIdx - 1];
            } else if (curIdx === 0 && currentWeek > 1) {
                prevDay = 'Friday';
                prevWeek = currentWeek - 1;
            } else {
                return; // Nothing to carry over for Monday Wk 1
            }

            try {
                const prevDocRef = doc(db, "timetables", `2026_Term3_Week${prevWeek}`);
                const prevSnap = await getDoc(prevDocRef);
                
                let prevTodos = [];
                if (prevSnap.exists() && prevSnap.data().todos && prevSnap.data().todos[prevDay]) {
                    prevTodos = prevSnap.data().todos[prevDay];
                }

                const undone = prevTodos.filter(t => !t.done);
                if (undone.length === 0) return;

                // Load current day's todos
                const curDocRef = doc(db, "timetables", `2026_Term3_Week${currentWeek}`);
                const curSnap = await getDoc(curDocRef);
                
                let currentTodos = [];
                if (curSnap.exists() && curSnap.data().todos && curSnap.data().todos[currentDay]) {
                    currentTodos = curSnap.data().todos[currentDay];
                }

                let added = false;
                undone.forEach(ut => {
                    if (!currentTodos.find(ct => ct.text.toLowerCase() === ut.text.toLowerCase())) {
                        currentTodos.push({ text: ut.text, done: false });
                        added = true;
                    }
                });

                if (added) {
                    await setDoc(curDocRef, { todos: { [currentDay]: currentTodos } }, { merge: true });
                }
            } catch (e) {
                console.error("Error carrying over todos:", e);
            }
        };

        const renderGrid = () => {
            const grid = document.getElementById('term-grid');
            grid.innerHTML = '';

            for (let w = 0; w < 10; w++) {
                const isCurrentWeek = (w + 1) === window.currentWeekNum;
                
                const row = document.createElement('div');
                row.className = `grid grid-cols-term gap-1 h-full min-h-0 w-full rounded-xl transition-all duration-500 ${isCurrentWeek ? 'bg-indigo-50/70 dark:bg-indigo-900/30 ring-1 ring-indigo-200/80 dark:ring-indigo-700/50 shadow-sm p-0.5' : 'p-0.5'}`;

                // Week Label (Left Column)
                const weekLabel = document.createElement('div');
                weekLabel.className = `rounded-lg flex items-center justify-center flex-col shadow-sm border transition-colors ${isCurrentWeek ? 'bg-indigo-100 dark:bg-indigo-800/80 border-indigo-300 dark:border-indigo-600' : 'bg-slate-100/50 dark:bg-slate-800/40 border-slate-200/50 dark:border-slate-700/30'}`;
                weekLabel.innerHTML = `<span class="text-[8px] md:text-[9px] font-bold ${isCurrentWeek ? 'text-indigo-600 dark:text-indigo-300' : 'text-slate-400'}">Wk</span><span class="text-xs md:text-sm font-black ${isCurrentWeek ? 'text-indigo-700 dark:text-indigo-200' : 'text-slate-700 dark:text-slate-300'} leading-none">${w + 1}</span>`;
                row.appendChild(weekLabel);

                // 5 Days (Mon - Fri)
                for (let d = 0; d < 5; d++) {
                    const cellKey = `${w}-${d}`;
                    const events = window.termEvents[cellKey] || [];
                    const isCurrentDay = isCurrentWeek && dayNames[d] === window.currentDayStr;
                    
                    const cell = document.createElement('div');
                    
                    let cellClasses = "rounded-lg border transition-all p-1 flex flex-col gap-1 overflow-hidden relative group ";
                    if (isCurrentDay) {
                        cellClasses += "bg-white dark:bg-slate-800 ring-2 ring-cyan-500 shadow-lg shadow-cyan-500/30 border-transparent z-10 scale-[1.03] ";
                    } else if (isCurrentWeek) {
                        cellClasses += "bg-white/80 dark:bg-slate-800/80 border-indigo-200/50 dark:border-indigo-700/50 hover:bg-white dark:hover:bg-slate-700 ";
                    } else {
                        cellClasses += "bg-slate-50 dark:bg-slate-800/60 border-slate-200/70 dark:border-slate-700/60 hover:bg-white dark:hover:bg-slate-700 ";
                    }
                    cell.className = cellClasses;

                    const absoluteLink = `https://paulpbou.github.io/timetable-hub/#Term%203/Week%20${w + 1}/${dayNames[d]}`;
                    
                    const cellDate = new Date(2026, 6, 20 + (w * 7) + d);
                    const dateStr = cellDate.getDate() + ' ' + cellDate.toLocaleString('en-US', { month: 'short' }).toUpperCase();
                    
                    cell.innerHTML += `
                        <div class="absolute inset-0 bg-transparent pointer-events-none z-0"></div>
                        
                        <!-- Date Indicator -->
                        <div class="absolute bottom-0.5 right-1 md:bottom-1 md:right-1.5 z-[25] pointer-events-none text-[8px] md:text-[9px] font-black uppercase tracking-widest text-slate-800/30 dark:text-white/30 drop-shadow-sm">
                            ${dateStr}
                        </div>

                        <!-- Top Left: Jump to day link -->
                        <a href="${absoluteLink}" title="Go to ${dayNames[d]} timetable" target="_blank" class="absolute top-0.5 left-0.5 w-4 h-4 md:w-5 md:h-5 rounded bg-indigo-500/10 text-indigo-500 dark:bg-indigo-500/20 dark:text-indigo-400 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:bg-indigo-500 hover:text-white dark:hover:bg-indigo-500 dark:hover:text-white z-20 cursor-pointer shadow-sm">
                            <i class="fa-solid fa-arrow-up-right-from-square text-[8px] md:text-[9px]"></i>
                        </a>

                        <!-- Top Right: Add Event Button -->
                        <button onclick="openAddModal(${w}, ${d})" title="Add Event" class="absolute top-0.5 right-0.5 w-4 h-4 md:w-5 md:h-5 rounded bg-cyan-500/10 text-cyan-600 dark:bg-cyan-500/20 dark:text-cyan-400 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:bg-cyan-500 hover:text-white dark:hover:bg-cyan-500 dark:hover:text-white z-20 cursor-pointer shadow-sm">
                            <i class="fa-solid fa-plus text-[10px]"></i>
                        </button>
                    `;

                    // Render events inside cell smoothly expanding via flex-1
                    const numEvents = events.length;
                    events.forEach(evt => {
                        const styleObj = colorStyles[evt.color] || colorStyles['cyan'];
                        
                        let fontSizeClass = 'text-[9px] md:text-[10px] font-medium tracking-wide';
                        if (numEvents === 1) fontSizeClass = 'text-xs md:text-sm font-semibold tracking-wide';
                        else if (numEvents === 2) fontSizeClass = 'text-[10px] md:text-xs font-semibold tracking-wide';
                        
                        cell.innerHTML += `<button onclick="openEventDetail('${evt.id}', ${w}, ${d})" class="flex-1 w-full flex items-center justify-start px-1.5 md:px-2 py-1 rounded shadow-sm relative z-10 cursor-pointer hover:shadow-md hover:-translate-y-[1px] transition-all duration-300 overflow-hidden ${styleObj.badge} ${fontSizeClass} group/evt">
                            <div class="absolute left-0 top-0 bottom-0 w-[3px] md:w-1 ${styleObj.accent} opacity-80 group-hover/evt:w-[5px] md:group-hover/evt:w-1.5 group-hover/evt:opacity-100 transition-all duration-300"></div>
                            <span class="truncate w-full leading-tight pointer-events-none pl-1.5 md:pl-2 text-left">${evt.title}</span>
                        </button>`;
                    });

                    row.appendChild(cell);
                }
                grid.appendChild(row);
            }
        };

        window.openAddModal = (w, d) => {
            window.activeCell = { w, d, id: null };
            document.getElementById('modal-add-title').innerText = `Week ${w + 1} - ${dayNames[d]}`;
            document.getElementById('new-event-title').value = '';
            document.getElementById('new-event-details').value = '';
            
            document.getElementById('modal-add-event').classList.remove('hidden');
            document.getElementById('modal-add-event').classList.add('flex');
            
            setTimeout(() => { document.getElementById('new-event-title').focus(); }, 100);
        };

        window.openEventDetail = (id, w, d) => {
            const cellKey = `${w}-${d}`;
            const events = window.termEvents[cellKey] || [];
            const evt = events.find(e => e.id === id);
            if (!evt) return;

            window.activeCell = { w, d, id }; 
            window.editSelectedColor = evt.color;
            
            const styleObj = colorStyles[evt.color] || colorStyles['cyan'];
            const container = document.getElementById('detail-modal-container');
            
            container.innerHTML = `
                <div class="flex justify-between items-start p-5 ${styleObj.modalHeader}">
                    <div class="pr-4 w-full">
                        <input type="text" id="edit-detail-title" value="${evt.title.replace(/"/g, '&quot;')}" class="hidden w-full bg-white/50 dark:bg-slate-900/50 border border-${evt.color}-300 dark:border-${evt.color}-700 rounded-lg px-2 py-1 mb-1 text-xl font-black ${styleObj.modalText} focus:outline-none focus:ring-2 focus:ring-${evt.color}-500 transition-all">
                        <h3 id="display-detail-title" class="text-xl font-black ${styleObj.modalText} leading-tight mb-1">${evt.title}</h3>
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Week ${w + 1} - ${dayNames[d]}</p>
                    </div>
                    <button onclick="closeModals()" class="text-slate-400 hover:${styleObj.modalText} transition-colors w-8 h-8 flex items-center justify-center rounded-full bg-white/50 dark:bg-slate-900/50 shadow-sm shrink-0"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="p-5">
                    <textarea id="edit-detail-desc" class="hidden w-full h-32 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-${evt.color}-500 resize-none custom-scrollbar transition-all">${evt.details || ''}</textarea>
                    <p id="display-detail-desc" class="text-sm text-slate-700 dark:text-slate-300 leading-relaxed whitespace-pre-wrap">${evt.details || '<span class="italic text-slate-400">No additional details provided.</span>'}</p>
                    
                    <!-- Color Picker for Edit Mode -->
                    <div id="edit-detail-colors" class="hidden mt-4 flex items-center justify-between">
                        <span class="text-xs font-bold text-slate-600 dark:text-slate-300">Theme Color:</span>
                        <div class="flex gap-2">
                            <button data-color="cyan" onclick="window.editSelectedColor='cyan'; updateEditColorSelection()" class="w-6 h-6 rounded-full bg-cyan-500 ring-2 ring-offset-2 dark:ring-offset-slate-800 ${evt.color==='cyan'?'ring-cyan-500':'ring-transparent'} edit-color-btn transition-transform hover:scale-110"></button>
                            <button data-color="emerald" onclick="window.editSelectedColor='emerald'; updateEditColorSelection()" class="w-6 h-6 rounded-full bg-emerald-500 ring-2 ring-offset-2 dark:ring-offset-slate-800 ${evt.color==='emerald'?'ring-emerald-500':'ring-transparent'} edit-color-btn transition-transform hover:scale-110"></button>
                            <button data-color="amber" onclick="window.editSelectedColor='amber'; updateEditColorSelection()" class="w-6 h-6 rounded-full bg-amber-500 ring-2 ring-offset-2 dark:ring-offset-slate-800 ${evt.color==='amber'?'ring-amber-500':'ring-transparent'} edit-color-btn transition-transform hover:scale-110"></button>
                            <button data-color="rose" onclick="window.editSelectedColor='rose'; updateEditColorSelection()" class="w-6 h-6 rounded-full bg-rose-500 ring-2 ring-offset-2 dark:ring-offset-slate-800 ${evt.color==='rose'?'ring-rose-500':'ring-transparent'} edit-color-btn transition-transform hover:scale-110"></button>
                            <button data-color="purple" onclick="window.editSelectedColor='purple'; updateEditColorSelection()" class="w-6 h-6 rounded-full bg-purple-500 ring-2 ring-offset-2 dark:ring-offset-slate-800 ${evt.color==='purple'?'ring-purple-500':'ring-transparent'} edit-color-btn transition-transform hover:scale-110"></button>
                        </div>
                    </div>
                </div>
                <div class="p-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-2">
                    <button id="btn-delete-event" onclick="deleteEvent('${evt.id}')" class="flex items-center gap-2 px-4 py-2 rounded-lg text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-900/20 font-bold text-sm transition-colors border border-transparent hover:border-rose-200 dark:hover:border-rose-800">
                        <i class="fa-solid fa-trash"></i> Delete
                    </button>
                    <button id="btn-edit-event" onclick="toggleEditEventMode()" class="flex items-center gap-2 px-4 py-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 font-bold text-sm transition-colors border border-slate-200 dark:border-slate-600 shadow-sm">
                        <i class="fa-solid fa-pen"></i> Edit
                    </button>
                    <button id="btn-save-event" onclick="saveEditedEvent('${evt.id}', ${w}, ${d})" class="hidden items-center gap-2 px-4 py-2 rounded-lg bg-${evt.color}-600 hover:bg-${evt.color}-500 text-white font-bold text-sm transition-colors shadow-md">
                        <i class="fa-solid fa-floppy-disk"></i> Save
                    </button>
                </div>
            `;

            document.getElementById('modal-event-detail').classList.remove('hidden');
            document.getElementById('modal-event-detail').classList.add('flex');
        };

        window.toggleEditEventMode = () => {
            document.getElementById('display-detail-title').classList.add('hidden');
            document.getElementById('edit-detail-title').classList.remove('hidden');
            
            document.getElementById('display-detail-desc').classList.add('hidden');
            document.getElementById('edit-detail-desc').classList.remove('hidden');
            
            document.getElementById('edit-detail-colors').classList.remove('hidden');
            document.getElementById('edit-detail-colors').classList.add('flex');
            
            document.getElementById('btn-edit-event').classList.add('hidden');
            document.getElementById('btn-delete-event').classList.add('hidden');
            document.getElementById('btn-save-event').classList.remove('hidden');
            document.getElementById('btn-save-event').classList.add('flex');
        };

        window.updateEditColorSelection = () => {
            document.querySelectorAll('.edit-color-btn').forEach(btn => {
                const color = btn.dataset.color;
                if (color === window.editSelectedColor) {
                    btn.classList.replace('ring-transparent', `ring-${color}-500`);
                    btn.classList.remove('hover:scale-110');
                } else {
                    btn.className = btn.className.replace(/ring-[a-z]+-500/g, 'ring-transparent');
                    if (!btn.classList.contains('hover:scale-110')) btn.classList.add('hover:scale-110');
                }
            });
        };

        window.saveEditedEvent = (id, w, d) => {
            const cellKey = `${w}-${d}`;
            const events = window.termEvents[cellKey];
            const evtIdx = events.findIndex(e => e.id === id);
            
            if (evtIdx > -1) {
                const newTitle = document.getElementById('edit-detail-title').value.trim();
                events[evtIdx].title = newTitle || "Untitled Event";
                events[evtIdx].details = document.getElementById('edit-detail-desc').value.trim();
                events[evtIdx].color = window.editSelectedColor;
                
                syncToFirebase();
                renderGrid();
                openEventDetail(id, w, d); // re-render the modal to show updated info
                showToast("Event updated successfully");
            }
        };

        window.closeModals = () => {
            document.getElementById('modal-add-event').classList.add('hidden');
            document.getElementById('modal-add-event').classList.remove('flex');
            document.getElementById('modal-event-detail').classList.add('hidden');
            document.getElementById('modal-event-detail').classList.remove('flex');
        };

        window.selectColor = (color) => {
            window.selectedColor = color;
            document.querySelectorAll('.color-btn').forEach(btn => {
                if (btn.classList.contains(`bg-${color}-500`)) {
                    btn.classList.replace('ring-transparent', `ring-${color}-500`);
                    btn.classList.remove('hover:scale-110');
                } else {
                    btn.className = btn.className.replace(/ring-[a-z]+-500/g, 'ring-transparent');
                    if (!btn.classList.contains('hover:scale-110')) btn.classList.add('hover:scale-110');
                }
            });
        };

        window.submitNewEvent = () => {
            const titleInput = document.getElementById('new-event-title');
            const detailsInput = document.getElementById('new-event-details');
            
            const title = titleInput.value.trim();
            const details = detailsInput.value.trim();
            if (!title) return;

            const cellKey = `${window.activeCell.w}-${window.activeCell.d}`;
            if (!window.termEvents[cellKey]) window.termEvents[cellKey] = [];
            
            if (window.termEvents[cellKey].length >= 4) {
                showToast("Maximum of 4 events per day.");
                return;
            }

            window.termEvents[cellKey].push({
                id: 'evt_' + Date.now(),
                title: title,
                details: details,
                color: window.selectedColor
            });

            syncToFirebase();
            renderGrid();
            closeModals();
            showToast("Event created successfully");
        };

        window.deleteEvent = (id) => {
            const cellKey = `${window.activeCell.w}-${window.activeCell.d}`;
            if (!window.termEvents[cellKey]) return;

            window.termEvents[cellKey] = window.termEvents[cellKey].filter(e => e.id !== id);
            
            syncToFirebase();
            renderGrid();
            closeModals();
            showToast("Event deleted");
        };

        const syncToFirebase = () => {
            const docRef = doc(db, "timetables", "2026_Term3_Events");
            setDoc(docRef, { events: window.termEvents }, { merge: true }).catch(e => console.error("Sync error", e));
        };

        const loadEventsFromFirebase = () => {
            const docRef = doc(db, "timetables", "2026_Term3_Events");
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists() && docSnap.data().events) {
                    window.termEvents = docSnap.data().events;
                } else {
                    syncToFirebase(); // push the fallback data if nothing exists
                }
                renderGrid();
            });
        };

        window.toggleAccordion = (contentId, chevronId) => {
            const content = document.getElementById(contentId);
            const chevron = document.getElementById(chevronId);
            
            if (content.classList.contains('grid-rows-[0fr]')) {
                content.classList.remove('grid-rows-[0fr]');
                content.classList.add('grid-rows-[1fr]');
                chevron.classList.replace('fa-chevron-down', 'fa-chevron-up');
            } else {
                content.classList.add('grid-rows-[0fr]');
                content.classList.remove('grid-rows-[1fr]');
                chevron.classList.replace('fa-chevron-up', 'fa-chevron-down');
            }
        };

        const loadTodosFromFirebase = () => {
            if (unsubscribeTodos) unsubscribeTodos();
            const docStr = `2026_Term3_Week${window.activeTodoWeek}`;
            const docRef = doc(db, "timetables", docStr);
            
            unsubscribeTodos = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists() && docSnap.data().todos) {
                    window.todosData = docSnap.data().todos[window.activeTodoDay] || [];
                } else {
                    window.todosData = [];
                }
                renderSidebarTodos();
            });
        };

        const renderSidebarTodos = () => {
            const list = document.getElementById('sidebar-todos-list');
            if (window.todosData.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-6 text-slate-300 dark:text-slate-500 opacity-0 group-hover/sidebar:opacity-100 md:opacity-100 transition-opacity">
                        <div class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center mb-3 shadow-inner">
                            <i class="fa-solid fa-clipboard-list text-xl text-slate-300 dark:text-slate-600"></i>
                        </div>
                        <p class="text-[9px] font-black uppercase tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-slate-400 to-slate-500">Nothing to do!</p>
                    </div>`;
                return;
            }

            list.innerHTML = window.todosData.map((todo, idx) => `
                <div class="group relative flex items-start gap-2 p-1.5 md:p-2 rounded-xl bg-gradient-to-br from-white to-slate-50 dark:from-slate-800 dark:to-slate-800/80 border border-slate-100 dark:border-slate-700 shadow-sm hover:shadow-md hover:scale-[1.02] transition-all duration-300 w-full overflow-hidden shrink-0 before:absolute before:left-0 before:top-0 before:bottom-0 before:w-1.5 ${todo.done ? 'before:bg-emerald-400 dark:before:bg-emerald-500 opacity-60' : 'before:bg-gradient-to-b before:from-fuchsia-500 before:to-cyan-500'}">
                    
                    <input type="checkbox" id="todo-${idx}" class="peer sr-only todo-checkbox" ${todo.done ? 'checked' : ''} onchange="toggleTodo(${idx}, this.checked)">
                    
                    <div class="relative w-4 h-4 md:w-5 md:h-5 rounded-full border-2 ${todo.done ? 'border-emerald-400 bg-emerald-400' : 'border-slate-300 dark:border-slate-600 hover:border-fuchsia-400 dark:hover:border-fuchsia-400'} transition-all duration-300 flex items-center justify-center cursor-pointer shrink-0 shadow-sm overflow-hidden z-10 ml-1 mt-0.5 bg-white dark:bg-slate-800" onclick="document.getElementById('todo-${idx}').click()">
                        <i class="fa-solid fa-check text-white text-[8px] md:text-[10px] scale-0 check-icon transition-transform duration-300 ease-out"></i>
                        <div class="absolute inset-0 bg-fuchsia-400/20 rounded-full scale-0 group-hover:scale-100 transition-transform duration-300 bg-pulse"></div>
                    </div>
                    
                    <label for="todo-${idx}" class="flex-1 min-w-0 text-[10px] md:text-xs font-black text-slate-700 dark:text-slate-200 peer-checked:line-through ${todo.done ? 'text-slate-400 dark:text-slate-500' : ''} transition-all duration-300 cursor-pointer break-words select-none leading-tight py-0.5 z-10">
                        ${todo.text}
                    </label>
                    
                    <button onclick="deleteTodo(${idx})" class="w-5 h-5 md:w-6 md:h-6 rounded-full flex items-center justify-center text-slate-300 hover:text-white hover:bg-rose-500 opacity-0 group-hover:opacity-100 transition-all duration-300 shrink-0 z-10 shadow-sm hover:shadow-rose-500/30 hover:-rotate-12 mr-0.5 mt-0.5">
                        <i class="fa-solid fa-trash text-[8px] md:text-[9px]"></i>
                    </button>
                    
                    ${todo.done ? '<div class="absolute inset-0 bg-emerald-50/50 dark:bg-emerald-900/10 z-0 pointer-events-none"></div>' : ''}
                </div>
            `).join('');
        };

        window.toggleTodoInput = () => {
            const container = document.getElementById('todo-input-container');
            const input = document.getElementById('new-todo-input');
            const btn = document.getElementById('show-todo-input-btn');
            
            if (container.classList.contains('grid-rows-[0fr]')) {
                container.classList.remove('grid-rows-[0fr]', 'opacity-0', '-translate-y-2');
                container.classList.add('grid-rows-[1fr]', 'opacity-100', 'translate-y-0');
                btn.innerHTML = '<i class="fa-solid fa-xmark text-[10px]"></i> Close';
                btn.className = "text-[9px] font-bold text-slate-500 hover:text-rose-500 bg-slate-100 dark:bg-slate-700 hover:bg-rose-50 dark:hover:bg-rose-900/30 px-2.5 py-1 rounded-md transition-colors flex items-center gap-1.5 shadow-sm";
                setTimeout(() => input.focus(), 300);
            } else {
                container.classList.add('grid-rows-[0fr]', 'opacity-0', '-translate-y-2');
                container.classList.remove('grid-rows-[1fr]', 'opacity-100', 'translate-y-0');
                btn.innerHTML = '<i class="fa-solid fa-plus text-[10px]"></i> New';
                btn.className = "text-[9px] font-bold text-fuchsia-500 hover:text-fuchsia-600 dark:text-fuchsia-400 bg-fuchsia-50 dark:bg-fuchsia-900/20 hover:bg-fuchsia-100 dark:hover:bg-fuchsia-900/40 px-2.5 py-1 rounded-md transition-colors flex items-center gap-1.5 shadow-sm";
                input.value = '';
            }
        };

        window.addTodo = () => {
            const input = document.getElementById('new-todo-input');
            const text = input.value.trim();
            if (!text) return;

            window.todosData.push({ text: text, done: false });
            saveTodosToFirebase();
            input.value = '';
            input.focus(); 
        };

        window.toggleTodo = (idx, isDone) => {
            if(window.todosData[idx]) {
                window.todosData[idx].done = isDone;
                saveTodosToFirebase();
            }
        };

        window.deleteTodo = (idx) => {
            window.todosData.splice(idx, 1);
            saveTodosToFirebase();
        };

        const saveTodosToFirebase = () => {
            const docStr = `2026_Term3_Week${window.activeTodoWeek}`;
            const docRef = doc(db, "timetables", docStr);
            setDoc(docRef, { todos: { [window.activeTodoDay]: window.todosData } }, { merge: true });
        };

        window.toggleTheme = () => {
            const html = document.documentElement;
            const icons = document.querySelectorAll('.theme-icon-class');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icons.forEach(icon => icon.classList.replace('fa-moon', 'fa-sun'));
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                icons.forEach(icon => icon.classList.replace('fa-sun', 'fa-moon'));
                localStorage.theme = 'dark';
            }
        };

        if (localStorage.theme === 'light' || (!('theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
            document.addEventListener("DOMContentLoaded", () => {
                document.querySelectorAll('.theme-icon-class').forEach(icon => icon.classList.replace('fa-moon', 'fa-sun'));
            });
        }

        signInAnonymously(auth).then(async () => {
            // First run the carry-over logic
            await window.autoCarryOverTodos();
            // Then subscribe to listeners
            loadEventsFromFirebase();
            loadTodosFromFirebase();
        }).catch((e) => {
            console.error("Auth failed:", e);
            renderGrid();
        });

        // Ensure clicking outside modal content closes it
        document.getElementById('modal-add-event').addEventListener('click', (e) => {
            if (e.target.id === 'modal-add-event') closeModals();
        });
        document.getElementById('modal-event-detail').addEventListener('click', (e) => {
            if (e.target.id === 'modal-event-detail') closeModals();
        });

    </script>
</body>
</html>
