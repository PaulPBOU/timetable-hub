<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Term 3 Calendar | Ambient Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Using Inter for UI, Outfit for Headers, creating a very modern feel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'], 
                    },
                    gridTemplateColumns: {
                        'term': '3rem repeat(5, minmax(0, 1fr))', /* Slightly tighter week column */
                    },
                    colors: {
                        background: 'rgb(var(--color-background) / <alpha-value>)',
                        surface: 'rgb(var(--color-surface) / <alpha-value>)',
                        border: 'rgb(var(--color-border) / <alpha-value>)',
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --color-background: 248 250 252; /* slate-50 */
            --color-surface: 255 255 255;
            --color-border: 226 232 240; /* slate-200 */
        }
        
        .dark {
            --color-background: 9 9 11; /* zinc-950 */
            --color-surface: 24 24 27; /* zinc-900 */
            --color-border: 39 39 42; /* zinc-800 */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; /* Strict no scroll on body */
            margin: 0; 
            padding: 0;
            width: 100vw; 
            height: 100vh;
            position: fixed;
            inset: 0;
            background-color: rgb(var(--color-background));
            color: #1a1a1a;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .dark body {
            color: #f4f4f5;
        }

        /* Ambient glowing background effect - Emerald/Teal */
        .ambient-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .ambient-bg::before, .ambient-bg::after {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
        }

        .ambient-bg::before {
            top: -200px;
            left: -200px;
            background: radial-gradient(circle, rgba(16,185,129,0.15) 0%, rgba(0,0,0,0) 70%);
        }

        .ambient-bg::after {
            bottom: -200px;
            right: -100px;
            background: radial-gradient(circle, rgba(20,184,166,0.1) 0%, rgba(0,0,0,0) 70%);
            animation-delay: -10s;
        }

        .dark .ambient-bg::before { background: radial-gradient(circle, rgba(16,185,129,0.2) 0%, rgba(0,0,0,0) 70%); }
        .dark .ambient-bg::after { background: radial-gradient(circle, rgba(20,184,166,0.15) 0%, rgba(0,0,0,0) 70%); }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(156, 163, 175, 0.3); 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(156, 163, 175, 0.6); }

        /* Hide scrollbar for internal cells */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Glassmorphism utilities */
        .glass {
            background: rgba(var(--color-surface) / 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(var(--color-border) / 0.5);
        }

        /* Checkbox animation - Emerald */
        .todo-checkbox:checked + div .check-icon {
            transform: scale(1);
            opacity: 1;
        }
        .todo-checkbox:checked + div {
            background-color: #10b981;
            border-color: #10b981;
        }

        /* Hide elements dynamically */
        .grid-rows-0 { grid-template-rows: 0fr; }
        .grid-rows-1 { grid-template-rows: 1fr; }
        
        /* Smooth inputs */
        input:focus, textarea:focus { outline: none; }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEGrh2SIC20vJj_nLm4x34ok01srxip7I",
            authDomain: "paul-s-2026.firebaseapp.com",
            projectId: "paul-s-2026",
            storageBucket: "paul-s-2026.firebasestorage.app",
            messagingSenderId: "524167059781",
            appId: "1:524167059781:web:57347f46b29c9d4a49862c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Core Time Logic
        window.getCurrentSchoolTime = () => {
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const term3Start = new Date(2026, 6, 20); // July 20, 2026
            let weekNum = 0, curDay = 'Monday', isTerm3 = false;

            if (now >= term3Start) {
                const daysDiff = Math.floor((now - term3Start) / (1000 * 60 * 60 * 24));
                weekNum = Math.floor(daysDiff / 7) + 1;
                if(weekNum >= 1 && weekNum <= 10) isTerm3 = true;
            }

            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            curDay = days[now.getDay()];
            return { isTerm3, week: weekNum, day: curDay };
        };

        const schoolTime = window.getCurrentSchoolTime();
        window.currentWeekNum = schoolTime.isTerm3 ? schoolTime.week : -1;
        window.currentDayStr = schoolTime.day;

        window.activeTodoWeek = (window.currentWeekNum >= 1 && window.currentWeekNum <= 10) ? window.currentWeekNum : 1;
        window.activeTodoDay = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'].includes(window.currentDayStr) ? window.currentDayStr : 'Monday';
        
        window.todosData = [];
        let unsubscribeTodos = null;
        window.termEvents = {};
        window.activeCell = { w: 0, d: 0, id: null };
        
        window.selectedColor = 'indigo';
        window.editSelectedColor = 'indigo';

        const colorStyles = {

            'indigo': { base: 'indigo', hex: '#6366f1', pill: 'bg-indigo-50 dark:bg-indigo-500/10 text-indigo-700 dark:text-indigo-300 border-indigo-200 dark:border-indigo-500/20', dot: 'bg-indigo-500' },
            'emerald': { base: 'emerald', hex: '#10b981', pill: 'bg-emerald-50 dark:bg-emerald-500/10 text-emerald-700 dark:text-emerald-300 border-emerald-200 dark:border-emerald-500/20', dot: 'bg-emerald-500' },
            'amber': { base: 'amber', hex: '#f59e0b', pill: 'bg-amber-50 dark:bg-amber-500/10 text-amber-700 dark:text-amber-300 border-amber-200 dark:border-amber-500/20', dot: 'bg-amber-500' },
            'rose': { base: 'rose', hex: '#f43f5e', pill: 'bg-rose-50 dark:bg-rose-500/10 text-rose-700 dark:text-rose-300 border-rose-200 dark:border-rose-500/20', dot: 'bg-rose-500' },
            'purple': { base: 'violet', hex: '#8b5cf6', pill: 'bg-violet-50 dark:bg-violet-500/10 text-violet-700 dark:text-violet-300 border-violet-200 dark:border-violet-500/20', dot: 'bg-violet-500' },
            'violet': { base: 'violet', hex: '#8b5cf6', pill: 'bg-violet-50 dark:bg-violet-500/10 text-violet-700 dark:text-violet-300 border-violet-200 dark:border-violet-500/20', dot: 'bg-violet-500' }
        };

        const dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];

        window.showToast = (msg) => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-5 py-3 rounded-2xl shadow-xl font-medium text-sm flex items-center gap-3 animate-in slide-in-from-bottom-5 fade-in duration-300';
            toast.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-400 dark:text-emerald-500"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-2', 'transition-all', 'duration-500');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        };

        window.beautifyNote = (rawText) => {
            if (!rawText) return '<span class="italic text-slate-400 font-sans">No additional details provided.</span>';
            const lines = rawText.split('\n');
            let html = '<div class="space-y-3 font-sans">';
            let inList = false;

            lines.forEach(line => {
                let text = line.trim();
                if (!text) {
                    if (inList) { html += '</div></div>'; inList = false; }
                    return;
                }

                const urlRegex = /(https?:\/\/[^\s]+)|(www\.[^\s]+)/gi;
                let formattedText = text.replace(urlRegex, (url) => {
                    let href = url.startsWith('http') ? url : 'https://' + url;
                    return `<a href="${href}" target="_blank" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-slate-100 dark:bg-zinc-800 text-emerald-600 dark:text-emerald-400 hover:bg-slate-200 dark:hover:bg-zinc-700 transition-colors text-xs font-medium shadow-sm"><i class="fa-solid fa-link text-[10px]"></i> Link</a>`;
                });

                if (text.startsWith('-')) {
                    if (!inList) { 
                        html += '<div class="mt-4 mb-4 bg-slate-50/50 dark:bg-zinc-950/30 rounded-2xl p-4 border border-slate-100 dark:border-zinc-800/50"><div class="space-y-3">'; 
                        inList = true; 
                    }
                    let content = formattedText.substring(1).trim();
                    html += `<div class="flex items-start gap-3"><div class="w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-zinc-600 mt-2 shrink-0"></div><span class="flex-1 text-sm text-slate-700 dark:text-slate-300 leading-relaxed">${content}</span></div>`;
                } else {
                    if (inList) { html += '</div></div>'; inList = false; }
                    html += `<div class="text-sm text-slate-800 dark:text-slate-200 leading-relaxed">${formattedText}</div>`;
                }
            });
            if (inList) html += '</div></div>';
            html += '</div>';
            return html;
        };

        window.autoCarryOverTodos = async () => {
            const currentDay = window.activeTodoDay;
            const currentWeek = window.activeTodoWeek;
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            const curIdx = days.indexOf(currentDay);
            let prevDay = '', prevWeek = currentWeek;
            
            if (curIdx > 0) prevDay = days[curIdx - 1];
            else if (curIdx === 0 && currentWeek > 1) { prevDay = 'Friday'; prevWeek = currentWeek - 1; }
            else return;

            try {
                const prevDocRef = doc(db, "timetables", `2026_Term3_Week${prevWeek}`);
                const prevSnap = await getDoc(prevDocRef);
                let prevTodos = [];
                if (prevSnap.exists() && prevSnap.data().todos && prevSnap.data().todos[prevDay]) prevTodos = prevSnap.data().todos[prevDay];

                const undone = prevTodos.filter(t => !t.done);
                if (undone.length === 0) return;

                const curDocRef = doc(db, "timetables", `2026_Term3_Week${currentWeek}`);
                const curSnap = await getDoc(curDocRef);
                let currentTodos = [];
                if (curSnap.exists() && curSnap.data().todos && curSnap.data().todos[currentDay]) currentTodos = curSnap.data().todos[currentDay];

                let added = false;
                undone.forEach(ut => {
                    if (!currentTodos.find(ct => ct.text.toLowerCase() === ut.text.toLowerCase())) {
                        currentTodos.push({ text: ut.text, done: false });
                        added = true;
                    }
                });

                if (added) await setDoc(curDocRef, { todos: { [currentDay]: currentTodos } }, { merge: true });
            } catch (e) { console.error("Error carrying over todos:", e); }
        };

        const renderGrid = () => {

                    const numEvents = events.length;

                    if (numEvents >= 4) gapClass = "gap-[1px]";

                    const eventsContainer = document.createElement('div');

                    eventsContainer.className = `flex-1 flex flex-col ${gapClass} min-h-0 overflow-hidden w-full h-full relative z-10`;

                        // Added shrink and min-h-0 so the browser can squash them if vertically constrained
                        eventsContainer.innerHTML += `
                        <button onclick="openEventDetail('${evt.id}', ${w}, ${d})" class="w-full text-left px-1.5 ${pyClass} rounded-full border ${styleObj.pill} transition-all hover:scale-[1.02] flex items-center gap-1.5 group/evt shrink min-h-0">

                            <span class="truncate font-medium ${textClass} flex-1 leading-tight transition-all">${evt.title}</span>
                        </button>`;
                    });
                    
                    cell.appendChild(eventsContainer);
                    row.appendChild(cell);
                }
                grid.appendChild(row);
            }
        };

                        <i class="fa-solid fa-check"></i> Save Changes
                    </button>

                let colorBase = btn.dataset.color;

            const details = document.getElementById('new-event-details').value.trim();

            renderGrid();
            closeModals();
            showToast("Event Created");
        };

        window.deleteEvent = (id) => {
            const cellKey = `${window.activeCell.w}-${window.activeCell.d}`;

            window.termEvents[cellKey] = window.termEvents[cellKey].filter(e => e.id !== id);

        const syncToFirebase = () => {

        };

        document.addEventListener("DOMContentLoaded", () => {
            const isDark = document.documentElement.classList.contains('dark');
            const icons = document.querySelectorAll('.theme-icon-class');
            icons.forEach(icon => {
                if(isDark) icon.classList.replace('fa-moon', 'fa-sun');
            });
            
            // Enter key handler for todos input
            document.getElementById('new-todo-input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') window.addTodo();
            });
        });

        if (localStorage.theme === 'light' || (!('theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
        }

        signInAnonymously(auth).then(async () => {
            await window.autoCarryOverTodos();
            loadEventsFromFirebase();
            loadTodosFromFirebase();
        }).catch((e) => {
            console.error("Auth failed:", e);
            renderGrid();
        });

        document.getElementById('modal-add-event').addEventListener('click', (e) => {
            if (e.target.id === 'modal-add-event') closeModals();
        });
        document.getElementById('modal-event-detail').addEventListener('click', (e) => {
            if (e.target.id === 'modal-event-detail') closeModals();
        });

    </script>
</body>
</html>
