<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Term 3 Calendar | Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Didact+Gothic&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 
                        montserrat: ['Montserrat', 'sans-serif'],
                        didact: ['Didact Gothic', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'], 
                        sans: ['system-ui', 'sans-serif']
                    },
                    gridTemplateColumns: {
                        'term': '3rem repeat(5, minmax(0, 1fr))',
                    },
                    colors: {
                        zinc: {
                            950: '#09090b',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        * {
            /* Forcing absolute sharp corners universally as requested */
            border-radius: 0 !important;
        }

        body { 
            font-family: 'Didact Gothic', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            padding: 0;
            width: 100vw; 
            height: 100vh;
            position: fixed;
            inset: 0;
            background-color: #ffffff;
        }

        .dark body {
            background-color: #09090b; /* zinc-950 */
        }

        /* Sleek Grid Background */
        .bg-architect-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(161, 161, 170, 0.15) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(161, 161, 170, 0.15) 1px, transparent 1px);
        }
        
        .dark .bg-architect-grid {
            background-image: linear-gradient(to right, rgba(63, 63, 70, 0.25) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(63, 63, 70, 0.25) 1px, transparent 1px);
        }

        /* Ultra-minimal Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(113, 113, 122, 0.5); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(161, 161, 170, 0.9); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .todo-checkbox:checked + div .check-icon {
            transform: scale(1);
            opacity: 1;
        }

        /* Sleek Hover Underline Animation */
        .hover-underline {
            position: relative;
        }
        .hover-underline::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: currentColor;
            transform-origin: bottom right;
            transition: transform 0.25s ease-out;
        }
        .hover-underline:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }
    </style>
</head>
<body class="flex transition-colors duration-300 p-0 md:p-4 gap-0 md:gap-4 bg-architect-grid">

    <!-- Main Term Grid Container -->
    <main class="relative flex-1 h-full z-10 flex flex-col bg-white dark:bg-zinc-950 border md:border-2 border-zinc-300 dark:border-zinc-800 shadow-2xl p-2 md:p-4 overflow-hidden min-w-0">

            <div class="bg-white dark:bg-zinc-950 py-2 flex items-center justify-center text-xs md:text-sm font-montserrat font-black text-zinc-900 dark:text-white tracking-widest uppercase border-t-4 border-transparent hover:border-cyan-500 transition-colors">Mon</div>

    <!-- Add Event Modal -->

    <!-- Event Detail & Edit Modal -->

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEGrh2SIC20vJj_nLm4x34ok01srxip7I",
            authDomain: "paul-s-2026.firebaseapp.com",
            projectId: "paul-s-2026",
            storageBucket: "paul-s-2026.firebasestorage.app",
            messagingSenderId: "524167059781",
            appId: "1:524167059781:web:57347f46b29c9d4a49862c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.getCurrentSchoolTime = () => {
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            const term3Start = new Date(2026, 6, 20); // July 20, 2026
            let weekNum = 0, curDay = 'Monday', isTerm3 = false;

            if (now >= term3Start) {
                const daysDiff = Math.floor((now - term3Start) / (1000 * 60 * 60 * 24));
                weekNum = Math.floor(daysDiff / 7) + 1;
                if(weekNum >= 1 && weekNum <= 10) isTerm3 = true;
            }

            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            curDay = days[now.getDay()];
            return { isTerm3, week: weekNum, day: curDay };
        };

        const schoolTime = window.getCurrentSchoolTime();
        window.currentWeekNum = schoolTime.isTerm3 ? schoolTime.week : -1;
        window.currentDayStr = schoolTime.day;

        window.activeTodoWeek = (window.currentWeekNum >= 1 && window.currentWeekNum <= 10) ? window.currentWeekNum : 1;
        window.activeTodoDay = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'].includes(window.currentDayStr) ? window.currentDayStr : 'Monday';
        window.todosData = [];
        let unsubscribeTodos = null;
        window.termEvents = {};
        window.activeCell = { w: 0, d: 0, id: null };
        window.selectedColor = 'cyan';
        window.editSelectedColor = 'cyan';

        const colorStyles = {
            'cyan': { badge: 'border border-cyan-500/50 bg-cyan-50 dark:bg-cyan-900/20 text-cyan-900 dark:text-cyan-100', accent: 'bg-cyan-500', modalHeader: 'border-b-[4px] border-cyan-500 bg-zinc-100 dark:bg-zinc-900', modalText: 'text-zinc-900 dark:text-white', titleColor: 'text-cyan-600 dark:text-cyan-400' },
            'emerald': { badge: 'border border-emerald-500/50 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-900 dark:text-emerald-100', accent: 'bg-emerald-500', modalHeader: 'border-b-[4px] border-emerald-500 bg-zinc-100 dark:bg-zinc-900', modalText: 'text-zinc-900 dark:text-white', titleColor: 'text-emerald-600 dark:text-emerald-400' },
            'amber': { badge: 'border border-amber-500/50 bg-amber-50 dark:bg-amber-900/20 text-amber-900 dark:text-amber-100', accent: 'bg-amber-500', modalHeader: 'border-b-[4px] border-amber-500 bg-zinc-100 dark:bg-zinc-900', modalText: 'text-zinc-900 dark:text-white', titleColor: 'text-amber-600 dark:text-amber-500' },
            'rose': { badge: 'border border-rose-500/50 bg-rose-50 dark:bg-rose-900/20 text-rose-900 dark:text-rose-100', accent: 'bg-rose-500', modalHeader: 'border-b-[4px] border-rose-500 bg-zinc-100 dark:bg-zinc-900', modalText: 'text-zinc-900 dark:text-white', titleColor: 'text-rose-600 dark:text-rose-400' },

        window.beautifyNote = (rawText) => {
            if (!rawText) return '<span class="italic text-zinc-400 font-didact">No additional details provided.</span>';
            const lines = rawText.split('\n');
            let html = '<div class="space-y-3 font-didact">';
            let inList = false;

            lines.forEach(line => {
                let text = line.trim();
                if (!text) {
                    if (inList) { html += '</div>'; inList = false; }
                    return;
                }

                const urlRegex = /(https?:\/\/[^\s]+)|(www\.[^\s]+)/gi;
                let formattedText = text.replace(urlRegex, (url) => {
                    let href = url.startsWith('http') ? url : 'https://' + url;
                    return `<a href="${href}" target="_blank" class="inline-flex items-center gap-1.5 px-2 py-1 mt-1 mb-1 bg-zinc-100 dark:bg-zinc-800 text-cyan-600 dark:text-cyan-400 hover:bg-zinc-900 hover:text-white dark:hover:bg-white dark:hover:text-black border border-zinc-300 dark:border-zinc-700 transition-all text-[11px] font-bold shadow-sm cursor-pointer whitespace-nowrap align-middle"><i class="fa-solid fa-arrow-up-right-from-square"></i> Open Link</a>`;
                });

                if (text.startsWith('-')) {
                    if (!inList) { 
                        html += '<div class="space-y-2 mt-3 mb-3 bg-zinc-50 dark:bg-zinc-900/50 p-4 border border-zinc-200 dark:border-zinc-800">'; 
                        inList = true; 
                    }
                    let content = formattedText;
                    if (content.startsWith('-')) content = content.substring(1).trim();
                    else if (content.startsWith('<-')) content = content.replace(/<.*?>/, '').substring(1).trim();
                    
                    html += `<div class="flex items-start gap-3"><div class="w-1.5 h-1.5 bg-zinc-900 dark:bg-white mt-2 shrink-0"></div><span class="flex-1 text-sm text-zinc-800 dark:text-zinc-200 leading-relaxed">${content}</span></div>`;
                } else {
                    if (inList) { html += '</div>'; inList = false; }
                    html += `<div class="text-sm text-zinc-900 dark:text-zinc-100 leading-relaxed">${formattedText}</div>`;
                }
            });
            if (inList) html += '</div>';
            html += '</div>';
            return html;
        };

        window.autoCarryOverTodos = async () => {
            const currentDay = window.activeTodoDay;
            const currentWeek = window.activeTodoWeek;
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];
            const curIdx = days.indexOf(currentDay);
            let prevDay = '', prevWeek = currentWeek;
            
            if (curIdx > 0) prevDay = days[curIdx - 1];
            else if (curIdx === 0 && currentWeek > 1) { prevDay = 'Friday'; prevWeek = currentWeek - 1; }
            else return;

            try {
                const prevDocRef = doc(db, "timetables", `2026_Term3_Week${prevWeek}`);
                const prevSnap = await getDoc(prevDocRef);
                let prevTodos = [];
                if (prevSnap.exists() && prevSnap.data().todos && prevSnap.data().todos[prevDay]) prevTodos = prevSnap.data().todos[prevDay];

                const undone = prevTodos.filter(t => !t.done);
                if (undone.length === 0) return;

                const curDocRef = doc(db, "timetables", `2026_Term3_Week${currentWeek}`);
                const curSnap = await getDoc(curDocRef);
                let currentTodos = [];
                if (curSnap.exists() && curSnap.data().todos && curSnap.data().todos[currentDay]) currentTodos = curSnap.data().todos[currentDay];

                let added = false;
                undone.forEach(ut => {
                    if (!currentTodos.find(ct => ct.text.toLowerCase() === ut.text.toLowerCase())) {
                        currentTodos.push({ text: ut.text, done: false });
                        added = true;
                    }
                });

                if (added) await setDoc(curDocRef, { todos: { [currentDay]: currentTodos } }, { merge: true });
            } catch (e) { console.error("Error carrying over todos:", e); }
        };

                        </button>`;
                    });

                }
                grid.appendChild(row);
            }

            document.getElementById('modal-event-detail').classList.add('hidden');

            closeModals();

                        check: 'border-zinc-300 dark:border-zinc-700 bg-zinc-200 dark:bg-zinc-800',
                        icon: 'text-zinc-400 dark:text-zinc-600'
                    };
                }
                
                const styles = {
                    'cyan': { bg: 'bg-cyan-50 dark:bg-cyan-900/20', border: 'border border-cyan-200 dark:border-cyan-800/50 border-l-4 border-l-cyan-500 shadow-sm', text: 'text-zinc-900 dark:text-zinc-100', check: 'border-cyan-400 dark:border-cyan-600 hover:border-cyan-500 bg-white dark:bg-zinc-950', icon: 'text-cyan-600 dark:text-cyan-400' },
                    'emerald': { bg: 'bg-emerald-50 dark:bg-emerald-900/20', border: 'border border-emerald-200 dark:border-emerald-800/50 border-l-4 border-l-emerald-500 shadow-sm', text: 'text-zinc-900 dark:text-zinc-100', check: 'border-emerald-400 dark:border-emerald-600 hover:border-emerald-500 bg-white dark:bg-zinc-950', icon: 'text-emerald-600 dark:text-emerald-400' },
                    'amber': { bg: 'bg-amber-50 dark:bg-amber-900/20', border: 'border border-amber-200 dark:border-amber-800/50 border-l-4 border-l-amber-500 shadow-sm', text: 'text-zinc-900 dark:text-zinc-100', check: 'border-amber-400 dark:border-amber-600 hover:border-amber-500 bg-white dark:bg-zinc-950', icon: 'text-amber-600 dark:text-amber-500' },
                    'rose': { bg: 'bg-rose-50 dark:bg-rose-900/20', border: 'border border-rose-200 dark:border-rose-800/50 border-l-4 border-l-rose-500 shadow-sm', text: 'text-zinc-900 dark:text-zinc-100', check: 'border-rose-400 dark:border-rose-600 hover:border-rose-500 bg-white dark:bg-zinc-950', icon: 'text-rose-600 dark:text-rose-400' },
                    'purple': { bg: 'bg-purple-50 dark:bg-purple-900/20', border: 'border border-purple-200 dark:border-purple-800/50 border-l-4 border-l-purple-500 shadow-sm', text: 'text-zinc-900 dark:text-zinc-100', check: 'border-purple-400 dark:border-purple-600 hover:border-purple-500 bg-white dark:bg-zinc-950', icon: 'text-purple-600 dark:text-purple-400' }
                };
                return styles[c];
            };

            list.innerHTML = window.todosData.map((todo, idx) => {
                const s = getTodoStyles(idx, todo.done);
                // Minimized gap/padding, shrunk text slightly for tighter density
                return `
                <div class="group relative flex items-start gap-2.5 px-2.5 py-1.5 ${s.bg} ${s.border} transition-all duration-300 w-full shrink-0">
                    <input type="checkbox" id="todo-${idx}" class="peer sr-only todo-checkbox" ${todo.done ? 'checked' : ''} onchange="toggleTodo(${idx}, this.checked)">
                    <div class="relative w-3.5 h-3.5 border-2 ${s.check} transition-all duration-200 flex items-center justify-center cursor-pointer shrink-0 mt-[2px]" onclick="document.getElementById('todo-${idx}').click()">
                        <i class="fa-solid fa-check ${s.icon} text-[9px] scale-0 opacity-0 check-icon transition-all duration-200"></i>
                    </div>
                    <label for="todo-${idx}" class="flex-1 min-w-0 text-xs font-outfit ${s.text} peer-checked:line-through cursor-pointer leading-tight pr-6">
                        ${todo.text}
                    </label>
                    <button onclick="deleteTodo(${idx})" class="absolute right-1.5 top-1.5 w-5 h-5 flex items-center justify-center text-zinc-400 hover:text-rose-600 dark:hover:text-rose-400 opacity-0 group-hover:opacity-100 transition-all duration-300 shrink-0">
                        <i class="fa-solid fa-xmark text-sm"></i>
                    </button>
                </div>
                `;
            }).join('');
        };

        window.toggleTodoInput = () => {
            const container = document.getElementById('todo-input-container');
            const input = document.getElementById('new-todo-input');
            const btn = document.getElementById('show-todo-input-btn');
            
            if (container.classList.contains('grid-rows-[0fr]')) {
                container.classList.remove('grid-rows-[0fr]', 'opacity-0');
                container.classList.add('grid-rows-[1fr]', 'opacity-100');
                btn.innerHTML = '<i class="fa-solid fa-xmark text-[10px]"></i> Close';
                btn.classList.replace('bg-cyan-100', 'bg-zinc-200');
                btn.classList.replace('dark:bg-cyan-900/30', 'dark:bg-zinc-800');
                btn.classList.replace('border-cyan-300', 'border-zinc-300');
                btn.classList.replace('dark:border-cyan-700', 'dark:border-zinc-700');
                btn.classList.replace('text-cyan-700', 'text-zinc-700');
                btn.classList.replace('dark:text-cyan-400', 'dark:text-zinc-300');
                setTimeout(() => input.focus(), 300);
            } else {
                container.classList.add('grid-rows-[0fr]', 'opacity-0');
                container.classList.remove('grid-rows-[1fr]', 'opacity-100');
                btn.innerHTML = '<i class="fa-solid fa-plus text-[10px]"></i> Add';
                btn.className = "text-[9px] font-montserrat font-bold text-cyan-700 hover:text-white dark:text-cyan-400 dark:hover:text-black bg-cyan-100 hover:bg-cyan-600 dark:bg-cyan-900/30 dark:hover:bg-cyan-400 px-3 py-1.5 transition-colors border border-cyan-300 dark:border-cyan-700 flex items-center gap-1.5 uppercase tracking-wider";
                input.value = '';
            }
        };

        window.addTodo = () => {
            const input = document.getElementById('new-todo-input');
            const text = input.value.trim();
            if (!text) return;
            window.todosData.push({ text, done: false });
            saveTodosToFirebase();
            input.value = '';
            input.focus(); 
        };

        window.toggleTodo = (idx, isDone) => {
            if(window.todosData[idx]) { window.todosData[idx].done = isDone; saveTodosToFirebase(); }
        };

        window.deleteTodo = (idx) => {
            window.todosData.splice(idx, 1);
            saveTodosToFirebase();
        };

        const saveTodosToFirebase = () => {
            setDoc(doc(db, "timetables", `2026_Term3_Week${window.activeTodoWeek}`), { todos: { [window.activeTodoDay]: window.todosData } }, { merge: true });
        };

        window.toggleTheme = () => {
            const html = document.documentElement;
            const icons = document.querySelectorAll('.theme-icon-class');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icons.forEach(icon => icon.classList.replace('fa-circle-half-stroke', 'fa-circle-half-stroke')); // Visual feedback
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                icons.forEach(icon => icon.classList.replace('fa-circle-half-stroke', 'fa-circle-half-stroke'));
                localStorage.theme = 'dark';
            }
        };

        if (localStorage.theme === 'light' || (!('theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.remove('dark');
        }

        signInAnonymously(auth).then(async () => {
            await window.autoCarryOverTodos();
            loadEventsFromFirebase();
            loadTodosFromFirebase();
        }).catch((e) => {
            console.error("Auth failed:", e);
            renderGrid();
        });

        document.getElementById('modal-add-event').addEventListener('click', (e) => {
            if (e.target.id === 'modal-add-event') closeModals();
        });
        document.getElementById('modal-event-detail').addEventListener('click', (e) => {
            if (e.target.id === 'modal-event-detail') closeModals();
        });

    </script>
</body>
</html>
